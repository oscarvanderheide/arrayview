<!DOCTYPE html>
<html>
<head>
    <title>ArrayView</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='2.5' fill='%230c0c0c'/%3E%3Crect x='2' y='2' width='3' height='3' fill='%233a0ca3'/%3E%3Crect x='6.5' y='2' width='3' height='3' fill='%23560bad'/%3E%3Crect x='11' y='2' width='3' height='3' fill='%23c77dff'/%3E%3Crect x='2' y='6.5' width='3' height='3' fill='%234361ee'/%3E%3Crect x='6.5' y='6.5' width='3' height='3' fill='%234cc9f0'/%3E%3Crect x='11' y='6.5' width='3' height='3' fill='%23f5c842'/%3E%3Crect x='2' y='11' width='3' height='3' fill='%234895ef'/%3E%3Crect x='6.5' y='11' width='3' height='3' fill='%2380ed99'/%3E%3Crect x='11' y='11' width='3' height='3' fill='%23f8961e'/%3E%3C/svg%3E">
    <style>
        body {
            margin: 0; padding: 0; background: #0c0c0c; color: #d8d8d8;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden; height: 100vh; display: flex; flex-direction: column;
            box-sizing: border-box;
        }
        #tab-bar {
            height: 36px; background: #0e0e0e; display: none; align-items: flex-end;
            padding: 0 8px; user-select: none; flex-shrink: 0; overflow-x: auto;
            border-bottom: 1px solid #1e1e1e;
        }
        #tab-bar.visible { display: flex; }
        .tab {
            background: #181818; margin-right: 2px; padding: 6px 14px;
            border-radius: 6px 6px 0 0; cursor: pointer; display: flex;
            align-items: center; font-size: 12px; max-width: 240px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            border-top: 2px solid transparent; transition: background 0.1s; color: #888;
        }
        .tab.active { background: #0c0c0c; border-top: 2px solid #4cc9f0; color: #d8d8d8; }
        .tab:hover:not(.active) { background: #222; color: #bbb; }
        .tab span { overflow: hidden; text-overflow: ellipsis; }
        .tab-close {
            margin-left: 8px; font-size: 15px; opacity: 0.4; cursor: pointer;
            line-height: 1; padding: 0 3px; border-radius: 50%;
        }
        .tab-close:hover { opacity: 1; color: #ff6b6b; background: rgba(255,255,255,0.08); }

        #content { flex: 1; position: relative; background: #0c0c0c; overflow: hidden; }
        .tab-pane {
            position: absolute; inset: 0; visibility: hidden; background: #0c0c0c;
        }
        .tab-pane.active { visibility: visible; }
        iframe {
            width: 100%; height: 100%; border: none; position: absolute;
            inset: 0; visibility: visible; background: #0c0c0c;
        }

        #tab-bar::-webkit-scrollbar { height: 3px; }
        #tab-bar::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }
        #loading-overlay {
            position: absolute; inset: 0; background: #0c0c0c; z-index: 100;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; gap: 16px;
            transition: opacity 0.25s ease;
        }
        #loading-overlay.av-hidden { opacity: 0; pointer-events: none; }
        #loading-spinner {
            width: 28px; height: 28px; border-radius: 50%;
            border: 2px solid #1e1e1e; border-top-color: #4cc9f0;
            animation: av-lspin 0.8s linear infinite;
        }
        @keyframes av-lspin { to { transform: rotate(360deg); } }
        #loading-label {
            color: #555; font-size: 12px; letter-spacing: 0.03em;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div id="loading-spinner"></div>
        <div id="loading-label">Loading ArrayView&hellip;</div>
    </div>
    <div id="tab-bar"></div>
    <div id="content"></div>
    <script>
        const tabBar = document.getElementById('tab-bar');
        const content = document.getElementById('content');
        let tabs = {}; // sid -> { button, iframe }
        let activeSid = null;

        function updateTabBarVisibility() {
            const count = Object.keys(tabs).length;
            tabBar.classList.toggle('visible', count > 1);
        }

        function addTab(sid, name, url) {
            if (tabs[sid]) { activateTab(sid); return; }

            const btn = document.createElement('div');
            btn.className = 'tab';
            btn.innerHTML = `<span>${name}</span><span class="tab-close">&times;</span>`;

            const pane = document.createElement('div');
            pane.className = 'tab-pane';

            const iframe = document.createElement('iframe');
            iframe.src = url || `/?sid=${sid}`;

            pane.appendChild(iframe);

            tabs[sid] = { btn, pane, iframe };

            btn.onclick = () => activateTab(sid);
            btn.querySelector('.tab-close').onclick = (e) => {
                e.stopPropagation();
                closeTab(sid);
            };

            tabBar.appendChild(btn);
            content.appendChild(pane);
            activateTab(sid);
            updateTabBarVisibility();
        }

        function activateTab(sid) {
            activeSid = sid;
            for (let k in tabs) {
                if (k === sid) {
                    tabs[k].btn.classList.add('active');
                    tabs[k].pane.classList.add('active');
                    tabs[k].iframe.contentWindow?.focus();
                } else {
                    tabs[k].btn.classList.remove('active');
                    tabs[k].pane.classList.remove('active');
                }
            }
        }

        function closeTab(sid) {
            const tab = tabs[sid];
            if (!tab) return;
            tabBar.removeChild(tab.btn);
            content.removeChild(tab.pane);
            delete tabs[sid];

            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({action: "close", sid: sid}));
            }

            if (activeSid === sid) {
                const remaining = Object.keys(tabs);
                if (remaining.length > 0) {
                    activateTab(remaining[remaining.length - 1]);
                } else {
                    activeSid = null;
                }
            }
            updateTabBarVisibility();
        }

        function cycleTab(dir) {
            const sids = Object.keys(tabs);
            if (sids.length < 2) return;
            const idx = sids.indexOf(activeSid);
            const next = sids[(idx + dir + sids.length) % sids.length];
            activateTab(next);
        }

        window.addEventListener('message', (e) => {
            if (!e.data || e.data.source !== 'arrayview-viewer') return;
            try {
                if (window.parent && window.parent !== window) {
                    window.parent.postMessage(e.data, '*');
                }
            } catch (_) {
            }
            const phase = e.data.phase;
            if (phase === 'tab-cycle') {
                cycleTab(e.data.detail?.dir ?? 1);
                return;
            }
        });

        // Mark this window as the native shell so embedded viewer iframes
        // can distinguish themselves from Jupyter embeds and enable the picker.
        window.__arrayviewShell = true;

        // Note: pywebview 6.x only enables NSFullSizeContentViewWindowMask for
        // frameless windows.  ArrayView uses a titled (non-frameless) window, so
        // the web content area already starts below the native title bar and
        // window.innerHeight reflects the usable height.  No padding needed.

        // Shell WebSocket with keepalive + auto-reconnect.
        // macOS WebKit (pywebview) drops idle WebSocket connections after ~30-60s.
        // Without this, tab injection via _notify_shells() fails on the second
        // `arrayview` CLI call because SHELL_SOCKETS is empty on the server.
        const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        let ws = null;
        let heartbeatId = null;
        function connectShellWS() {
            ws = new WebSocket(`${proto}//${location.host}/ws/shell`);
            ws.onopen = () => {
                clearInterval(heartbeatId);
                heartbeatId = setInterval(() => {
                    if (ws.readyState === WebSocket.OPEN) ws.send('{"action":"ping"}');
                }, 15000);
                // Dismiss the loading overlay once the server is reachable.
                const ov = document.getElementById('loading-overlay');
                if (ov) {
                    ov.classList.add('av-hidden');
                    setTimeout(() => ov.remove(), 300);
                }
            };
            ws.onmessage = (e) => {
                const msg = JSON.parse(e.data);
                if (msg.action === 'new_tab') {
                    if (tabs['__welcome__']) closeTab('__welcome__');
                    addTab(msg.sid, msg.name, msg.url);
                }
            };
            ws.onclose = () => {
                clearInterval(heartbeatId);
                setTimeout(connectShellWS, 200);
            };
        }
        connectShellWS();
        // When served over HTTP with ?init_sid the server is already running —
        // skip the overlay entirely (WebSocket will connect in ms anyway).
        if (new URLSearchParams(location.search).get('init_sid')) {
            const ov = document.getElementById('loading-overlay');
            if (ov) ov.remove();
        }

        if (!window.__av_inline) {
            const params = new URLSearchParams(window.location.search);
            const initSid = params.get('init_sid');
            const initName = params.get('init_name');
            const initCompareSid = params.get('init_compare_sid');
            const initCompareSids = params.get('init_compare_sids');
            if (initSid) {
                let url = `/?sid=${initSid}`;
                if (initCompareSid) url += `&compare_sid=${initCompareSid}&compare_sids=${initCompareSids}`;
                addTab(initSid, initName || 'Array', url);
            } else {
                fetch('/sessions').then(r => r.json()).then(sessions => {
                    if (sessions.length > 0) {
                        sessions.forEach(s => addTab(s.sid, s.name));
                    } else {
                        // No arrays loaded yet — show the welcome/plasma screen
                        addTab('__welcome__', '', '/');
                    }
                }).catch(() => { addTab('__welcome__', '', '/'); });
            }
        }
    </script>
</body>
</html>
