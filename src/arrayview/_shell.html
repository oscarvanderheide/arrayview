<!DOCTYPE html>
<html>
<head>
    <title>ArrayView</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='2.5' fill='%230c0c0c'/%3E%3Crect x='2' y='2' width='3' height='3' fill='%233a0ca3'/%3E%3Crect x='6.5' y='2' width='3' height='3' fill='%23560bad'/%3E%3Crect x='11' y='2' width='3' height='3' fill='%23c77dff'/%3E%3Crect x='2' y='6.5' width='3' height='3' fill='%234361ee'/%3E%3Crect x='6.5' y='6.5' width='3' height='3' fill='%234cc9f0'/%3E%3Crect x='11' y='6.5' width='3' height='3' fill='%23f5c842'/%3E%3Crect x='2' y='11' width='3' height='3' fill='%234895ef'/%3E%3Crect x='6.5' y='11' width='3' height='3' fill='%2380ed99'/%3E%3Crect x='11' y='11' width='3' height='3' fill='%23f8961e'/%3E%3C/svg%3E">
    <style>
        body {
            margin: 0; padding: 0; background: #0c0c0c; color: #d8d8d8;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden; height: 100vh; display: flex; flex-direction: column;
        }
        #tab-bar {
            height: 36px; background: #0e0e0e; display: none; align-items: flex-end;
            padding: 0 8px; user-select: none; flex-shrink: 0; overflow-x: auto;
            border-bottom: 1px solid #1e1e1e;
        }
        #tab-bar.visible { display: flex; }
        .tab {
            background: #181818; margin-right: 2px; padding: 6px 14px;
            border-radius: 6px 6px 0 0; cursor: pointer; display: flex;
            align-items: center; font-size: 12px; max-width: 240px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            border-top: 2px solid transparent; transition: background 0.1s; color: #888;
        }
        .tab.active { background: #0c0c0c; border-top: 2px solid #f5c842; color: #d8d8d8; }
        .tab:hover:not(.active) { background: #222; color: #bbb; }
        .tab span { overflow: hidden; text-overflow: ellipsis; }
        .tab-close {
            margin-left: 8px; font-size: 15px; opacity: 0.4; cursor: pointer;
            line-height: 1; padding: 0 3px; border-radius: 50%;
        }
        .tab-close:hover { opacity: 1; color: #ff6b6b; background: rgba(255,255,255,0.08); }

        #content { flex: 1; position: relative; background: #0c0c0c; }
        iframe {
            width: 100%; height: 100%; border: none; position: absolute;
            top: 0; left: 0; visibility: hidden; background: #0c0c0c;
        }
        iframe.active { visibility: visible; }

        #tab-bar::-webkit-scrollbar { height: 3px; }
        #tab-bar::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }
    </style>
</head>
<body>
    <div id="tab-bar"></div>
    <div id="content"></div>
    <script>
        const tabBar = document.getElementById('tab-bar');
        const content = document.getElementById('content');
        let tabs = {}; // sid -> { button, iframe }
        let activeSid = null;

        function updateTabBarVisibility() {
            const count = Object.keys(tabs).length;
            tabBar.classList.toggle('visible', count > 1);
        }

        function addTab(sid, name) {
            if (tabs[sid]) { activateTab(sid); return; }

            const btn = document.createElement('div');
            btn.className = 'tab';
            btn.innerHTML = `<span>${name}</span><span class="tab-close">&times;</span>`;

            const iframe = document.createElement('iframe');
            iframe.src = `/?sid=${sid}`;

            tabs[sid] = { btn, iframe };

            btn.onclick = () => activateTab(sid);
            btn.querySelector('.tab-close').onclick = (e) => {
                e.stopPropagation();
                closeTab(sid);
            };

            tabBar.appendChild(btn);
            content.appendChild(iframe);
            activateTab(sid);
            updateTabBarVisibility();
        }

        function activateTab(sid) {
            activeSid = sid;
            for (let k in tabs) {
                if (k === sid) {
                    tabs[k].btn.classList.add('active');
                    tabs[k].iframe.classList.add('active');
                    tabs[k].iframe.contentWindow?.focus();
                } else {
                    tabs[k].btn.classList.remove('active');
                    tabs[k].iframe.classList.remove('active');
                }
            }
        }

        function closeTab(sid) {
            const tab = tabs[sid];
            if (!tab) return;
            tabBar.removeChild(tab.btn);
            content.removeChild(tab.iframe);
            delete tabs[sid];

            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({action: "close", sid: sid}));
            }

            if (activeSid === sid) {
                const remaining = Object.keys(tabs);
                if (remaining.length > 0) {
                    activateTab(remaining[remaining.length - 1]);
                } else {
                    activeSid = null;
                }
            }
            updateTabBarVisibility();
        }

        const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        let ws = new WebSocket(`${proto}//${location.host}/ws/shell`);
        ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            if (msg.action === 'new_tab') {
                addTab(msg.sid, msg.name);
            }
        };

        const params = new URLSearchParams(window.location.search);
        const initSid = params.get('init_sid');
        const initName = params.get('init_name');

        function loadAllSessions() {
            fetch('/sessions').then(r => r.json()).then(sessions => {
                sessions.forEach(s => addTab(s.sid, s.name));
            }).catch(() => {});
        }

        if (initSid) {
            // Verify the session exists; fall back to all sessions if not.
            // This handles tunnel / port-forwarding scenarios where the sid
            // in the URL may be stale or the URL was reconstructed.
            fetch('/metadata/' + initSid).then(res => {
                if (res.ok) {
                    addTab(initSid, initName || 'Array');
                } else {
                    console.warn('[arrayview] init_sid', initSid, 'returned', res.status, '— falling back to /sessions');
                    loadAllSessions();
                }
            }).catch(() => {
                console.warn('[arrayview] init_sid check failed — falling back to /sessions');
                loadAllSessions();
            });
        } else {
            loadAllSessions();
        }
    </script>
</body>
</html>
