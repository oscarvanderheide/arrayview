        function drawMvOrientation() {
            const cv = document.getElementById('mv-orientation');
            const _oriDims = multiViewActive ? mvDims : (compareMvActive ? compareMvDims : []);
            if (!cv || _oriDims.length < 3) return;
            const dpr = window.devicePixelRatio || 1;
            const cssSize = 120;
            if (cv.width !== cssSize * dpr || cv.height !== cssSize * dpr) {
                cv.width = cssSize * dpr;
                cv.height = cssSize * dpr;
            }
            const ctx = cv.getContext('2d');
            ctx.clearRect(0, 0, cv.width, cv.height);
            ctx.scale(dpr, dpr);

            // Normalized cuboid dims (longest axis = 1)
            const d0 = shape[_oriDims[0]] || 1;
            const d1 = shape[_oriDims[1]] || 1;
            const d2 = shape[_oriDims[2]] || 1;
            const maxDim = Math.max(d0, d1, d2);
            const W = d2 / maxDim;  // width  (z-axis in 3D widget → left-right)
            const H = d0 / maxDim;  // height (dim0 → up-down)
            const D = d1 / maxDim;  // depth  (dim1 → front-back)

            // Isometric projection: 3D (x,y,z) in [0,W]×[0,H]×[0,D] → canvas 2D
            const A = Math.PI / 6; // 30°
            const cosA = Math.cos(A), sinA = Math.sin(A);
            const scale = cssSize * 0.38;
            const cx = cssSize * 0.5, cy = cssSize * 0.54;
            const iso = (x, y, z) => ({
                sx: cx + (x - z) * cosA * scale,
                sy: cy + ((x + z) * sinA - y) * scale
            });

            // 8 corners: (x ∈ {0,W}, y ∈ {0,H}, z ∈ {0,D})
            const corners = [];
            for (let xi = 0; xi <= 1; xi++)
            for (let yi = 0; yi <= 1; yi++)
            for (let zi = 0; zi <= 1; zi++)
                corners.push(iso(xi * W, yi * H, zi * D));
            // corner index: xi*4 + yi*2 + zi
            const c = (xi, yi, zi) => corners[xi*4 + yi*2 + zi];

            // Draw 12 wireframe edges
            ctx.strokeStyle = getComputedStyle(cv).getPropertyValue('border-color') ||

                [c(0,0,0),c(1,0,0)],[c(0,0,0),c(0,0,1)],[c(1,0,0),c(1,0,1)],[c(0,0,1),c(1,0,1)],
                // top face (y=1)
                [c(0,1,0),c(1,1,0)],[c(0,1,0),c(0,1,1)],[c(1,1,0),c(1,1,1)],[c(0,1,1),c(1,1,1)],
                // verticals
                [c(0,0,0),c(0,1,0)],[c(1,0,0),c(1,1,0)],[c(0,0,1),c(0,1,1)],[c(1,0,1),c(1,1,1)],
            ];

            });

            // Slice fractions: position within each dim's extent
            const f0 = (shape[_oriDims[0]] > 1) ? indices[_oriDims[0]] / (shape[_oriDims[0]] - 1) : 0.5;
            const f1 = (shape[_oriDims[1]] > 1) ? indices[_oriDims[1]] / (shape[_oriDims[1]] - 1) : 0.5;
            const f2 = (shape[_oriDims[2]] > 1) ? indices[_oriDims[2]] / (shape[_oriDims[2]] - 1) : 0.5;
            const planeColors = [
                { fill: 'rgba(255,90,90,0.30)',   stroke: 'rgba(255,90,90,0.7)' },
                { fill: 'rgba(100,210,130,0.28)', stroke: 'rgba(100,210,130,0.65)' },
                { fill: 'rgba(80,170,255,0.28)',  stroke: 'rgba(80,170,255,0.65)' },
            ];

            if (obliqueVecs) {

                // Basis vectors are unit vecs in (dim0,dim1,dim2) voxel space.
                // Mapping to widget (x,y,z) space: widget_x=vox_dim2/maxDim, etc.
                const cx_w = f2 * W, cy_w = f0 * H, cz_w = f1 * D;

                    const bh = ov.bh, bv = ov.bv;

                    const dvx = ext * bv[2], dvy = ext * bv[0], dvz = ext * bv[1];
                    return { ...planeColors[i], pts: [
                        iso(cx_w+dhx+dvx, cy_w+dhy+dvy, cz_w+dhz+dvz),
                        iso(cx_w+dhx-dvx, cy_w+dhy-dvy, cz_w+dhz-dvz),
                        iso(cx_w-dhx-dvx, cy_w-dhy-dvy, cz_w-dhz-dvz),

                    // ⊥ dim0: horizontal plane at y = f0*H  (quad: z∈[0,D], x∈[0,W])
                    { ...planeColors[0], pts: [iso(0, f0*H, 0), iso(W, f0*H, 0), iso(W, f0*H, D), iso(0, f0*H, D)] },
                    // ⊥ dim1: depth plane at z = f1*D  (quad: x∈[0,W], y∈[0,H])
                    { ...planeColors[1], pts: [iso(0, 0, f1*D), iso(W, 0, f1*D), iso(W, H, f1*D), iso(0, H, f1*D)] },
                    // ⊥ dim2: side plane at x = f2*W  (quad: z∈[0,D], y∈[0,H])
                    { ...planeColors[2], pts: [iso(f2*W, 0, 0), iso(f2*W, 0, D), iso(f2*W, H, D), iso(f2*W, H, 0)] },
                ];

            planes.forEach(({ fill, stroke, pts }) => {
                ctx.beginPath();
                ctx.moveTo(pts[0].sx, pts[0].sy);
                pts.slice(1).forEach(p => ctx.lineTo(p.sx, p.sy));

                ctx.fill();
                ctx.strokeStyle = stroke;
                ctx.lineWidth = 1;
                ctx.stroke();
            });

            ctx.setTransform(1, 0, 0, 1, 0, 0); // reset scale
        }

        /** Return the index (in mvViews) of the other view whose crosshair line was hit,
         *  or -1 if no hit. px/py are in canvas (image pixel) coordinates. */
        function mvCrossHairHit(v, px, py) {
            if (!v.lastW || !v.lastH) return -1;
            // Don't register hits when crosshairs are hidden
            if (_mvCrosshairAlpha < 0.3) return -1;
            const i = mvViews.indexOf(v);
            if (i < 0) return -1;
            const rect = v.canvas.getBoundingClientRect();
            const cssPxPerCanvasPx = v.lastW ? rect.width / v.lastW : 1;
            const thr = 10 / cssPxPerCanvasPx; // 10 CSS-px hit zone in canvas pixels
            if (obliqueVecs) {
                const vi = obliqueVecs[i];
                const diff = mvDims.map(d => indices[d] - (shape[d] - 1) / 2);
                const chx = v.lastW / 2 + dot3(diff, vi.bh);
                const chy = v.lastH / 2 + dot3(diff, vi.bv);
                for (let j = 0; j < mvViews.length; j++) {
                    if (j === i) continue;
                    const L = cross3(vi.n, obliqueVecs[j].n);
                    const lh = dot3(L, vi.bh), lv = dot3(L, vi.bv);
                    const len = Math.sqrt(lh*lh + lv*lv);
                    if (len < 1e-10) continue;
                    // Perpendicular distance from click to the crosshair line
                    const dist = Math.abs((px-chx)*lv/len - (py-chy)*lh/len);
                    if (dist < thr) return j;
                }
            } else {
                const fx = flipDims[v.dimX] || false, fy = flipDims[v.dimY] || false;
                const cx = fx ? (v.lastW - indices[v.dimX] - 0.5) : (indices[v.dimX] + 0.5);
                const cy = fy ? (v.lastH - indices[v.dimY] - 0.5) : (indices[v.dimY] + 0.5);
                if (Math.abs(px - cx) < thr) // vertical line → view j that slices along dimX
                    return mvViews.findIndex((v2, j) => j !== i && v2.sliceDir === v.dimX);
                if (Math.abs(py - cy) < thr) // horizontal line → view j that slices along dimY
                    return mvViews.findIndex((v2, j) => j !== i && v2.sliceDir === v.dimY);
            }
            return -1;
        }

        /** Lazily initialise obliqueVecs from the current axis-aligned configuration. */
        function initObliqueVecs() {
            if (obliqueVecs !== null) return;
            obliqueVecs = mvViews.map(v => {
                const bh = [0, 0, 0], bvec = [0, 0, 0];

                bvec[mvDims.indexOf(v.dimY)] = flipDims[v.dimY] ? -1 : 1;

        function _getMvCrosshairOverlay(v) {

        function mvScaleAllCanvases() {

        }

                    || document.documentElement.mozRequestFullScreen;

        let _fullscreenActive = isInlineEmbed;

        function _positionFullscreenInfo() {
            _positionFullscreenChrome();
        }

        // Snap userZoom to the auto-fit level when within tolerance (fixes float
        // rounding from ×1.1 / ÷1.1 not round-tripping). Returns true if snapped.
        function _snapZoomToFit() {
            if (Math.abs(userZoom - _fitZoom) < 0.02) {
                userZoom = _fitZoom;
                _zoomAdjustedByUser = false;
                mainPan.reset();
                _autoFitPending = true;
                return true;
            }
            // Also snap to normal-fit floor when close (prevents fractional drift below floor)
            if (!_fullscreenActive && Math.abs(userZoom - _normalFitZoom) < 0.02) {
                userZoom = _normalFitZoom;
                _zoomAdjustedByUser = false;
                mainPan.reset();
                _autoFitPending = true;
                return true;
            }

        // Return the auto-fit userZoom for dimensions w×h, as if _fullscreenActive
        // were forImmersive. Mirrors the _autoFitPending branch in scaleCanvas.
        function _calcAutoFitZoom(w, h, forImmersive) {
            if (!w || !h) return 1;
            if (compareActive) {
                // In compare mode, compareScaleCanvases handles actual sizing.
                // At userZoom=1.0 the base scale already fits each image in its pane,
                // so for immersive entry we want exactly 1.0 (entire slices visible).
                if (forImmersive) return 1.0;
                const uiH = uiReserveV() + 40;
                const maxW = Math.max(100, window.innerWidth - 80);
                const maxH = Math.max(100, window.innerHeight - uiH);
                const baseScale = getBaseScale(w, h);
                const capScale = Math.min(maxW / w, maxH / h);
                return Math.max(1.0, capScale / baseScale);
            }
            const immersivePad = 12;
            const bottomReserve = forImmersive ? 0 : 80;
            const uiReserve = forImmersive ? 0 : uiReserveV();
            const maxW = Math.max(100, window.innerWidth  - (forImmersive ? immersivePad * 2 : 80));
            const maxH = Math.max(50,  window.innerHeight - uiReserve - bottomReserve
                                                          - (forImmersive ? immersivePad * 2 : 0));
            // For immersive, compute baseScale assuming uiReserve=0 to match what
            // scaleCanvas will actually use when _fullscreenActive=true.
            // Using getBaseScale() here would use the current (possibly non-zero)
            // uiReserveV(), producing an immFit that overshoots after toggle.
            // NOTE: mirrors getBaseScale() logic — keep in sync if that changes.
            const baseScale = forImmersive
                ? Math.min(Math.max(100, window.innerWidth - 80) / w,
                           Math.max(100, window.innerHeight) / h) * 0.80
                : getBaseScale(w, h);
            const capScale  = Math.min(maxW / w, maxH / h);
            return Math.max(1.0, capScale / baseScale);
        }

        function _shouldEnterImmersive() {
            // Only enter immersive when height is the binding constraint —
            // i.e. the vertical space limits fit-zoom more than horizontal.
            // Immersive reclaims the 80px bottom chrome reserve; if width was
            // already limiting, entering immersive gains nothing.
            let w, h;
            if (compareActive && compareFrames.length) {
                // In compare mode, use first frame dimensions × column count
                const f = compareFrames.find(Boolean);
                if (!f) return false;
                const hasCenterPane = diffMode > 0 || registrationMode || _wipeActive || _flickerActive || _checkerActive;
                const cols = (hasCenterPane && compareFrames.filter(Boolean).length === 2) ? 3 : compareFrames.filter(Boolean).length;
                w = f.width * cols;
                h = f.height;
            } else {
                w = lastImgW || canvas.width;
                h = lastImgH || canvas.height;
            }
            if (!w || !h) return false;
            const maxW = Math.max(100, window.innerWidth - 80);
            const maxH = Math.max(50, window.innerHeight - uiReserveV() - 80);
            if ((maxH / h) >= (maxW / w)) return false; // width binding: skip
            // Container must be wide/tall enough to fit overlaid chrome
            const vpEl = compareActive ? document.getElementById('compare-view-wrap')
                : multiViewActive ? document.getElementById('mv-panes')
                : qmriActive ? document.getElementById('qmri-view-wrap')
                : document.getElementById('canvas-viewport');

        function setFullscreenMode(on) {

            _fullscreenActive = on;
            document.body.classList.toggle('fullscreen-mode', on);

            ModeRegistry.scaleAll();
            if (!on) {

                if (wrap) {
                    wrap.classList.remove('compact-overlay');
                    wrap.style.width = '';

                const infoEl = document.getElementById('info');
                if (infoEl) { infoEl.style.top = ''; infoEl.style.left = ''; infoEl.style.transform = ''; }
                const cbWrap = document.getElementById('slim-cb-wrap');

        // ── Zoom-driven immersive crossfade ────────────────────────────
        // A single GSAP timeline drives every animated property when
        // zoom crosses from normal fit to immersive fit. Title and dim bar
        // fly up off the top of the viewport, the shared colorbar flies
        // down off the bottom, the fullscreen-mode CSS class toggles at
        // progress 0.5, then the dim bar drops back in from above and the
        // colorbar rises up from below, landing at their overlay positions.

        // All animated values flow through the timeline — we never write
        // maxHeight / margin / opacity / padding manually any more.
        //
        // Compare / multiview / qMRI per-pane chrome does an opacity-only
        // fade in the same timeline (no fly) to keep the choreography
        // sane when there are 5+ elements involved.
        function _immersiveTargets() {
            return {
                title: document.getElementById('array-name'),
                info: document.getElementById('info'),
                cb: document.getElementById('slim-cb-wrap'),
            };
        }

        function _resetImmersiveTransforms() {
            // Wipe any GSAP-animated channels on the chrome so the next
            // rebuild measures true normal-flow positions. All three
            // flying elements (title, info, cb) use the --fly-y custom
            // property channel composed with translateX via CSS — we
            // never touch the inline transform itself, so centering and
            // any other inline transforms written by scaleAll stay intact.
            // Use the DOM API directly so nothing can strip the element's
            // inline transform by accident.
            const t = _immersiveTargets();
            [t.title, t.info, t.cb].forEach(el => {
                if (!el) return;
                el.style.removeProperty('--fly-y');
                el.style.removeProperty('opacity');
                el.style.removeProperty('height');
                el.style.removeProperty('min-height');
                el.style.removeProperty('margin-top');
                el.style.removeProperty('margin-bottom');
                el.style.removeProperty('padding-top');
                el.style.removeProperty('padding-bottom');
                el.style.removeProperty('overflow');
            });
            if (typeof gsap !== 'undefined') {
                const selectors = ['.compare-title', '.compare-pane-cb-island', '#mv-cb-wrap', '.qv-cb-island', '#mini-map', '#compare-center-island'];
                selectors.forEach(sel => {
                    const found = document.querySelectorAll(sel);
                    if (found.length) gsap.set(found, { clearProps: 'opacity' });
                });
            }
        }

        function _buildImmersiveTl() {

            // (GSAP caches starting values on `.to` targets).

            // Wipe any leftover GSAP transforms so getBoundingClientRect()
            // measures the true normal-flow positions.

            // called while elements are visible in normal mode — that's
            // enforced by _driveImmersive(), which only rebuilds when
            // progress is cleanly 0 or 1.
            const { title: titleEl, info: infoEl, cb: cbWrap } = _immersiveTargets();

            // already read (so bottom reserves, pane padding, etc. stay in

            const progressProxy = { v: 0 };

            // the pane finishes growing at 0.60 — so they never visibly
            // interact with the expanding canvas. Fade-in doesn't start
            // until the pane has reached its final immersive size.

                duration: PANE_CUTOFF,
                ease: 'none',
                immediateRender: false,

                duration: PANE_CUTOFF,
                ease: 'none',

                onUpdate: () => { _crossfadeP = progressProxy.v; },

            // 0.6, so the user never sees the expanding canvas overlap
            // visible chrome.

                    { opacity: 0, duration: FADE_OUT_END, ease: 'power2.out', immediateRender: false }, 0);

                    { opacity: 0, duration: FADE_OUT_END, ease: 'power2.out', immediateRender: false }, 0);

                    { opacity: 0, duration: FADE_OUT_END, ease: 'power2.out', immediateRender: false }, 0);

            // Only add tweens for elements that actually exist.

                tl.fromTo('.compare-title', { opacity: 1 }, { opacity: 0, duration: FADE_OUT_END, ease: 'power2.out', immediateRender: false }, 0);
            }
            if (document.querySelector('.compare-pane-cb-island')) {
                tl.fromTo('.compare-pane-cb-island', { opacity: 1 }, { opacity: 0, duration: FADE_OUT_END, ease: 'power2.out', immediateRender: false }, 0);
            }
            if (document.getElementById('mv-cb-wrap')) {
                tl.fromTo('#mv-cb-wrap', { opacity: 1 }, { opacity: 0, duration: FADE_OUT_END, ease: 'power2.out', immediateRender: false }, 0);
            }
            if (document.querySelector('.qv-cb-island')) {
                tl.fromTo('.qv-cb-island', { opacity: 1 }, { opacity: 0, duration: FADE_OUT_END, ease: 'power2.out', immediateRender: false }, 0);
            }

            const FLOW_COLLAPSE_DUR = PANE_CUTOFF - FADE_OUT_END;
            const collapseHiddenFlow = (el) => {
                if (!el) return;
                const s = getComputedStyle(el);
                const h = el.getBoundingClientRect().height;
                const minH = parseFloat(s.minHeight || 0);
                const mt = parseFloat(s.marginTop || 0);
                const mb = parseFloat(s.marginBottom || 0);
                const pt = parseFloat(s.paddingTop || 0);
                const pb = parseFloat(s.paddingBottom || 0);
                tl.fromTo(el, {
                    height: h,
                    minHeight: minH,
                    marginTop: mt,
                    marginBottom: mb,
                    paddingTop: pt,
                    paddingBottom: pb,
                    overflow: 'hidden',

                    height: 0,
                    minHeight: 0,
                    marginTop: 0,
                    marginBottom: 0,
                    paddingTop: 0,
                    paddingBottom: 0,
                    duration: FLOW_COLLAPSE_DUR,
                    ease: 'power2.inOut',
                    immediateRender: false,

            collapseHiddenFlow(infoEl);

            // One symmetric .call() at position 0.6 handles both
            // directions. Since we scrub the timeline from an external
            // drive tween, tl.reversed() is always false — so we read
            // _immDriveDir which is set before each drive call.
            tl.call(() => {

                        titleEl.style.removeProperty('height');
                        titleEl.style.removeProperty('min-height');
                        titleEl.style.removeProperty('margin-top');
                        titleEl.style.removeProperty('margin-bottom');
                        titleEl.style.removeProperty('padding-top');
                        titleEl.style.removeProperty('padding-bottom');
                        titleEl.style.removeProperty('overflow');
                        titleEl.style.setProperty('--fly-y', '0px');
                    }
                    if (infoEl) {
                        infoEl.style.removeProperty('height');
                        infoEl.style.removeProperty('min-height');
                        infoEl.style.removeProperty('margin-top');
                        infoEl.style.removeProperty('margin-bottom');
                        infoEl.style.removeProperty('padding-top');
                        infoEl.style.removeProperty('padding-bottom');
                        infoEl.style.removeProperty('overflow');
                        infoEl.style.setProperty('--fly-y', '0px');

                        if (centerIsland) {

                            try { centerIsland.innerHTML = _centerModeIndicatorHTML(mode); } catch (_) {}
                        }

                    // via tl.set(), so the fullscreen-mode `left: 50%`
                    // positioning centers the colorbar here.
                    try { _positionFullscreenChrome(); } catch (_) {}
                } else {
                    _fullscreenActive = false;
                    document.body.classList.remove('fullscreen-mode');
                    if (titleEl) titleEl.style.setProperty('--fly-y', '0px');
                    if (infoEl) infoEl.style.setProperty('--fly-y', '0px');
                    _infoDragPos = null; _cbDragPos = null; _islandDragPos = null;
                    const wrap = document.getElementById('slim-cb-wrap');
                    if (wrap) { wrap.classList.remove('compact-overlay'); }
                    const infoEl2 = document.getElementById('info');
                    if (infoEl2) { infoEl2.style.top = ''; infoEl2.style.left = ''; infoEl2.style.transform = ''; }
                    if (wrap) {

                        // position so the fade-in plays on a stable layout.

                        wrap.style.right = '';

                        wrap.style.width = normalLayoutCache.cbWidth || '';

                    }

                try { ModeRegistry.scaleAll(); } catch (_) {}
            }, null, PANE_CUTOFF);

            // Title never returns (spec choice — it's gone in immersive).
            // Dim bar + colorbar fade back in AFTER the pane reaches its

            const FADE_IN_DUR = 1.0 - PANE_CUTOFF;  // 0.4 (from 0.6 to 1.0)

            if (cbWrap) {
                tl.fromTo(cbWrap, { opacity: 0 },
                    { opacity: 1, duration: FADE_IN_DUR, ease: 'power2.out', immediateRender: false }, PANE_CUTOFF);

            if (document.querySelector('.compare-pane-cb-island')) {
                tl.to('.compare-pane-cb-island', { opacity: 1, duration: FADE_IN_DUR, ease: 'power2.out' }, PANE_CUTOFF);
            }
            if (document.getElementById('mv-cb-wrap')) {
                tl.to('#mv-cb-wrap', { opacity: 1, duration: FADE_IN_DUR, ease: 'power2.out' }, PANE_CUTOFF);
            }
            if (document.querySelector('.qv-cb-island')) {
                tl.to('.qv-cb-island', { opacity: 1, duration: FADE_IN_DUR, ease: 'power2.out' }, PANE_CUTOFF);
            }

            if (document.getElementById('mini-map')) {
                tl.fromTo('#mini-map', { opacity: 0 }, { opacity: 1, duration: FADE_IN_DUR, ease: 'power2.out', immediateRender: false }, PANE_CUTOFF);
            }
            if (document.getElementById('compare-center-island')) {
                tl.fromTo('#compare-center-island', { opacity: 0 }, { opacity: 1, duration: FADE_IN_DUR, ease: 'power2.out', immediateRender: false }, PANE_CUTOFF);

            // onUpdate and pinch path can map userZoom correctly.

            return tl;
        }

        function _driveImmersive(targetP, duration, opts) {

            // pinch/ctrl-wheel path so cumulative pinches accumulate.

            // so GSAP's per-frame opacity writes take effect immediately.

            // `transition: opacity 0.3s ease`) lags the fade by 300ms and
            // makes the cb fade visibly trail the dim bar fade.

                _crossfadeP = entering ? 1 : 0;

            // normal-flow positions were still measurable.

            if (!immersiveTl) {

                _fullscreenActive = entering;
                document.body.classList.toggle('fullscreen-mode', entering);

                        const infoEl2 = document.getElementById('info');

                        if (wrap) { wrap.style.top = ''; wrap.style.bottom = ''; wrap.style.right = ''; }

                    _cmapStripRight.appendChild(_makeThumb(ci + offs, offs === 0));
                }
            }
            // Position strip centered on the colorbar (or custom anchor)
            if (cbWrap) {
                const cbRect = cbWrap.getBoundingClientRect();
                _cmapStrip.style.top = (cbRect.top + (cbRect.height - 32) / 2) + 'px';
                _cmapStrip.style.left = (cbRect.left + cbRect.width / 2) + 'px';
                _cmapStrip.style.transform = 'translateX(-50%)';
                _cmapStrip.style.maxWidth = cbRect.width + 'px';
                cbWrap.style.opacity = '0';
            }
            // Position right strip on the right pane's colorbar
            if (hasRightAnchor) {
                const rightAnchor = extraFadeEls[0];
                const rRect = rightAnchor.getBoundingClientRect();
                _cmapStripRight.style.top = (rRect.top + (rRect.height - 32) / 2) + 'px';
                _cmapStripRight.style.left = (rRect.left + rRect.width / 2) + 'px';
                _cmapStripRight.style.transform = 'translateX(-50%)';
                _cmapStripRight.style.maxWidth = rRect.width + 'px';
                rightAnchor.style.opacity = '0';
                for (let i = 1; i < extraFadeEls.length; i++) {
                    if (extraFadeEls[i]) extraFadeEls[i].style.opacity = '0';
                }
            }
            _cmapStrip.classList.add('visible');
            if (hasRightAnchor) _cmapStripRight.classList.add('visible');
            clearTimeout(_cmapStripTimer);
            _cmapStripTimer = setTimeout(() => {
                _cmapStrip.classList.remove('visible');
                if (cbWrap) cbWrap.style.opacity = '1';
                if (hasRightAnchor) {
                    _cmapStripRight.classList.remove('visible');
                    extraFadeEls.forEach(el => { if (el) el.style.opacity = '1'; });
                }
            }, 1500);
        }

        // ── 4. A/B wipe comparator (cursor-following) ──────────────
        let _wipeFrac = 0.5;
        const _wipeCanvas = document.getElementById('compare-wipe-canvas');
        const _wipeCtx = _wipeCanvas ? _wipeCanvas.getContext('2d') : null;
        const _wipeRange = document.getElementById('wipe-range');

        function _sizeWipeCanvas() {
            if (!_wipeCtx || compareFrames.length < 2) return null;
            const f0 = compareFrames[0], f1 = compareFrames[1];
            if (!f0 || !f1) return null;
            const W = f0.width, H = f0.height;
            _wipeCanvas.width = W; _wipeCanvas.height = H;
            const refCv = compareCanvases[0];
            const cssW = parseInt(refCv.style.width)  || refCv.offsetWidth  || W;
            const cssH = parseInt(refCv.style.height) || refCv.offsetHeight || H;
            _wipeCanvas.style.width  = cssW + 'px';
            _wipeCanvas.style.height = cssH + 'px';
            return { f0, f1, W, H, cssW, cssH };
        }

        function _drawWipe() {
            if (!_wipeActive || !_wipeCtx) return;
            const s = _sizeWipeCanvas();
            if (!s) return;
            const { f0, f1, W, H, cssW } = s;
            const xSplit = Math.round(_wipeFrac * W);
            const d0 = applyFlips(f0.imageData, f0.width, f0.height);
            const d1 = applyFlips(f1.imageData, f1.width, f1.height);
            _wipeCtx.putImageData(d0, 0, 0, 0, 0, xSplit, H);
            _wipeCtx.putImageData(d1, 0, 0, xSplit, 0, W - xSplit, H);
            // Draw 1 CSS-pixel divider line
            _wipeCtx.save();
            _wipeCtx.strokeStyle = 'rgba(245,200,66,0.9)';
            const linePx = Math.max(1, W / cssW);
            _wipeCtx.lineWidth = linePx;
            const snapX = Math.round(xSplit) + (linePx % 2 === 0 ? 0 : 0.5);
            _wipeCtx.beginPath(); _wipeCtx.moveTo(snapX, 0); _wipeCtx.lineTo(snapX, H);
            _wipeCtx.stroke(); _wipeCtx.restore();
            // Sync range thumb and track gradient
            if (_wipeRange) {
                _wipeRange.value = Math.round(_wipeFrac * 100);
                _wipeRange.style.setProperty('--wipe-pct', (_wipeFrac * 100).toFixed(1) + '%');
            }
            // Update pane title with styled wipe indicator
            const wipeTitle = document.getElementById('compare-wipe-title');
            if (wipeTitle) wipeTitle.innerHTML = _centerModeIndicatorHTML(5);
        }

        // Wipe follows cursor over the canvas
        if (_wipeCanvas) {
            _wipeCanvas.addEventListener('mousemove', (e) => {
                if (!_wipeActive) return;
                const rect = _wipeCanvas.getBoundingClientRect();
                _wipeFrac = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
                _drawWipe();
            });
            _wipeCanvas.addEventListener('mouseleave', () => {
                // Keep last position on leave (don't reset)
            });
            _wipeCanvas.style.cursor = 'ew-resize';
        }

        function toggleWipeMode() {
            if (!compareActive) { showToast('wipe: only in 2-pane compare (P)'); return; }
            const nPanes = (_compareExplicitSids || compareDisplaySids).length;
            if (nPanes < 2) { showToast('wipe: needs at least 2 panes'); return; }
            _wipeActive = !_wipeActive;
            _reconcileCompareState();
            _reconcileCbVisibility();
            if (_wipeActive) {
                compareScaleCanvases();
                _drawWipe();
                showStatus('wipe: move cursor to sweep · W to exit');
            } else {
                showStatus('wipe: off');
            }
        }

        if (_wipeRange) {
            _wipeRange.addEventListener('input', () => {
                _wipeFrac = _wipeRange.valueAsNumber / 100;
                _wipeRange.style.setProperty('--wipe-pct', (_wipeFrac * 100).toFixed(1) + '%');
                _drawWipe();
            });
        }

        // ── 4b. Flicker mode (auto-toggle A/B at ~3 Hz) ─────────────
        function _startFlicker() {
            if (_flickerTimer) clearInterval(_flickerTimer);
            _flickerShowA = true;
            _drawFlickerFrame();
            _flickerTimer = setInterval(() => {
                _flickerShowA = !_flickerShowA;
                _drawFlickerFrame();
            }, Math.round(1000 / _flickerFps));
        }

        function _drawFlickerFrame() {
            if (!_flickerActive || !_wipeCtx || compareFrames.length < 2) return;
            const s = _sizeWipeCanvas();
            if (!s) return;
            const frame = _flickerShowA ? s.f0 : s.f1;
            const d = applyFlips(frame.imageData, frame.width, frame.height);
            _wipeCtx.putImageData(d, 0, 0);
            // Update title to show which frame is visible with styled indicator
            const wipeTitle = document.getElementById('compare-wipe-title');
            if (wipeTitle) {
                const aStyle = _flickerShowA ? 'color:#6db3f2;opacity:1' : 'color:#6db3f2;opacity:0.25';
                const bStyle = _flickerShowA ? 'color:#f2916d;opacity:0.25' : 'color:#f2916d;opacity:1';
                wipeTitle.innerHTML = `<span style="${aStyle}">A</span><span style="opacity:0.3;margin:0 3px">⇄</span><span style="${bStyle}">B</span>`;
            }
            // Update center island during flicker
            if (_fullscreenActive) {
                const _island = document.getElementById('compare-center-island');
                if (_island) _island.innerHTML = wipeTitle ? wipeTitle.innerHTML : '';
            }
        }

        // ── 4c. Checkerboard compare ─────────────────────────────────
        function _drawCheckerboard() {
            if (!_checkerActive || !_wipeCtx || compareFrames.length < 2) return;
            const s = _sizeWipeCanvas();
            if (!s) return;
            const { f0, f1, W, H } = s;
            const d0 = applyFlips(f0.imageData, f0.width, f0.height);
            const d1 = applyFlips(f1.imageData, f1.width, f1.height);
            // Draw A as base
            _wipeCtx.putImageData(d0, 0, 0);
            // Create temporary canvas with B
            const tmpCv = document.createElement('canvas');
            tmpCv.width = W; tmpCv.height = H;
            const tmpCtx = tmpCv.getContext('2d');
            tmpCtx.putImageData(d1, 0, 0);
            // Clip B through checkerboard pattern and draw on top
            _wipeCtx.save();
            _wipeCtx.beginPath();
            const sz = _checkerSize;
            for (let row = 0; row * sz < H; row++) {
                for (let col = 0; col * sz < W; col++) {
                    if ((row + col) % 2 === 1) {
                        _wipeCtx.rect(col * sz, row * sz, sz, sz);
                    }
                }
            }
            _wipeCtx.clip();
            _wipeCtx.drawImage(tmpCv, 0, 0);
            _wipeCtx.restore();
            // Draw subtle grid lines at tile boundaries
            _wipeCtx.save();
            _wipeCtx.strokeStyle = 'rgba(245,200,66,0.15)';
            _wipeCtx.lineWidth = Math.max(1, W / (parseInt(_wipeCanvas.style.width) || W));
            for (let x = sz; x < W; x += sz) {
                _wipeCtx.beginPath(); _wipeCtx.moveTo(x, 0); _wipeCtx.lineTo(x, H); _wipeCtx.stroke();
            }
            for (let y = sz; y < H; y += sz) {
                _wipeCtx.beginPath(); _wipeCtx.moveTo(0, y); _wipeCtx.lineTo(W, y); _wipeCtx.stroke();
            }
            _wipeCtx.restore();
            // Update title with styled checkerboard indicator
            const wipeTitle = document.getElementById('compare-wipe-title');
            if (wipeTitle) wipeTitle.innerHTML = _centerModeIndicatorHTML(7, `${sz}px`);
            if (_fullscreenActive) {
                const _island = document.getElementById('compare-center-island');
                if (_island) _island.innerHTML = _centerModeIndicatorHTML(7, `${sz}px`);
            }
        }

        // Re-draw center pane whenever compare frames update
        function _maybeRedrawWipe() {
            if (_wipeActive) _drawWipe();
            else if (_flickerActive) _drawFlickerFrame();
            else if (_checkerActive) _drawCheckerboard();
        }

        // ── 5. Distance measurement ruler ────────────────────────────
        let _rulerMode = false;
        let _rulerPtA = null, _rulerPtB = null;
        const _rulerSvg = document.getElementById('ruler-svg');
        const _lineProfileOverlay = document.getElementById('line-profile-overlay');

        /* ── JS: Ruler, Line Profile, and Mini-Map ────────────────── */

        function toggleRulerMode() {
            _rulerMode = !_rulerMode;
            document.body.classList.toggle('ruler-mode', _rulerMode);
            if (_rulerSvg) _rulerSvg.classList.toggle('active', _rulerMode);
            if (!_rulerMode) { _rulerPtA = null; _rulerPtB = null; _clearRuler(); _hideLineProfile(); }
            showStatus(_rulerMode ? 'ruler: click two points to measure · u to exit' : 'ruler: off');
        }
        function _clearRuler() {
            if (_rulerSvg) _rulerSvg.innerHTML = '';
        }
        function _hideLineProfile() {
            if (_lineProfileOverlay) _lineProfileOverlay.classList.remove('active');
        }
        function _drawRuler(ax, ay, bx, by) {
            if (!_rulerSvg) return;
            const dist = Math.hypot(bx - ax, by - ay).toFixed(1);
            const mx = (ax + bx) / 2, my = (ay + by) / 2;
            _rulerSvg.innerHTML = `
                <circle class="ruler-dot" cx="${ax}" cy="${ay}" r="3"/>
                <circle class="ruler-dot" cx="${bx}" cy="${by}" r="3"/>
                <line class="ruler-line" x1="${ax}" y1="${ay}" x2="${bx}" y2="${by}"/>
                <text class="ruler-lbl" x="${mx + 4}" y="${my - 4}">${dist} px</text>`;
        }
        function _updateRulerSize() {
            if (!_rulerSvg || !canvas) return;
            // viewBox maps SVG coordinates to image-pixel space so dots drawn at
            // canvas pixel positions align correctly regardless of CSS display size.
            _rulerSvg.setAttribute('viewBox', `0 0 ${canvas.width} ${canvas.height}`);
            _rulerSvg.removeAttribute('width');
            _rulerSvg.removeAttribute('height');
            _rulerSvg.style.width = canvas.style.width;
            _rulerSvg.style.height = canvas.style.height;
        }
        function _fetchAndShowLineProfile(ax, ay, bx, by) {
            if (!_lineProfileOverlay || !sid) return;
            const params = new URLSearchParams({
                dim_x: String(dim_x), dim_y: String(dim_y),
                indices: indices.join(','),
                x0: String(Math.round(ax)), y0: String(Math.round(ay)),
                x1: String(Math.round(bx)), y1: String(Math.round(by)),
                complex_mode: String(complexMode),
                log_scale: String(logScale),
            });
            proxyFetch(`/line_profile/${sid}?${params}`)
                .then(r => r.json())
                .then(data => {
                    if (!data.values || !data.values.length) return;
                    _renderLineProfileSVG(data.values, data.distance, ax, ay, bx, by);
                })
                .catch(() => {});
        }
        function _renderLineProfileSVG(values, distance, ax, ay, bx, by) {
            const W = 300, H = 150, pad = {l: 40, r: 10, t: 10, b: 20};
            const pw = W - pad.l - pad.r, ph = H - pad.t - pad.b;
            const finite = values.filter(v => v !== null && isFinite(v));
            if (!finite.length) return;
            const vMin = Math.min(...finite), vMax = Math.max(...finite);
            const vRange = vMax - vMin || 1;
            // Build polyline points
            const pts = values.map((v, i) => {
                const x = pad.l + (i / (values.length - 1)) * pw;
                const y = (v !== null && isFinite(v))
                    ? pad.t + ph - ((v - vMin) / vRange) * ph
                    : pad.t + ph;
                return `${x.toFixed(1)},${y.toFixed(1)}`;
            }).join(' ');
            const distLabel = distance.toFixed(1) + ' px';
            const fmtVal = v => {
                if (v === null || !isFinite(v)) return '?';
                return Math.abs(v) < 0.01 || Math.abs(v) >= 1e4 ? v.toExponential(2) : v.toFixed(2);
            };
            _lineProfileOverlay.innerHTML = `
                <svg width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">
                    <polyline class="lp-line" points="${pts}"/>
                    <text class="lp-axis-label" x="${pad.l}" y="${H - 2}"
                          text-anchor="start">0</text>
                    <text class="lp-axis-label" x="${W - pad.r}" y="${H - 2}"
                          text-anchor="end">${distLabel}</text>
                    <text class="lp-axis-label" x="${pad.l - 3}" y="${pad.t + 8}"
                          text-anchor="end">${fmtVal(vMax)}</text>
                    <text class="lp-axis-label" x="${pad.l - 3}" y="${pad.t + ph}"
                          text-anchor="end">${fmtVal(vMin)}</text>
                </svg>`;
            // Position the overlay near the midpoint of the ruler line
            const canvasRect = canvas.getBoundingClientRect();
            const scaleX = canvasRect.width / canvas.width;
            const scaleY = canvasRect.height / canvas.height;
            const midX = ((ax + bx) / 2) * scaleX + canvasRect.left;
            const midY = ((ay + by) / 2) * scaleY + canvasRect.top;
            const parent = _lineProfileOverlay.offsetParent || document.body;
            const parentRect = parent.getBoundingClientRect();
            let left = midX - parentRect.left - W / 2;
            let top = midY - parentRect.top + 16;
            // Clamp to stay within viewport
            left = Math.max(4, Math.min(left, parentRect.width - W - 4));
            top = Math.max(4, Math.min(top, parentRect.height - H - 4));
            _lineProfileOverlay.style.left = left + 'px';
            _lineProfileOverlay.style.top = top + 'px';
            _lineProfileOverlay.classList.add('active');
        }
        canvas.addEventListener('click', (e) => {
            if (!_rulerMode || e.button !== 0) return;
            const rect = canvas.getBoundingClientRect();
            const px = (e.clientX - rect.left) * canvas.width / rect.width;
            const py = (e.clientY - rect.top) * canvas.height / rect.height;
            if (!_rulerPtA) {
                _rulerPtA = [px, py];
                _clearRuler();
                _hideLineProfile();
                if (_rulerSvg) {
                    _updateRulerSize();
                    _rulerSvg.innerHTML = `<circle class="ruler-dot" cx="${px}" cy="${py}" r="3"/>`;
                }
                showStatus('ruler: click second point');
            } else {
                const savedA = _rulerPtA;
                _rulerPtB = [px, py];
                _updateRulerSize();
                _drawRuler(savedA[0], savedA[1], px, py);
                _fetchAndShowLineProfile(savedA[0], savedA[1], px, py);
                // Reset for next measurement
                _rulerPtA = null; _rulerPtB = null;
            }
        });

        // ── 7. Mini-map (when zoomed) ─────────────────────────────────
        const _miniMap = document.getElementById('mini-map');
        const _miniMapCanvas = document.getElementById('mini-map-canvas');
        const _miniMapCtx = _miniMapCanvas ? _miniMapCanvas.getContext('2d') : null;
        const _miniViewport = document.getElementById('mini-viewport');

        function updateMiniMap() {
            if (!_miniMap || !_miniMapCtx || !_miniMapCanvas) return;
            const suppressDuringImmersive = !!(_immersiveDriveTween || (_crossfadeP > 0 && _crossfadeP < 1));
            if (suppressDuringImmersive) {
                _miniMap.classList.remove('visible');
                _clearPerPaneMinimaps();
                return;
            }
            const compareFrame = compareActive ? compareFrames.find(Boolean) : null;
            const compareShouldShow = compareActive && comparePan.overflows && compareFrame && !multiViewActive && !qmriActive;
            const normalShouldShow = mainPan.overflows && lastImageData && !compareActive && !multiViewActive && !qmriActive;

            // ── Per-pane minimaps in compare mode ──
            if (compareShouldShow) {
                _miniMap.classList.remove('visible'); // hide global minimap
                _updatePerPaneMinimaps();
                return;
            } else {
                _clearPerPaneMinimaps();
            }

            const shouldShow = !!normalShouldShow;
            _miniMap.classList.toggle('visible', !!shouldShow);
            if (!shouldShow) return;
            const W = 100, H = 100;
            _miniMapCanvas.width = W; _miniMapCanvas.height = H;
            const tmp = document.createElement('canvas');
            tmp.width = lastImgW;
            tmp.height = lastImgH;
            tmp.getContext('2d').putImageData(applyFlips(lastImageData, lastImgW, lastImgH), 0, 0);
            _miniMapCtx.drawImage(tmp, 0, 0, W, H);
            updateMiniMapViewport();
        }

        function _updatePerPaneMinimaps() {
            const W = 80, H = 80;
            const activeCount = compareFrames.filter(Boolean).length;
            const layout = compareLayoutMode || 'horizontal';
            const baseCols = layout === 'horizontal' ? activeCount
                : layout === 'vertical' ? 1
                : layout === 'grid' ? 2
                : activeCount <= 2 ? activeCount : (activeCount === 4 ? 2 : 3);
            for (let i = 0; i < compareCanvases.length; i++) {
                const cv = compareCanvases[i];
                const frame = compareFrames[i];
                const inner = cv && cv.closest('.compare-canvas-inner');
                // Minimaps attach to the clip wrapper (viewport) so they stay
                // anchored when inner translates for panning.
                const clip = inner && inner.closest('.compare-canvas-clip');
                if (!cv || !frame || !clip) {
                    // Remove minimap if pane is inactive
                    const old = clip && clip.querySelector('.cmp-mini-map');
                    if (old) old.classList.remove('visible');
                    continue;
                }
                // Determine corner placement based on pane position in grid
                const col = i % baseCols;
                const row = Math.floor(i / baseCols);
                const rows = Math.ceil(activeCount / baseCols);
                const isLeft = col === 0;
                const isRight = col === baseCols - 1;
                const isTop = row === 0;
                const isBottom = row === rows - 1 && rows > 1;
                // 3-pane horizontal: skip middle pane minimap
                if (activeCount === 3 && layout === 'horizontal' && col === 1) {
                    const old = clip.querySelector('.cmp-mini-map');
                    if (old) old.classList.remove('visible');
                    continue;
                }
                // Find or create per-pane minimap
                let mm = clip.querySelector('.cmp-mini-map');
                if (!mm) {
                    mm = document.createElement('div');
                    mm.className = 'cmp-mini-map';
                    const mmCv = document.createElement('canvas');
                    mmCv.width = W; mmCv.height = H;
                    const mmVp = document.createElement('div');
                    mmVp.className = 'cmp-mini-vp';
                    mm.appendChild(mmCv);
                    mm.appendChild(mmVp);
                    clip.appendChild(mm);
                }
                // Position: NW for left panes, NE for right panes,
                // SW for bottom-left, SE for bottom-right
                mm.style.top = isBottom ? 'auto' : '6px';
                mm.style.bottom = isBottom ? '6px' : 'auto';
                mm.style.left = isLeft ? '6px' : 'auto';
                mm.style.right = isRight ? '6px' : 'auto';
                mm.classList.add('visible');
                const mmCv = mm.querySelector('canvas');
                const mmVp = mm.querySelector('.cmp-mini-vp');
                // Draw thumbnail
                mmCv.width = W; mmCv.height = H;
                const ctx = mmCv.getContext('2d');
                const tmp = document.createElement('canvas');
                tmp.width = frame.width; tmp.height = frame.height;
                tmp.getContext('2d').putImageData(applyFlips(frame.imageData, frame.width, frame.height), 0, 0);
                ctx.drawImage(tmp, 0, 0, W, H);
                // Draw viewport rectangle
                const cssW = parseInt(cv.style.width) || cv.width;
                const cssH = parseInt(cv.style.height) || cv.height;
                const vpW = parseInt(inner.dataset.vpW) || inner.offsetWidth || cssW;
                const vpH = parseInt(inner.dataset.vpH) || inner.offsetHeight || cssH;
                const fx = Math.min(1, vpW / cssW);
                const fy = Math.min(1, vpH / cssH);
                const offFx = -comparePan.x / cssW;
                const offFy = -comparePan.y / cssH;
                const rW = Math.max(2, Math.round(fx * W));
                const rH = Math.max(2, Math.round(fy * H));
                const rX = Math.max(0, Math.min(W - rW, Math.round(offFx * W)));
                const rY = Math.max(0, Math.min(H - rH, Math.round(offFy * H)));
                mmVp.style.width = rW + 'px';
                mmVp.style.height = rH + 'px';
                mmVp.style.left = rX + 'px';
                mmVp.style.top = rY + 'px';
            }
        }

        function _clearPerPaneMinimaps() {
            document.querySelectorAll('.cmp-mini-map').forEach(el => el.classList.remove('visible'));
        }
        function updateMiniMapViewport() {
            if (!_miniMap || !_miniViewport) return;
            let cssW, cssH, vpW, vpH, offFx, offFy;
            if (compareActive) {
                if (!comparePan.overflows || !compareFrames.find(Boolean)) { _miniMap.classList.remove('visible'); return; }
                const cv = compareCanvases[0];
                const inner = cv && cv.closest('.compare-canvas-inner');
                if (!cv || !inner) { _miniMap.classList.remove('visible'); return; }
                cssW = parseInt(cv.style.width) || cv.width;
                cssH = parseInt(cv.style.height) || cv.height;
                vpW = parseInt(inner.dataset.vpW) || inner.offsetWidth || cssW;
                vpH = parseInt(inner.dataset.vpH) || inner.offsetHeight || cssH;
                offFx = -comparePan.x / cssW;
                offFy = -comparePan.y / cssH;
            } else {
                if (!lastImageData || !mainPan.overflows) { _miniMap.classList.remove('visible'); return; }
                const vp = document.getElementById('canvas-viewport');
                cssW = parseInt(canvas.style.width) || canvas.width;
                cssH = parseInt(canvas.style.height) || canvas.height;
                vpW = vp ? vp.offsetWidth : cssW;
                vpH = vp ? vp.offsetHeight : cssH;
                offFx = -mainPan.x / cssW;
                offFy = -mainPan.y / cssH;
            }
            // Visible fraction
            const fx = Math.min(1, vpW / cssW);
            const fy = Math.min(1, vpH / cssH);
            const mmW = Math.max(2, Math.round(fx * 100));
            const mmH = Math.max(2, Math.round(fy * 100));
            const mmX = Math.max(0, Math.min(100 - mmW, Math.round(offFx * 100)));
            const mmY = Math.max(0, Math.min(100 - mmH, Math.round(offFy * 100)));
            _miniViewport.style.width = mmW + 'px';
            _miniViewport.style.height = mmH + 'px';
            _miniViewport.style.left = mmX + 'px';
            _miniViewport.style.top = mmY + 'px';
        }
        // Mini-map click + drag to jump/pan position
        function _miniMapJumpTo(e) {
            const rect = _miniMap.getBoundingClientRect();
            const fx = (e.clientX - rect.left) / rect.width;
            const fy = (e.clientY - rect.top) / rect.height;
            if (compareActive) {
                if (!comparePan.overflows) return;
                const cv = compareCanvases[0];
                const inner = cv && cv.closest('.compare-canvas-inner');
                if (!cv || !inner) return;
                const cssW = parseInt(cv.style.width) || cv.width;
                const cssH = parseInt(cv.style.height) || cv.height;
                const vpW = parseInt(inner.dataset.vpW) || inner.offsetWidth || cssW;
                const vpH = parseInt(inner.dataset.vpH) || inner.offsetHeight || cssH;
                comparePan.x = -(fx * cssW - vpW / 2);
                comparePan.y = -(fy * cssH - vpH / 2);
                comparePan.clamp();
                comparePan.apply();
            } else {
                if (!lastImageData || !mainPan.overflows) return;
                const cssW = parseInt(canvas.style.width) || canvas.width;
                const cssH = parseInt(canvas.style.height) || canvas.height;
                const vp = document.getElementById('canvas-viewport');
                const vpW = vp ? vp.offsetWidth : cssW;
                const vpH = vp ? vp.offsetHeight : cssH;
                mainPan.x = -(fx * cssW - vpW / 2);
                mainPan.y = -(fy * cssH - vpH / 2);
                mainPan.clamp();
                mainPan.apply();
            }
            updateMiniMapViewport();
        }
        let _miniMapDragging = false;
        if (_miniMap) {
            _miniMap.addEventListener('mousedown', (e) => {
                _miniMapDragging = true;
                _miniMap.style.cursor = 'grabbing';
                _miniMapJumpTo(e);
            });
            document.addEventListener('mousemove', (e) => {
                if (!_miniMapDragging) return;
                _miniMapJumpTo(e);
            });
            document.addEventListener('mouseup', () => {
                _miniMapDragging = false;
                _miniMap.style.cursor = 'grab';
            });
        }

        // ── Immersive drag for dimbar & colorbar ──────────────────────
        function _setupImmersiveDrag(el, getPos, setPos, defaultCalc) {
            let dragging = false, offX = 0, offY = 0;
            el.addEventListener('mousedown', e => {
                if (!document.body.classList.contains('fullscreen-mode')) return;
                if (e.button !== 0 || !e.shiftKey) return;
                dragging = true;
                const rect = el.getBoundingClientRect();
                offX = e.clientX - rect.left;
                offY = e.clientY - rect.top;
                el.style.cursor = 'grabbing';
                e.preventDefault();
            });
            window.addEventListener('mousemove', e => {
                if (!dragging) return;
                el.style.left = (e.clientX - offX) + 'px';
                el.style.top = (e.clientY - offY) + 'px';
                el.style.right = 'auto';
                el.style.bottom = 'auto';
                el.style.transform = 'none';
            });
            window.addEventListener('mouseup', () => {
                if (!dragging) return;
                dragging = false;
                el.style.cursor = '';
                const rect = el.getBoundingClientRect();
                // Snap to default if close (within 30px)
                const def = defaultCalc();
                if (def && Math.hypot(rect.left - def.x, rect.top - def.y) < 30) {
                    setPos(null);
                    _positionFullscreenChrome();
                } else {
                    setPos({ x: rect.left, y: rect.top });
                }
            });
        }
        const _infoForDrag = document.getElementById('info');
        const _cbForDrag = document.getElementById('slim-cb-wrap');
        if (_infoForDrag) {
            _setupImmersiveDrag(_infoForDrag,
                () => _infoDragPos,
                p => { _infoDragPos = p; },
                () => {
                    const vp = document.getElementById('canvas-viewport');
                    if (!vp) return null;
                    const vpRect = vp.getBoundingClientRect();
                    const w = _infoForDrag.offsetWidth || 100;
                    return { x: (window.innerWidth - w) / 2, y: vpRect.top + 8 };
                }
            );
        }
        if (_cbForDrag) {
            _setupImmersiveDrag(_cbForDrag,
                () => _cbDragPos,
                p => { _cbDragPos = p; },
                () => {
                    const vp = document.getElementById('canvas-viewport');
                    if (!vp) return null;
                    const vpRect = vp.getBoundingClientRect();
                    const w = _cbForDrag.offsetWidth || 100;
                    return { x: (window.innerWidth - w) / 2, y: vpRect.bottom - 10 - (_cbForDrag.offsetHeight || 30) };
                }
            );
        }

        // ── 8. Compare crosshair sync ─────────────────────────────────
        function updateCompareCrosshairs(srcIdx, e) {
            const srcCv = compareCanvases[srcIdx];
            if (!srcCv) return;
            _syncCrosshairsFromCv(srcCv, e);
        }
        function _syncCrosshairsFromCv(srcCv, e) {
            const srcRect = srcCv.getBoundingClientRect();
            const fx = (e.clientX - srcRect.left) / srcRect.width;
            const fy = (e.clientY - srcRect.top) / srcRect.height;
            _allCrosshairCanvases().forEach((cv) => {
                const inner = cv.closest('.compare-canvas-inner');
                if (!inner) return;
                const xh = inner.querySelector('.cmp-xhair-h');
                const xv = inner.querySelector('.cmp-xhair-v');
                const cvRect = cv.getBoundingClientRect();
                const h = cvRect.height || parseInt(cv.style.height) || 0;
                const w = cvRect.width  || parseInt(cv.style.width)  || 0;
                if (xh) { xh.style.top = Math.round(fy * h) + 'px'; xh.style.display = 'block'; }
                if (xv) { xv.style.left = Math.round(fx * w) + 'px'; xv.style.display = 'block'; }
            });
        }
        function hideCompareCrosshairs() {
            _allCrosshairCanvases().forEach(cv => {
                const inner = cv.closest('.compare-canvas-inner');
                if (!inner) return;
                inner.querySelectorAll('.cmp-xhair-h,.cmp-xhair-v').forEach(el => { el.style.display = 'none'; });
            });
        }

        // ── 9. Pinch to zoom ──────────────────────────────────────────
        let _pinchDist0 = null, _pinchZoom0 = null;
        function _pinchDist(touches) {
            const dx = touches[0].clientX - touches[1].clientX;
            const dy = touches[0].clientY - touches[1].clientY;
            return Math.hypot(dx, dy);
        }
        function _onTouchStart(e) {
            if (e.touches.length === 2) {
                _pinchDist0 = _pinchDist(e.touches);
                _pinchZoom0 = userZoom;
                e.preventDefault();
            }
        }
        function _onTouchMove(e) {
            if (e.touches.length === 2 && _pinchDist0 !== null) {
                e.preventDefault();
                const d = _pinchDist(e.touches);
                // Direct ratio — touch events are smoothly sampled, no dampening needed
                userZoom = Math.max(0.1, Math.min(10, _pinchZoom0 * (d / _pinchDist0)));
                _zoomAdjustedByUser = true;
                ModeRegistry.scaleAll();
            }
        }
        function _onTouchEnd(e) {
            if (e.touches.length < 2) { _pinchDist0 = null; _pinchZoom0 = null; saveState(); }
        }
        [canvas, ...compareCanvases].forEach(el => {
            el.addEventListener('touchstart', _onTouchStart, { passive: false });
            el.addEventListener('touchmove',  _onTouchMove,  { passive: false });
            el.addEventListener('touchend',   _onTouchEnd,   { passive: false });
        });

        // ── 9b. Safari pinch-to-zoom (GestureEvent) ─────────────────────
        let _gestureStartZoom = null;
        function _onGestureStart(e) {
            e.preventDefault();
            _gestureStartZoom = userZoom;
        }
        function _onGestureChange(e) {
            e.preventDefault();
            // e.scale is cumulative from gesturestart — multiply against cached start
            userZoom = Math.max(_normalFitZoom, Math.min(10.0, _gestureStartZoom * e.scale));
            _zoomAdjustedByUser = true;
            ModeRegistry.scaleAll();
        }
        function _onGestureEnd(e) {
            e.preventDefault();
            _gestureStartZoom = null;
            saveState();
        }
        [canvas, ...compareCanvases].forEach(el => {
            el.addEventListener('gesturestart',  _onGestureStart,  { passive: false });
            el.addEventListener('gesturechange', _onGestureChange, { passive: false });
            el.addEventListener('gestureend',    _onGestureEnd,    { passive: false });
        });

        // Track mouse-over center pane (diff / wipe) for 'c' colormap cycling
        ['compare-diff-pane', 'compare-wipe-pane'].forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                el.addEventListener('mouseenter', () => { _mouseOverCenterPane = true; });
                el.addEventListener('mouseleave', () => { _mouseOverCenterPane = false; });
            }
        });

        init();

        // ── Compact mode (K key / programmatic) ─────────────────────────────
        /* ── JS: Compact Mode and Touch Input ─────────────────────── */
        let _compactModeActive = false;
        function setCompactMode(on) {
            _compactModeActive = on;
            document.body.classList.toggle('compact-mode', on);
            if (multiViewActive || compareMvActive) {
                mvScaleAllCanvases();
            } else if (qmriActive || compareQmriActive) {
                qvScaleAllCanvases();
            } else {
                scaleCanvas();
            }
            showStatus(on ? 'compact mode: on' : 'compact mode: off');
        }
        function toggleCompactMode() { setCompactMode(!_compactModeActive); }
    </script>
</body>
</html>
