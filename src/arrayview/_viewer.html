        }

        function refreshCustomColormap(name) {
            if (!name) {
                customColormap = null;
                customGradientStops = null;
                return;
            }
            proxyFetch(`/colormap/${encodeURIComponent(name)}`)
                .then(r => r.ok ? r.json() : null)
                .then(d => {
                    if (d) {
                        customColormap = name;
                        customGradientStops = d.gradient_stops;
                    } else {
                        colormap_idx = 0;
                        customColormap = null;
                        customGradientStops = null;
                    }
                });
        }

        function applyStateSnapshot(s) {
            if (!s || typeof s !== 'object') return false;
            colormap_idx = s.colormap_idx ?? colormap_idx;
            if (Array.isArray(s.indices) && s.indices.length === shape.length) {
                indices = s.indices.map((v, i) => {
                    const n = Number(v);
                    if (!Number.isFinite(n)) return indices[i];
                    return Math.max(0, Math.min(shape[i] - 1, Math.round(n)));
                });
            }
            logScale = s.logScale ?? false;
            projectionMode = Number.isInteger(s.projectionMode) && s.projectionMode >= 0 && s.projectionMode < PROJECTION_LABELS.length + 1 ? s.projectionMode : 0;
            projectionDim = Number.isInteger(s.projectionDim) && s.projectionDim >= 0 && s.projectionDim < shape.length ? s.projectionDim : (projectionMode > 0 ? current_slice_dim : -1);
            complexMode = s.complexMode ?? 0;
            complexModeEverUsed = s.complexModeEverUsed ?? false;
            flip_x = s.flip_x ?? false;
            flip_y = s.flip_y ?? false;
            flipDims = s.flipDims ?? {};
            userZoom = s.userZoom ?? 1.0;
            if (Number.isFinite(s._zoomSensitivity) && s._zoomSensitivity > 0) _zoomSensitivity = s._zoomSensitivity;
            _zoomAdjustedByUser = false;
            if (s.userZoom !== undefined) _autoFitPending = false; // don't override explicitly saved zoom
            if (s.themeIdx !== undefined) applyTheme(s.themeIdx);
            else if (s.isDark !== undefined) applyTheme(s.isDark ? 0 : 1); // legacy
            _pixelInfoVisible = s._pixelInfoVisible ?? false;
            vfieldVisible = s.vfieldVisible ?? true;
            if (Number.isFinite(s.manualVmin) && Number.isFinite(s.manualVmax) && s.manualVmax > s.manualVmin) {
                manualVmin = s.manualVmin;
                manualVmax = s.manualVmax;
            }

            if (Number.isInteger(s.dim_x) && s.dim_x >= 0 && s.dim_x < shape.length) dim_x = s.dim_x;
            if (Number.isInteger(s.dim_y) && s.dim_y >= 0 && s.dim_y < shape.length) dim_y = s.dim_y;
            if (Number.isInteger(s.dim_z) && s.dim_z >= -1 && s.dim_z < shape.length) dim_z = s.dim_z;
            if (
                Number.isInteger(s.current_slice_dim)
                && s.current_slice_dim >= 0
                && s.current_slice_dim < shape.length
            ) {
                current_slice_dim = s.current_slice_dim;
            }
            if (Number.isInteger(s.activeDim) && s.activeDim >= 0 && s.activeDim < shape.length) {
                activeDim = s.activeDim;
            }
            if (typeof s.compareSid === 'string' && s.compareSid.trim()) compareSid = s.compareSid.trim();
            if (Array.isArray(s.compareSidList)) {
                compareSidList = s.compareSidList
                    .map(v => String(v || '').trim())
                    .filter(v => v && v !== sid);
            }
            if (typeof s.compareName === 'string') compareName = s.compareName;
            // Restore unified compare center mode (prefer new field, fall back to legacy)
            if (Number.isInteger(s.compareCenterMode) && s.compareCenterMode >= 0 && s.compareCenterMode < COMPARE_CENTER_LABELS.length) {
                compareCenterMode = s.compareCenterMode;
            } else {
                compareCenterMode = s.registrationMode ? 4 : 0;
            }
            registrationMode = (compareCenterMode === 4);
            diffMode = (compareCenterMode >= 1 && compareCenterMode <= 3) ? compareCenterMode : 0;
            _wipeActive = (compareCenterMode === 5);
            _flickerActive = (compareCenterMode === 6);
            _checkerActive = (compareCenterMode === 7);
            if (Number.isFinite(Number(s.registrationAlpha))) {
                registrationAlpha = Math.max(0.05, Math.min(0.95, Number(s.registrationAlpha)));
            }
            if (Number.isFinite(Number(s.overlayAlpha))) {
                overlayAlpha = Math.max(0.05, Math.min(0.95, Number(s.overlayAlpha)));
            }
            pendingViewMode = (typeof s.viewMode === 'string') ? s.viewMode : null;
            if (Array.isArray(s.mvDims) && s.mvDims.length === 3) {
                const dims = s.mvDims.map(v => Number(v));
                if (
                    dims.every(Number.isInteger)
                    && dims.every(d => d >= 0 && d < shape.length)
                    && new Set(dims).size === 3
                ) {
                    pendingMvDims = [...dims].sort((a, b) => a - b);
                } else {
                    pendingMvDims = null;
                }
            } else {
                pendingMvDims = null;
            }
            if (Number.isInteger(s.qmriDim) && s.qmriDim >= 0 && s.qmriDim < shape.length) {
                pendingQmriDim = s.qmriDim;
            } else {
                pendingQmriDim = null;
            }

            if (s.customColormap && colormap_idx === -1) refreshCustomColormap(s.customColormap);
            else if (colormap_idx !== -1) {
                customColormap = null;
                customGradientStops = null;
            }
            return true;
        }

        function restoreCompositeModeFromSnapshot() {
            const targetMode = pendingViewMode;
            const targetMvDims = pendingMvDims ? [...pendingMvDims] : null;
            const targetQmriDim = pendingQmriDim;
            pendingViewMode = null;
            pendingMvDims = null;
            pendingQmriDim = null;

            if (targetMode === 'multiview') {
                if (shape.length < 3) return false;
                const dims = targetMvDims || defaultMultiViewDims();
                enterMultiView(dims);
                return multiViewActive;
            }
            if (targetMode === 'qmri') {
                if (Number.isInteger(targetQmriDim)) activeDim = targetQmriDim;
                enterQmri();
                return qmriActive;
            }
            return false;
        }

        function saveState() {
            if (!sid) return;
            sessionStorage.setItem('av_' + sid, JSON.stringify(collectStateSnapshot()));
        }

        function restoreStateFromSessionStorage() {
            const raw = sessionStorage.getItem('av_' + sid);
            if (!raw) return false;
            try {
                return applyStateSnapshot(JSON.parse(raw));
            } catch (e) {
                return false;
            }
        }

        function encodeStateParam(s) {
            try {
                const json = JSON.stringify(s);
                const bytes = new TextEncoder().encode(json);
                let bin = '';
                for (const b of bytes) bin += String.fromCharCode(b);
                return btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, '');
            } catch (e) {
                return null;
            }
        }

        function decodeStateParam(encoded) {
            if (!encoded) return null;
            try {
                const padded = encoded.replace(/-/g, '+').replace(/_/g, '/');
                const need = (4 - (padded.length % 4)) % 4;
                const bin = atob(padded + '='.repeat(need));
                const bytes = Uint8Array.from(bin, c => c.charCodeAt(0));
                return JSON.parse(new TextDecoder().decode(bytes));
            } catch (e) {
                return null;
            }
        }

        function buildReusableUrl() {
            const params = new URLSearchParams();
            params.set('sid', sid);
            if (overlay_sid) params.set('overlay_sid', overlay_sid);
            if (overlay_sid && overlay_colors) params.set('overlay_colors', overlay_colors);
            if (compareSid) params.set('compare_sid', compareSid);
            if (compareSidList.length && (compareLocked || compareSidList.length > 1)) {
                params.set('compare_sids', compareSidList.join(','));
            }
            if (httpTransport) params.set('transport', 'http');
            const encoded = encodeStateParam(collectStateSnapshot());
            if (encoded) params.set('state', encoded);
            return `${window.location.origin}/?${params.toString()}`;
        }

        async function toggleRgbMode() {
            let axis = null;
            if (!rgbMode) {
                // shape is the full (unstripped) array shape when RGB is off.
                // Prefer the active dim if it has size 3 or 4; otherwise auto-detect.
                if (shape[activeDim] === 3 || shape[activeDim] === 4) {
                    axis = activeDim;
                } else {
                    const candidates = shape.reduce((a, s, i) => (s === 3 || s === 4 ? [...a, i] : a), []);
                    if (candidates.length === 0) {
                        showStatus('RGB: no dim with size 3 or 4');
                        return;
                    } else if (candidates.length > 1) {
                        showStatus('RGB: multiple candidates — activate the channel dim first');
                        return;
                    }
                    axis = candidates[0];
                }
            }
            let resp;
            try {
                resp = await proxyFetch(`/set_rgb/${sid}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ axis }),
                }).then(r => r.json());
            } catch (_) {
                showStatus('RGB: request failed');
                return;
            }
            if (resp.error) { showStatus(`RGB: ${resp.error}`); return; }
            rgbMode = resp.is_rgb;
            shape = resp.spatial_shape;
            // Reset indices, dims for new shape
            indices = shape.map(s => Math.floor(s / 2));
            dim_x = Math.min(dim_x, shape.length - 1);
            dim_y = Math.min(dim_y, shape.length - 1);
            if (dim_x === dim_y) dim_y = dim_x === 0 ? 1 : 0;
            current_slice_dim = shape.length > 2 ? Math.min(2, shape.length - 1) : 0;
            activeDim = Math.min(activeDim, shape.length - 1);
            cbVisible = !rgbMode;
            updateView(); triggerPreload(); renderEggs(); renderInfo();
            drawSlimColorbar(cbMarkerFrac);
            showStatus(rgbMode ? `RGB on (axis ${axis})` : 'RGB off');
            saveState();
        }

        // ── Shape compatibility check for compare-on-drop ─────────────────────
        function _shapesCompatibleForCompare(shapeA, shapeB) {
            if (!shapeA || !shapeB) return false;
            if (shapeA.length !== shapeB.length) return false;
            // All dimensions must match
            return shapeA.every((s, i) => s === shapeB[i]);
        }

        // ── Drag-and-drop array files ──────────────────────────────────────────
        // Drop a compatible file to enter compare mode; otherwise open in a new tab.
        const _SUPPORTED_EXTS = new Set(['npy', 'npz', 'nii', 'gz', 'zarr', 'pt', 'pth', 'h5', 'hdf5', 'tif', 'tiff', 'mat']);
        document.body.addEventListener('dragover', (e) => {
            // e.dataTransfer.types may be a DOMStringList (no .includes) in older WebKit
            const types = e.dataTransfer.types;
            const hasFiles = (Array.isArray(types) ? types : Array.from(types))
                .some(t => t === 'Files' || t === 'public.file-url' || t === 'NSFilenamesPboardType');
            if (hasFiles || e.dataTransfer.items?.length > 0) {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'copy';
            }
        });
        document.body.addEventListener('drop', async (e) => {
            if (!e.dataTransfer.files.length) return;
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            const nameLower = file.name.toLowerCase();
            const ext = nameLower.includes('.') ? nameLower.split('.').pop() : '';
            // Accept .nii.gz as a special case (double extension)
            const isNiiGz = nameLower.endsWith('.nii.gz');
            if (!isNiiGz && !_SUPPORTED_EXTS.has(ext)) {
                showStatus(`Unsupported file type: .${ext || '?'}`);
                return;
            }
            showStatus(`Loading ${file.name}…`);
            const form = new FormData();
            form.append('file', file);
            try {
                const res = await proxyFetch('/load-upload', { method: 'POST', body: form });
                const body = await res.json();
                if (!res.ok) throw new Error(body.detail || String(res.status));
                if (!sid) {
                    // Welcome screen — navigate in-place (replaces the welcome tab)
                    window.location.href = '/?sid=' + body.sid;
                } else if (!compareActive && body.shape && shape && shape.length > 0
                           && _shapesCompatibleForCompare(shape, body.shape)) {
                    // Shapes are compatible — enter compare mode with dropped array
                    await enterCompareModeBySid(body.sid, body.name || file.name);
                    showStatus(`Compare: ${body.name || file.name}`);
                } else if (window.parent !== window && window.parent.__arrayviewShell) {
                    // Shell with real array — server WS will add the tab
                    showStatus(`Opened: ${body.name}`);
                } else {
                    // Browser (non-shell) — open in new tab
                    window.open('/?sid=' + body.sid, '_blank');
                    showStatus(`Opened: ${body.name}`);
                }
            } catch (err) {
                showStatus(`Failed to load file: ${err.message}`);
            }
        });

        /* ── JS: Rendering Pipeline (updateView, play, screenshot) ── */

        function updateView() {
            const view = modeManager.currentViews[0];
            if (view && modeManager.modeName === 'normal') {
                view.requestRender();
                return;
            }
            _legacyUpdateView();
        }

        function _legacyUpdateView() {
            renderInfo();
            _maybeAutoRecomputeRange();
            // Lebesgue / hover caches are version-keyed, so stale entries are
            // never served for the wrong slice.  Don't eagerly clear — the old
            // data remains harmless while the async re-fetch is in flight, and
            // clearing creates a window where hover falls to the slow /pixel path.
            // Cap cache size to prevent unbounded memory growth.
            const _hscKeys = Object.keys(_hoverSliceCache);
            if (_hscKeys.length > 64) _hscKeys.slice(0, _hscKeys.length - 32).forEach(k => delete _hoverSliceCache[k]);
            const _lpsKeys = Object.keys(_lebesguePerSession);
            if (_lpsKeys.length > 32) _lpsKeys.slice(0, _lpsKeys.length - 16).forEach(k => delete _lebesguePerSession[k]);
            if (lebesgueMode || _pixelInfoVisible) {
                if (lebesgueMode) _clearLebesgueOverlay();
                _debouncedHoverPrefetch();
            }
            if (compareQmriActive) {
                compareQmriViews.forEach(v => compareQmriRender(v));
                return;
            }
            if (compareMvActive) {
                compareMvViews.forEach(v => compareMvRender(v));
                return;
            }
            if (compareActive) {
                compareRender();
                return;
            }
            if (mipActive) { _mipBuildLUT(); _mipRender(); return; }
            if (httpTransport) {
                if (multiViewActive) {
                    mvViews.forEach(v => mvRender(v));
                    return;
                }
                if (qmriActive) {
                    qmriViews.forEach(v => qvRender(v));
                    return;
                }
                updateViewHttp();
                return;
            }
            if (multiViewActive) { mvViews.forEach(v => mvRender(v)); return; }
            if (qmriActive) { qmriViews.forEach(v => qvRender(v)); return; }
            if (!wsReady) return;

            if (isRendering) {
                pendingRequest = true;
                return;
            }

            isRendering = true;
            wsSentSeq++;
            const _dpr = window.devicePixelRatio || 1;
            const canvas_w = Math.round((parseInt(canvas.style.width)  || window.innerWidth)  * _dpr);
            const canvas_h = Math.round((parseInt(canvas.style.height) || window.innerHeight) * _dpr);
            ws.send(JSON.stringify({
                seq: wsSentSeq,
                dim_x, dim_y, dim_z,
                indices: [...indices],
                colormap: currentColormap(),
                dr: 0,
                complex_mode: complexMode,
                log_scale: logScale,
                slice_dim: current_slice_dim,
                direction: lastDirection,
                vmin_override: manualVmin,
                vmax_override: manualVmax,
                overlay_sid: _getVisibleOverlaySids() || null,
                overlay_colors: _getVisibleOverlayColors() || null,
                overlay_alpha: overlayAlpha,
                canvas_w,
                canvas_h,
                projection_mode: projectionMode,
                projection_dim: projectionMode > 0 ? projectionDim : -1,
                vf_density: hasVectorfield ? vfDensityLevel : undefined,
                vf_t: hasVectorfield ? vfieldT : undefined,
            }));
            // Phase 3: delayed loading indicator — show spinner only when
            // the server takes longer than WS_SLOW_THRESHOLD_MS to respond.
            if (wsSlowTimer) clearTimeout(wsSlowTimer);
            wsSlowTimer = setTimeout(() => {
                wsSlowTimer = null;
                if (isRendering) {
                    document.getElementById('loading-overlay').style.display = '';
                }
            }, WS_SLOW_THRESHOLD_MS);
            // Watchdog: in postMessage mode, if no response arrives within
            // WS_WATCHDOG_MS, assume the message was lost and reset state.
            if (postMessageTransport) {
                if (wsWatchdogTimer) clearTimeout(wsWatchdogTimer);
                wsWatchdogTimer = setTimeout(() => {
                    wsWatchdogTimer = null;
                    if (isRendering) {
                        console.warn('[arrayview] watchdog: no response in ' + WS_WATCHDOG_MS + 'ms, resetting');
                        isRendering = false;
                        if (pendingRequest) { pendingRequest = false; updateView(); }
                        else if (isPlaying) { playNext(); }
                    }
                }, WS_WATCHDOG_MS);
            }
        }

        let playLastFrameTime = 0;
        let playFps = 30; // playback speed; adjustable with [ / ] while playing
        let _playRafId = null;

        function stopPlay() {
            if (_playRafId) { cancelAnimationFrame(_playRafId); _playRafId = null; }
            if (playInterval) { clearTimeout(playInterval); playInterval = null; }
            isPlaying = false; playingVfieldT = false; playingDim = -1; setStatus('');
            renderInfo();
        }

        function playNext() {
            if (!isPlaying) return;
            const targetMs = 1000 / playFps;
            function _rafTick(ts) {
                if (!isPlaying) return;
                if (ts - playLastFrameTime >= targetMs) {
                    playLastFrameTime = ts;
                    indices[playingDim] = (indices[playingDim] + 1) % shape[playingDim];
                    updateView();
                    // updateView will call playNext() again after render completes
                } else {
                    _playRafId = requestAnimationFrame(_rafTick);
                }
            }
            _playRafId = requestAnimationFrame(_rafTick);
        }

        async function playNextVfieldT() {
            if (!isPlaying || !playingVfieldT) return;
            const t0 = performance.now();
            vfieldT = (vfieldT + 1) % vfieldNTimes;
            renderInfo();
            await drawVectorOverlay();
            if (!isPlaying || !playingVfieldT) return;
            const elapsed = performance.now() - t0;
            playInterval = setTimeout(playNextVfieldT, Math.max(0, 40 - elapsed));
        }

        function togglePlay() {
            if (isPlaying) { stopPlay(); return; }
            isPlaying = true;

            if (activeDim === VFIELD_T_DIM) {
                playingVfieldT = true;
                playingDim = -1; // vfield-T playback uses vfieldT, not indices[]
                playLastFrameTime = performance.now();
                playNextVfieldT();

            }

        // Download helper: tries <a download> first, falls back to server POST (for PyWebView)
        const _inPyWebView = (() => {

        })();
        function _downloadFile(dataUrl, filename) {

                // and destroys the app. Use server-side save only.
                proxyFetch('/save_file', {

                    body: JSON.stringify({ filename, data: dataUrl })
                }).then(() => setStatus(`Saved ${filename} to Downloads.`))
                  .catch(() => setStatus(`Failed to save ${filename}.`));

        function saveScreenshot() {
            // Build annotation lines: name + slice index info
            function _buildAnnotation() {
                const name = document.getElementById('array-name-text')?.textContent?.trim() || sid.slice(0, 8);
                const shapeStr = shape.length ? shape.join('×') : '';
                const idxStr = indices.length ? `[${indices.map((v, i) => {
                    if (shape.length > 2) {
                        if (i === dim_x) return ':';
                        if (i === dim_y) return ':';
                        return String(v);
                    }
                    return String(v);
                }).join(', ')}]` : '';
                const lines = [name];
                if (shapeStr) lines.push(`shape: ${shapeStr}`);
                if (idxStr) lines.push(`idx: ${idxStr}`);
                return lines;
            }
            function _annotateCanvas(src, lines) {
                // Render screenshot at CSS display size for crisp output
                const cssW = parseInt(src.style.width) || src.width;
                const cssH = parseInt(src.style.height) || src.height;
                const dpr = window.devicePixelRatio || 1;
                const outW = Math.round(cssW * dpr);
                const outH = Math.round(cssH * dpr);
                const dst = document.createElement('canvas');
                dst.width = outW; dst.height = outH;
                const ctx = dst.getContext('2d');
                // Draw source scaled up to CSS display size
                ctx.imageSmoothingEnabled = false;
                ctx.drawImage(src, 0, 0, outW, outH);
                if (!lines || !lines.length) return dst;
                // Annotation text scaled for output resolution
                const fontSize = Math.max(12, Math.round(14 * dpr));
                ctx.font = `${fontSize}px monospace`;
                const lineH = fontSize + 3;
                const pad = Math.round(6 * dpr);
                const maxW = lines.reduce((w, l) => Math.max(w, ctx.measureText(l).width), 0);
                const boxW = maxW + pad * 2;
                const boxH = lineH * lines.length + pad * 2;
                const bx = pad;
                const by = outH - boxH - pad;
                ctx.fillStyle = 'rgba(0,0,0,0.55)';
                ctx.fillRect(bx, by, boxW, boxH);
                ctx.fillStyle = '#ffffff';
                lines.forEach((line, i) => {
                    ctx.fillText(line, bx + pad, by + pad + lineH * i + fontSize - 1);
                });
                return dst;
            }
            let dataUrl, filename;
            const lines = _buildAnnotation();
            if (multiViewActive && mvViews.length) {
                // Composite all multiview canvases side by side
                const gap = 12;
                const canvases = mvViews.map(v => v.canvas).filter(c => c.width && c.height);
                if (!canvases.length) return;
                const totalW = canvases.reduce((s, c) => s + c.width, 0) + gap * (canvases.length - 1);
                const totalH = Math.max(...canvases.map(c => c.height));
                const off = document.createElement('canvas');
                off.width = totalW; off.height = totalH;
                const offCtx = off.getContext('2d');
                let x = 0;
                canvases.forEach(c => {
                    offCtx.drawImage(c, x, Math.round((totalH - c.height) / 2));
                    x += c.width + gap;
                });
                dataUrl = _annotateCanvas(off, lines).toDataURL('image/png');
                filename = `multiview_${indices.join('-')}.png`;
            } else {
                dataUrl = _annotateCanvas(canvas, lines).toDataURL('image/png');
                filename = `slice_${indices.join('-')}.png`;
            }
            _downloadFile(dataUrl, filename);
            // Capture to gallery
            _galleryAdd(dataUrl);
            setStatus('Screenshot saved to Downloads.');
            setTimeout(() => setStatus(''), 2000);
        }

        // ── Snapshot Gallery ─────────────────────────────────────
        const _gallerySnapshots = [];
        function _galleryAdd(dataUrl) {
            const now = new Date();

            const snap = {

            };

        function _galleryRenderItem(snap, idx) {

            if (!container) return;

            });

                    const x0 = Math.round(Math.min(roiStart.x, roiEnd.x));
                    const y0 = Math.round(Math.min(roiStart.y, roiEnd.y));
                    const x1 = Math.round(Math.max(roiStart.x, roiEnd.x));
                    const y1 = Math.round(Math.max(roiStart.y, roiEnd.y));
                    _rois.push({type:'rect', x0, y0, x1, y1, stats:null});

        // ROI hover: show stats tooltip over active ROI

            const s = _rois[hitIdx].stats;

            const fmt = v => { const a = Math.abs(v); if (a === 0) return '0'; if (a >= 1e4 || (a < 1e-2 && a > 0)) return v.toExponential(3); return parseFloat(v.toPrecision(4)).toString(); };
            ttip.innerHTML = `<span style="color:${c.stroke};font-weight:bold">${hitIdx+1}</span> ${fmt(s.mean)} \u00B1 ${fmt(s.std)}`;

        /** Compute mosaic grid layout matching server's mosaic_shape(). */
        function _mosaicGridInfo() {
            const n = shape[dim_z];
            let rows = Math.floor(Math.sqrt(n));
            let cols = Math.floor(n / rows);
            while (rows * cols < n) cols++;
            if ((rows - 1) * (cols + 1) === n) { rows--; cols++; }
            const tileW = shape[dim_x < dim_y ? dim_y : dim_x];
            const tileH = shape[dim_x < dim_y ? dim_x : dim_y];
            const GAP = 2;
            return { rows, cols, tileW, tileH, GAP, n };
        }

        canvas.addEventListener('mousemove', (e) => {
            if (rgbMode) return;
            _lastMouseX = e.clientX; _lastMouseY = e.clientY;

            // Mosaic mode: compute tile and local coordinates
            if (dim_z >= 0) {
                if (!_pixelInfoVisible) return;
                const rect = canvas.getBoundingClientRect();
                const mx = Math.floor((e.clientX - rect.left) * canvas.width / rect.width);
                const my = Math.floor((e.clientY - rect.top) * canvas.height / rect.height);
                const g = _mosaicGridInfo();
                const cellW = g.tileW + g.GAP;
                const cellH = g.tileH + g.GAP;
                const col = Math.floor(mx / cellW);
                const row = Math.floor(my / cellH);
                const localX = mx - col * cellW;
                const localY = my - row * cellH;
                const zIdx = row * g.cols + col;
                if (zIdx < 0 || zIdx >= g.n || localX >= g.tileW || localY >= g.tileH || localX < 0 || localY < 0) return;
                // Direct cache lookup for this tile's slice
                const tileIndices = [...indices];
                tileIndices[dim_z] = zIdx;
                const ver = tileIndices.join(',') + ':' + dim_x + ':' + dim_y + ':' + complexMode + ':' + logScale;
                const hkey = sid + ':' + ver;
                const cached = _hoverSliceCache[hkey];
                if (cached && cached.w > 0 && cached.h > 0) {
                    const rawX = flip_x ? (cached.w - 1 - localX) : localX;
                    const rawY = flip_y ? (cached.h - 1 - localY) : localY;
                    if (rawX >= 0 && rawX < cached.w && rawY >= 0 && rawY < cached.h) {
                        const val = cached.slice[rawY * cached.w + rawX];
                        if (Number.isFinite(val)) {
                            showPixelInfo(document.getElementById('main-pixel-info'), _pixelFmt(val), e.clientX, e.clientY);
                        }
                    }
                } else if (!_pixelHoverThrottle) {
                    // Fallback: direct server fetch with tile-local coordinates
                    _pixelHoverThrottle = true;
                    setTimeout(() => { _pixelHoverThrottle = false; }, 50);
                    const params = new URLSearchParams({
                        dim_x: String(dim_x), dim_y: String(dim_y),
                        indices: tileIndices.join(','),
                        px: String(localX), py: String(localY),
                        complex_mode: complexMode,
                    });
                    if (logScale) params.set('log_scale', '1');
                    proxyFetch('/pixel/' + sid + '?' + params)
                        .then(r => r.ok ? r.json() : null)
                        .then(d => {
                            if (!d) return;
                            showPixelInfo(document.getElementById('main-pixel-info'), _pixelFmt(d.value), e.clientX, e.clientY);
                        }).catch(() => {});
                }
                _updateDimbarHover(localX, localY, null, null, zIdx);
                return;
            }

            fetchPixelInfo({
                event: e,
                canvas: canvas,
                sid: sid,
                dimX: dim_x,
                dimY: dim_y,
                indices: indices,
                imgW: canvas.width,
                imgH: canvas.height,
                displayEl: document.getElementById('main-pixel-info'),
                onResult: (d, px, py) => {
                    if (_pixelInfoVisible && !multiViewActive && !compareActive) {
                        _updateDimbarHover(px, py);
                    }
                },
            });
        });
        canvas.addEventListener('mouseleave', () => {
            if (roiDragging) {

            }
            const ttip = document.getElementById('roi-hover-tooltip');

        // Click-to-copy pixel value: shared helper
        function _fmtPixelForCopy(v) {
            if (v === null || v === undefined || !isFinite(v)) return null;
            if (Number.isInteger(v)) return String(v);
            return parseFloat(v.toPrecision(6)).toString();
        }
        async function _copyPixelValue(cvSid, cvDimX, cvDimY, cvIndices, px, py) {
            try {
                const resp = await proxyFetch(`/pixel/${cvSid}?dim_x=${cvDimX}&dim_y=${cvDimY}&indices=${cvIndices.join(',')}&px=${px}&py=${py}&complex_mode=${complexMode}`);
                const d = await resp.json();
                if (d.value === undefined || d.value === null || !isFinite(d.value)) return;
                const txt = _fmtPixelForCopy(d.value);
                if (!txt) return;
                await navigator.clipboard.writeText(txt);
                showToast(`copied: ${txt}`);
            } catch (e) { /* clipboard may fail in non-secure contexts */ }
        }

        function _segShowMethodStatus() {

        async function _segActivate() {
            if (_segActivating) return;
            if (compareActive || multiViewActive || qmriActive) {
                showStatus('segmentation: not available in this mode'); return;
            }
            _segActivating = true;
            _segMethod = 'click';
            showStatus('segmentation: connecting...');
            canvas.style.cursor = 'wait';
            try {
                // Send current axis info for >3D subvolume extraction
                const scrollDim = current_slice_dim >= 0 ? current_slice_dim
                    : indices.findIndex((_, i) => i !== dim_x && i !== dim_y);
                const params = new URLSearchParams({
                    dim_x: String(dim_x), dim_y: String(dim_y),
                    scroll_dim: String(scrollDim >= 0 ? scrollDim : -1),
                    indices: indices.join(','),
                });
                const r = await proxyFetch(`/seg/activate/${sid}?${params}`, { method: 'POST' });
                const d = await r.json();
                if (d.status === 'error') {
                    showToast(`segmentation: ${d.message}`);
                    canvas.style.cursor = 'crosshair';
                    _segActivating = false;
                    return;
                }
                _segMode = true;
                _segOverlaySid = d.overlay_sid || null;

        // Segmentation drawing overlay — reuses the ROI overlay canvas
        function _segCanvasCoord(e) {
            const rect = canvas.getBoundingClientRect();
            return {
                px: Math.floor((e.clientX - rect.left) * canvas.width / rect.width),
                py: Math.floor((e.clientY - rect.top) * canvas.height / rect.height),
                cx: e.clientX, cy: e.clientY,
            };
        }

        function _segDrawOverlay() {
            // Draw current segmentation drawing on the ROI overlay canvas
            const oc = document.getElementById('roi-overlay');
            if (!oc) return;
            const ctx = oc.getContext('2d');
            // Match overlay canvas to main canvas size
            if (oc.width !== canvas.width || oc.height !== canvas.height) {
                oc.width = canvas.width;
                oc.height = canvas.height;
            }
            ctx.clearRect(0, 0, oc.width, oc.height);

            ctx.strokeStyle = 'rgba(232, 122, 175, 0.8)';
            ctx.fillStyle = 'rgba(232, 122, 175, 0.2)';
            ctx.lineWidth = 2;

            if (_segMethod === 'circle' && _segDrawStart && _segDrawPoints.length > 0) {
                const s = _segDrawStart, e = _segDrawPoints[_segDrawPoints.length - 1];
                const cx = (s.px + e.px) / 2, cy = (s.py + e.py) / 2;
                const rx = Math.abs(e.px - s.px) / 2, ry = Math.abs(e.py - s.py) / 2;
                ctx.beginPath();
                ctx.ellipse(cx, cy, rx, ry, 0, 0, 2 * Math.PI);
                ctx.stroke();
                ctx.fill();
            } else if ((_segMethod === 'scribble' || _segMethod === 'lasso') && _segDrawPoints.length > 0) {
                ctx.beginPath();
                ctx.moveTo(_segDrawPoints[0].px, _segDrawPoints[0].py);
                for (let i = 1; i < _segDrawPoints.length; i++) {
                    ctx.lineTo(_segDrawPoints[i].px, _segDrawPoints[i].py);
                }
                if (_segMethod === 'lasso' && _segDrawPoints.length >= 3) {
                    ctx.closePath();
                    ctx.fill();
                }
                ctx.stroke();
            }
        }

        function _segClearDrawOverlay() {
            const oc = document.getElementById('roi-overlay');
            if (!oc) return;
            const ctx = oc.getContext('2d');
            ctx.clearRect(0, 0, oc.width, oc.height);
        }

        async function _segFinishDraw(positive) {
            _segDrawing = false;
            _segClearDrawOverlay();

            if (_segMethod === 'circle' && _segDrawStart && _segDrawPoints.length > 0) {
                // Send as bounding box
                const s = _segDrawStart, e = _segDrawPoints[_segDrawPoints.length - 1];
                const x0 = Math.min(s.px, e.px), y0 = Math.min(s.py, e.py);
                const x1 = Math.max(s.px, e.px), y1 = Math.max(s.py, e.py);
                showStatus('segmentation: predicting...');
                try {
                    const r = await proxyFetch(`/seg/bbox/${sid}`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            dim_x, dim_y, indices: indices.join(','),
                            x0, y0, x1, y1,
                        }),
                    });
                    const d = await r.json();
                    if (d.status === 'error') { showToast(`segmentation: ${d.message}`); }
                    else { _segOverlaySid = d.overlay_sid; _segRefreshOverlay(); }
                } catch (err) { showToast(`segmentation: ${err.message}`); }
            } else if (_segMethod === 'scribble' && _segDrawPoints.length >= 1) {
                showStatus('segmentation: predicting...');
                try {
                    const r = await proxyFetch(`/seg/scribble/${sid}`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            dim_x, dim_y, indices: indices.join(','),
                            points: _segDrawPoints.map(p => [p.px, p.py]),
                            positive,
                        }),
                    });
                    const d = await r.json();
                    if (d.status === 'error') { showToast(`segmentation: ${d.message}`); }
                    else { _segOverlaySid = d.overlay_sid; _segRefreshOverlay(); }
                } catch (err) { showToast(`segmentation: ${err.message}`); }
            } else if (_segMethod === 'lasso' && _segDrawPoints.length >= 3) {
                showStatus('segmentation: predicting...');
                try {
                    const r = await proxyFetch(`/seg/lasso/${sid}`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            dim_x, dim_y, indices: indices.join(','),
                            points: _segDrawPoints.map(p => [p.px, p.py]),
                            positive,
                        }),
                    });
                    const d = await r.json();
                    if (d.status === 'error') { showToast(`segmentation: ${d.message}`); }
                    else { _segOverlaySid = d.overlay_sid; _segRefreshOverlay(); }
                } catch (err) { showToast(`segmentation: ${err.message}`); }
            }
            _segDrawStart = null;
            _segDrawPoints = [];
            _segShowMethodStatus();
        }

        // Click-to-copy: main canvas — track mousedown position

        canvas.addEventListener('mousedown', (e) => {

            if (e.button === 0 && _segMode && _segMethod !== 'click') {
                const c = _segCanvasCoord(e);
                _segDrawing = true;
                _segDrawStart = c;
                _segDrawPoints = [c];

            if (_segDrawing && _segMode && _segMethod !== 'click' && e.button === 0) {
                const positive = !e.shiftKey;
                _segFinishDraw(positive);
                _clickCopyDown = null;

            }
            if (e.button !== 0 || !_clickCopyDown) { _clickCopyDown = null; return; }
            const dx = e.clientX - _clickCopyDown.x, dy = e.clientY - _clickCopyDown.y;
            _clickCopyDown = null;
            if (Math.hypot(dx, dy) >= 3) return; // was a drag, not a click
            // Skip if a mode consumed this click
            if (rectRoiMode || _rulerMode || _zoomSelectDrag) return;

                    proxyFetch(`/clearcache/${sid}`); updateView(); triggerPreload();

            'nifti.toggleRasResample': {
                title: 'Toggle RAS resample (NIfTI oblique scans)',
                when: [],
                run: (ctx, e) => {
                    if (compareActive || qmriActive) {
                        showToast('RAS resample not supported in compare/qMRI mode');
                        return;
                    }
                    if (!spatialMeta) {
                        showToast('RAS resample: not a NIfTI scan');
                        return;
                    }
                    if (!spatialMeta.is_oblique) {
                        const labels = (spatialMeta.axis_labels || []).join('');
                        showToast(`already in canonical RAS (${labels || 'axis-aligned'}) — no resample needed`);
                        return;
                    }
                    const wantOn = !rasResampleActive;
                    showToast(wantOn ? 'resampling to RAS...' : 'reverting to original orientation...');
                    proxyFetch(`/resample_ras/${sid}`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ enabled: wantOn }),
                    }).then(r => r.json()).then(d => {
                        if (d.error) { showToast('RAS resample error: ' + d.error); return; }
                        if (d.skipped) { showToast('RAS resample skipped: ' + d.reason); return; }
                        rasResampleActive = wantOn;
                        // Refresh shape from /info, then re-center indices and refresh
                        // canvases. Because shape changes (e.g. (240,240,155) ->
                        // (293,293,250)), we must re-center indices and use the
                        // mode-appropriate refresh path — updateView() alone is a
                        // no-op in multi-view, which has its own mvViews fetch loop.
                        proxyFetch(`/info/${sid}`).then(r => r.json()).then(info => {
                            if (info && info.shape) {
                                shape = info.shape;
                                // Recenter indices so the new (likely larger)
                                // volume shows its middle slice on each axis.
                                indices = shape.map(s => Math.floor(s / 2));
                            }
                            // Note: /resample_ras already clears render caches
                            // server-side. Do NOT call /clearcache here — that
                            // triggers Session.reset_caches() which must not

                            if (multiViewActive) {

                                // on every pane — mirrors the transpose/
                                // rotateOrFlip refresh pattern.
                                mvViews.forEach(v => {

                                    v.lastW = 0; v.lastH = 0;
                                    v.rendering = false; v.pending = false;
                                });
                                mvViews.forEach(v => { mvDrawFrame(v); mvRender(v); });
                            } else {
                                updateView(); triggerPreload();
                            }
                            renderInfo();
                        });
                        showToast('RAS resample: ' + (wantOn ? 'on' : 'off') + (d.elapsed_ms ? ` (${d.elapsed_ms}ms)` : ''));

                        const ofx = flipDims[oldDimX] || false, ofy = flipDims[oldDimY] || false;

                        // Recompute mvDims and pane definitions in-place

            'histogram.openOrCycle': {

                                }
                                for (const cb of cbs) cb.startAutoDismiss();
                            }
                            showStatus('histogram');

                                v._colorBar.startAutoDismiss();

                    if (qmriActive && qmriMosaicActive) {

                        if (cbs.some(cb => !cb._expanded)) {
                            for (const cb of cbs) { await cb.expand(); cb.startAutoDismiss(); }

                            let label = null;
                            for (const v of qmriViews) {

                                const q = v._mosaicColorBar.cycleQuantile();

        // Command palette -----------------------------------------------------
        function formatKeybind(b) {
            const parts = [];
            if (b.mod) parts.push('Cmd');
            else {
                if (b.ctrl) parts.push('Ctrl');
                if (b.meta) parts.push('Cmd');
            }
            if (b.alt) parts.push('Alt');
            if (b.shift === true) parts.push('Shift');
            let k = b.key;
            if (k === ' ') k = 'Space';
            parts.push(k);
            return parts.join('+');
        }

        let _paletteBuilt = false;
        let _paletteEntries = []; // [{id, title, category, keyStr, li}]
        let _paletteVisible = []; // filtered indices into _paletteEntries (enabled only)
        let _paletteActiveVisIdx = 0;

        function _paletteBuild() {
            const list = document.getElementById('cmd-palette-list');
            list.innerHTML = '';
            _paletteEntries = [];
            const bindsByCmd = {};
            for (const b of keybinds) (bindsByCmd[b.command] = bindsByCmd[b.command] || []).push(b);
            const ids = Object.keys(commands).sort();
            for (const id of ids) {
                const cmd = commands[id];
                const title = cmd.title || id;
                const category = id.split('.')[0];
                const binds = bindsByCmd[id] || [];
                const keyStr = binds.map(formatKeybind).join(', ');
                const li = document.createElement('li');
                li.dataset.cmdId = id;
                const cat = document.createElement('span'); cat.className = 'cmd-cat'; cat.textContent = category;
                const ttl = document.createElement('span'); ttl.className = 'cmd-title'; ttl.textContent = title;
                const key = document.createElement('span'); key.className = 'cmd-key'; key.textContent = keyStr;
                li.appendChild(cat); li.appendChild(ttl); li.appendChild(key);
                li.addEventListener('mousedown', (ev) => {
                    ev.preventDefault();
                    if (li.classList.contains('disabled') || li.classList.contains('hidden')) return;
                    _paletteRun(id);
                });
                list.appendChild(li);
                _paletteEntries.push({ id, title, category, keyStr, li });
            }
        }

        function _paletteFilter(query) {
            const ctx = makeContext(null);
            const q = (query || '').trim().toLowerCase();
            _paletteVisible = [];
            for (let i = 0; i < _paletteEntries.length; i++) {
                const e = _paletteEntries[i];
                const hay = (e.title + ' ' + e.category + ' ' + e.id).toLowerCase();
                const matches = q.length === 0 || hay.indexOf(q) !== -1;
                const enabled = evalWhen(commands[e.id].when, ctx);
                e.li.classList.toggle('hidden', !matches);
                e.li.classList.toggle('disabled', !enabled);
                e.li.classList.remove('active');
                if (matches && enabled) _paletteVisible.push(i);
            }
            _paletteActiveVisIdx = 0;
            _paletteHighlight();
        }

        function _paletteHighlight() {
            for (const e of _paletteEntries) e.li.classList.remove('active');
            if (_paletteVisible.length === 0) return;
            if (_paletteActiveVisIdx < 0) _paletteActiveVisIdx = 0;
            if (_paletteActiveVisIdx >= _paletteVisible.length) _paletteActiveVisIdx = _paletteVisible.length - 1;
            const e = _paletteEntries[_paletteVisible[_paletteActiveVisIdx]];
            e.li.classList.add('active');
            e.li.scrollIntoView({ block: 'nearest' });
        }

        function _paletteRun(id) {
            const cmd = commands[id];
            if (!cmd) return;
            closeCommandPalette();
            try { cmd.run(makeContext(null), null); } catch (err) { console.warn('palette run failed', id, err); }
        }

        function _paletteKey(e) {
            if (e.key === 'Escape') { e.preventDefault(); e.stopPropagation(); closeCommandPalette(); return; }
            if (e.key === 'ArrowDown') { e.preventDefault(); e.stopPropagation(); _paletteActiveVisIdx++; _paletteHighlight(); return; }
            if (e.key === 'ArrowUp') { e.preventDefault(); e.stopPropagation(); _paletteActiveVisIdx--; _paletteHighlight(); return; }
            if (e.key === 'Enter') {
                e.preventDefault(); e.stopPropagation();
                if (_paletteVisible.length === 0) return;
                const entry = _paletteEntries[_paletteVisible[_paletteActiveVisIdx]];
                _paletteRun(entry.id);
                return;
            }
            // Stop other keydown listeners (e.g. the sink dispatcher) from firing while palette is open.
            e.stopPropagation();
        }

        function openCommandPalette() {
            if (paletteOpen) return;
            if (!_paletteBuilt) { _paletteBuild(); _paletteBuilt = true; }
            const root = document.getElementById('cmd-palette');
            const input = document.getElementById('cmd-palette-input');
            paletteOpen = true;
            root.classList.add('visible');
            input.value = '';
            _paletteFilter('');
            setTimeout(() => input.focus(), 0);
        }

        function closeCommandPalette() {
            if (!paletteOpen) return;
            paletteOpen = false;
            document.getElementById('cmd-palette').classList.remove('visible');
            try { sink.focus(); } catch (_) {}
        }

        // Wire palette DOM listeners once the DOM is ready.
        (function _wirePalette() {
            const input = document.getElementById('cmd-palette-input');
            const root = document.getElementById('cmd-palette');
            if (!input || !root) return;
            input.addEventListener('input', () => _paletteFilter(input.value));
            // Capture-phase keydown so we intercept before the sink dispatcher.
            input.addEventListener('keydown', _paletteKey, true);
            root.addEventListener('mousedown', (e) => {
                if (e.target === root) closeCommandPalette();
            });
        })();

        function evalWhen(whenArr, ctx) {
            if (!whenArr || whenArr.length === 0) return true;
            for (const cond of whenArr) {
                const geIdx = cond.indexOf('>=');
                if (geIdx !== -1) {
                    const key = cond.slice(0, geIdx).trim();
                    const n = Number(cond.slice(geIdx + 2).trim());
                    if (!(Number(ctx[key]) >= n)) return false;
                    continue;
                }
                if (cond.charAt(0) === '!') {
                    if (ctx[cond.slice(1)]) return false;
                    continue;
                }
                if (!ctx[cond]) return false;
            }
            return true;
        }

        function dispatchCommand(e) {
            const _modKey = navigator.platform.includes('Mac') ? e.metaKey : e.ctrlKey;
            const matching = keybinds.filter(b => {
                if (b.key !== e.key) return false;
                // Unspecified ctrl/alt/meta/mod ⇒ must be OFF.
                // Shift is special: since bindings use literal characters
                // like 'F' or '{' that inherently require shift on most
                // layouts, `shift` defaults to don't-care unless explicitly
                // set to true/false.
                const needAlt = !!b.alt;
                const needCtrl = !!b.ctrl, needMeta = !!b.meta, needMod = !!b.mod;
                if (b.shift === true && !e.shiftKey) return false;
                if (b.shift === false && e.shiftKey) return false;
                if (!!e.altKey !== needAlt) return false;
                if (needMod) {
                    if (!_modKey) return false;
                    // When `mod` is set, don't also require raw ctrl/meta.
                } else {
                    if (!!e.ctrlKey !== needCtrl) return false;
                    if (!!e.metaKey !== needMeta) return false;
                }
                return true;
            });
            if (matching.length === 0) return false;
            const ctx = makeContext(null);
            for (const b of matching) {
                if (evalWhen(commands[b.command].when, ctx)) {
                    commands[b.command].run(ctx, e);
                    return true;
                }
            }
            console.debug('[cmd] key', e.key, 'had bindings but no when matched', ctx);
            return true;
        }

        /* ── JS: Keyboard Shortcuts ───────────────────────────────── */

        sink.addEventListener('keydown', async (e) => {
            e.preventDefault();
            e.stopImmediatePropagation();
            if (e.key === '?') { setHelpVisible(!helpOverlay.classList.contains('visible')); return; }
            if (helpOverlay.classList.contains('visible')) {
                if (e.key === 'Escape') {
                    setHelpVisible(false);
                    document.getElementById('info-overlay').classList.remove('visible');
                    return;
                }
                if (e.key === 'l' || e.key === 'ArrowRight') {
                    setHelpTab(helpTabIdx + 1);
                    return;
                }
                if (e.key === 'h' || e.key === 'ArrowLeft') {
                    setHelpTab(helpTabIdx - 1);
                    return;
                }
                return;
            }
            if (dispatchCommand(e)) return;
            // Forward Cmd/Ctrl+Shift+[/] to shell for tab cycling
            const modKey = navigator.platform.includes('Mac') ? e.metaKey : e.ctrlKey;
            if (modKey && e.shiftKey && (e.key === '[' || e.key === ']')) {
                reportParent('tab-cycle', { dir: e.key === '[' ? -1 : 1 });
                return;
            }
            const isSpaceKey = e.code === 'Space' || e.key === ' ' || e.key === 'Spacebar';
            if (e.key === 'Escape') {
                if (mipActive) { exitMipMode(); return; }
                helpOverlay.classList.remove('visible');
                document.getElementById('info-overlay').classList.remove('visible');
                return;
            }
        });


        // --------------- Side-by-side compare ---------------
        async function enterCompareModeBySid(targetSid, targetNameHint = '') {
            if (!targetSid || targetSid === sid) {
                showStatus('compare: choose a different session');
                return false;
            }
            try {
                const [baseRes, cmpRes] = await Promise.all([
                    proxyFetch(`/metadata/${sid}`),
                    proxyFetch(`/metadata/${targetSid}`),
                ]);
                if (!baseRes.ok || !cmpRes.ok) {
                    showStatus('compare: could not load session metadata');
                    return false;
                }
                const baseMeta = await baseRes.json();
                const cmpMeta = await cmpRes.json();
                const sameShape = Array.isArray(baseMeta.shape)
                    && Array.isArray(cmpMeta.shape)
                    && baseMeta.shape.length === cmpMeta.shape.length
                    && baseMeta.shape.every((v, i) => Number(v) === Number(cmpMeta.shape[i]));
                if (!sameShape) {
                    showStatus(`shape mismatch [${baseMeta.shape.join(',')}] vs [${cmpMeta.shape.join(',')}]`, 4000);
                }

                if (multiViewActive) exitMultiView();
                if (qmriActive) exitQmri();
                compareSid = targetSid;
                compareName = cmpMeta.name || targetNameHint || targetSid.slice(0, 8);
                compareNameBySid[targetSid] = compareName;
                if (!compareSidList.includes(targetSid) && targetSid !== sid) compareSidList.unshift(targetSid);
                compareBaseName = baseMeta.name || document.getElementById('array-name-text').textContent || 'base';
                compareFrames = [];
                compareDisplaySids = [];
                compareOverflowNotified = false;
                compareRegistrationFrame = null;
                compareRendering = false;
                comparePending = false;
                if (!compareActive) _comparePrevZoom = userZoom;  // save on first enter only
                userZoom = 1.0;
                _zoomAdjustedByUser = false;
                comparePan.reset();
                compareActive = true;
                applyCompareLayout();
                // Persistent per-pane ColorBars exist across all sub-modes.
                _createComparePaneColorBars();
                // Restore-path fix: if snapshot set diffMode > 0, recreate diff center bar
                // (applyStateSnapshot doesn't call _setCompareCenterMode so this is needed).
                if (diffMode > 0 && !_diffCenterCb) _createDiffColorBars();
                _reconcileUI();
                renderInfo();
                updateView();
                requestAnimationFrame(() => { compareScaleCanvases(); renderEggs(); });
                showStatus(`compare: ${compareName}`);
                return true;
            } catch (e) {
                showStatus(`compare failed: ${e.message || e}`);
                return false;
            }
        }

        // ── Multi-session compare entry point (picker-rewrite) ──────────────
        // sids: array of 2–4 session IDs to compare side-by-side.
        // Unlike enterCompareModeBySid(), this does NOT auto-prepend the current sid.
        async function enterCompareModeByMultipleSids(sids) {
            if (!sids || sids.length < 1) return false;
            try {
                if (multiViewActive) exitMultiView();
                if (qmriActive) exitQmri();
                // Use the first sid as the "primary" compareSid for compat with
                // diff / registration (which use compareDisplaySids[0] / [1]).
                compareSid = sids[0];
                compareName = compareNameBySid[sids[0]] || sids[0].slice(0, 8);
                compareBaseName = compareNameBySid[sids[0]] || sids[0].slice(0, 8);
                _compareExplicitSids = [...sids]; // passed directly to getCompareRenderSids()
                // Keep compareSidList in sync for URL state / cycleCompareTarget compat.
                for (const s of sids) {
                    if (!compareSidList.includes(s) && s !== sid) compareSidList.unshift(s);
                }
                compareFrames = [];
                compareDisplaySids = [];
                compareOverflowNotified = false;
                compareRegistrationFrame = null;
                compareRendering = false;
                comparePending = false;
                if (!compareActive) _comparePrevZoom = userZoom;  // save on first enter only
                userZoom = 1.0;
                _zoomAdjustedByUser = false;
                comparePan.reset();
                compareActive = true;
                applyCompareLayout();
                _createComparePaneColorBars();
                // Restore-path fix: if snapshot set diffMode > 0, recreate diff center bar
                if (diffMode > 0 && !_diffCenterCb) _createDiffColorBars();
                _reconcileUI();
                renderInfo();
                updateView();
                requestAnimationFrame(() => { compareScaleCanvases(); renderEggs(); });
                const names = sids.map(s => compareNameBySid[s] || s.slice(0, 8));
                showStatus(`compare: ${names.join(' · ')}`);
                return true;
            } catch (e) {
                showStatus(`compare failed: ${e.message || e}`);
                return false;
            }
        }

        // ── Unified picker ─────────────────────────────────────────────────
        // Single mode: all sessions (including current) + unloaded files.
        // Space toggles selection (up to 4). Enter with 0/1 selected = open;
        // Enter with 2–4 selected = compare those arrays.
        // Returns a Promise resolving to null (cancelled) or { action, sids, names }
        // where action is 'open' or 'compare'.

        async function _fetchPickerData() {
            let sessions = [], fileEntries = [];
            try { const r = await proxyFetch('/sessions'); if (r.ok) sessions = await r.json(); } catch (_) {}
            try {
                const r = await proxyFetch('/listfiles');
                if (r.ok) {
                    const all = await r.json();
                    const loaded = new Set(sessions.map(s => s.filepath).filter(Boolean));
                    fileEntries = all.filter(f => !loaded.has(f.path));
                }
            } catch (_) {}
            return { sessions, fileEntries };
        }

        function _showRamBlockDialog(parentEl, filename, estimatedBytes, availableBytes) {
            const fmt = (b) => {
                if (b >= 1024 ** 3) return (b / 1024 ** 3).toFixed(1) + ' GB';
                return (b / 1024 ** 2).toFixed(0) + ' MB';
            };
            const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
            const overlay = document.createElement('div');
            overlay.className = 'ram-block-overlay';
            overlay.innerHTML = `<div class="ram-block-box">
                <div class="ram-block-icon">⚠</div>
                <div class="ram-block-title">Not enough memory</div>
                <div class="ram-block-detail">
                    <strong>${esc(filename)}</strong> requires ~${fmt(estimatedBytes)}<br>
                    Available RAM: ${fmt(availableBytes)}
                </div>
                <div class="ram-block-hint">Close other instances or free memory to continue</div>
                <button class="ram-block-ok">OK</button>
            </div>`;
            parentEl.appendChild(overlay);
            const btn = overlay.querySelector('.ram-block-ok');
            btn.focus();
            return new Promise(resolve => {
                function dismiss() { overlay.remove(); resolve(); }
                btn.onclick = dismiss;
                overlay.onkeydown = e => {
                    if (e.key === 'Escape' || e.key === 'Enter') { e.preventDefault(); e.stopPropagation(); dismiss(); }
                };
            });
        }

        /* ── JS: File Picker and Session Management ────────────────── */

        function showUnifiedPicker(mode) {
            return new Promise(async resolve => {
                const { sessions, fileEntries } = await _fetchPickerData();
                for (const s of sessions) { if (s.name) compareNameBySid[s.sid] = s.name; }

                const overlay   = document.getElementById('uni-picker');
                if (mode === 'compare') overlay.id = 'compare-picker';
                const listEl    = document.getElementById('uni-picker-list');
                const pilEl     = document.getElementById('uni-picker-mode-pill');
                const hintEl    = document.getElementById('uni-picker-tab-hint');
                const cancelBtn = document.getElementById('uni-picker-cancel');
                const searchEl  = document.getElementById('uni-picker-search');
                const sidebarEl = document.getElementById('uni-picker-sidebar');
                const pickerBox = document.getElementById('uni-picker-box');

                let done = false;
                let _searchTimer = null;
                // Map from sid/filepath → { sid|null, filepath|null, name, isFile, fileObj }
                const _selected = new Map(); // key = sid or filepath → item descriptor

                function cleanup() {
                    overlay.classList.remove('visible');
                    overlay.id = 'uni-picker'; // restore original id
                    cancelBtn.onclick = null;
                    overlay.onkeydown = null;
                    searchEl.oninput = null;
                    if (_searchTimer) { clearTimeout(_searchTimer); _searchTimer = null; }
                    document.getElementById('keyboard-sink').focus();
                }
                function finish(val) {
                    if (done) return; done = true;
                    cleanup(); resolve(val);
                }
                cancelBtn.onclick = () => finish(null);

                function _selCount() { return _selected.size; }

                function _updateHint() {
                    const n = _selCount();
                    if (n === 0) {
                        hintEl.textContent = 'Space to select · Enter to open';
                    } else if (n === 1) {
                        hintEl.textContent = `1 selected · Enter to open · Space to add`;
                    } else {
                        hintEl.textContent = `${n} selected · Enter to compare · Space to toggle`;
                    }
                    pilEl.textContent = n >= 2 ? 'Compare' : 'Open';
                    overlay.style.setProperty('--picker-accent', n >= 2 ? '#4ade80' : 'var(--active-dim)');
                }

                function _updateDimming() {
                    // Find reference shape from first selected item that has a known shape
                    let refShape = null;
                    for (const [key] of _selected) {
                        const el = listEl.querySelector(`[data-key="${CSS.escape(key)}"]`);
                        const shapeAttr = el && el.dataset.shape;
                        if (shapeAttr && shapeAttr !== 'null') { refShape = shapeAttr; break; }
                    }
                    listEl.querySelectorAll('.cp-item').forEach(el => {
                        if (_selected.has(el.dataset.key)) {
                            el.classList.remove('cp-item-dim');
                        } else if (refShape === null) {
                            el.classList.remove('cp-item-dim');
                        } else {
                            const elShape = el.dataset.shape;
                            const mismatch = elShape && elShape !== 'null' && elShape !== refShape;
                            el.classList.toggle('cp-item-dim', mismatch);
                        }
                    });
                }

                function _itemKey(s) { return s.sid || s.filepath || s.path || s.name; }

                function populate(filtSessions, filtFiles) {
                    filtSessions = filtSessions ?? sessions;
                    filtFiles    = filtFiles    ?? fileEntries;
                    listEl.innerHTML = '';
                    const inSearch = !!searchEl.value.trim();

                    // Open tabs section (shell only) — quick-switch between open instances
                    const shellTabs = (window.parent !== window && window.parent.__arrayviewShell && window.parent.tabs)
                        ? window.parent.tabs : null;
                    if (shellTabs && !inSearch) {
                        const tabSids = Object.keys(shellTabs);
                        if (tabSids.length > 1) {
                            const hdr = document.createElement('div');
                            hdr.className = 'cp-section-header'; hdr.textContent = 'Open Tabs';
                            listEl.appendChild(hdr);
                            tabSids.forEach(tabSid => {
                                const tab = shellTabs[tabSid];
                                const tabName = tab.btn ? tab.btn.querySelector('span')?.textContent : tabSid;
                                const isActive = tabSid === sid;
                                const item = document.createElement('div');
                                item.className = 'cp-item' + (isActive ? ' cp-item-current' : '');
                                item.tabIndex = 0;
                                const activeMark = isActive ? `<span class="cp-item-warn">(current)</span>` : '';
                                item.innerHTML = `<span class="cp-tab-icon">⊡</span><span class="cp-item-name">${tabName || tabSid}</span>`
                                    + `<span class="cp-item-right">${activeMark}</span>`;
                                item.onclick = () => {
                                    finish(null);
                                    window.parent.activateTab(tabSid);
                                };
                                item.onmouseenter = () => _setActive(item);
                                item.onkeydown = e => { if (e.key === 'Enter') { e.preventDefault(); item.onclick(); } };
                                listEl.appendChild(item);
                            });
                        }
                    }

                    // Files section
                    if (filtFiles.length) {
                        const hdr = document.createElement('div');
                        hdr.className = 'cp-section-header'; hdr.textContent = 'Files';
                        listEl.appendChild(hdr);
                        filtFiles.forEach(f => {
                            const key = f.path || f.name;
                            const shapeStr = Array.isArray(f.shape) ? `[${f.shape.join(', ')}]`
                                : `${(f.size / 1024 / 1024).toFixed(1)} MB`;
                            const shapeKey = Array.isArray(f.shape) ? JSON.stringify(f.shape) : null;
                            const item = document.createElement('div');
                            item.className = 'cp-item'; item.tabIndex = 0;
                            item.dataset.key = key;
                            if (shapeKey) item.dataset.shape = shapeKey;
                            const cbHtml = `<span class="cp-item-cb" title="select for compare"></span>`;
                            item.innerHTML = `${cbHtml}<span class="cp-item-name">${f.name}</span>`
                                + `<span class="cp-item-right"><span class="cp-item-shape">${shapeStr}</span></span>`;

                            function _refreshSelMark() {
                                const cb = item.querySelector('.cp-item-cb');
                                const sel = _selected.has(key);
                                cb.classList.toggle('checked', sel);
                                cb.textContent = sel ? '✓' : '';
                                item.classList.toggle('cp-item-selected', sel);
                            }
                            function toggleSel(e) {
                                e && e.preventDefault();
                                if (_selected.has(key)) {
                                    _selected.delete(key);
                                } else if (_selCount() < 4) {
                                    // Mark for selection only — actual load happens on Enter
                                    _selected.set(key, { sid: null, filepath: f.path, name: f.name });
                                } else {
                                    showToast('max 4 arrays in compare');
                                    return;
                                }
                                _refreshSelMark(); _updateHint(); _updateDimming();
                            }
                            function openFile() {
                                if (_selCount() <= 1) {
                                    // Open directly
                                    item.classList.add('cp-item-loading');
                                    item.querySelector('.cp-item-right').innerHTML += `<span class="cp-item-warn">loading…</span>`;
                                    proxyFetch('/load', { method: 'POST', headers: { 'Content-Type': 'application/json' },
                                        body: JSON.stringify({ filepath: f.path, name: f.name }),
                                    }).then(r => r.json()).then(async data => {
                                        if (data.error === 'insufficient_memory') {
                                            item.classList.remove('cp-item-loading');
                                            await _showRamBlockDialog(
                                                document.getElementById('uni-picker-box'),
                                                data.filename, data.estimated_bytes, data.available_bytes
                                            );
                                            return;
                                        }
                                        if (data.error) { showToast(`load error: ${data.error}`); finish(null); return; }
                                        finish({ action: 'open', sids: [data.sid], names: [data.name || f.name] });
                                        if (!sid) {
                                            window.location.href = '/?sid=' + data.sid;
                                        } else if (window.parent !== window && window.parent.__arrayviewShell) {
                                            window.parent.addTab(data.sid, data.name || f.name);
                                        } else {
                                            window.open('/?sid=' + data.sid, '_blank');
                                        }
                                    }).catch(() => { showToast('load failed'); finish(null); });
                                } else {
                                    // multi-compare: mark selected, _commitCompare handles loading
                                    if (!_selected.has(key) && _selCount() < 4) _selected.set(key, { sid: null, filepath: f.path, name: f.name });
                                    _commitCompare();
                                }
                            }
                            item.querySelector('.cp-item-cb').onclick = e => { e.stopPropagation(); toggleSel(e); };
                            item.onclick = openFile;
                            item.onmouseenter = () => _setActive(item);
                            item.onkeydown = e => {
                                if (e.key === ' ') { toggleSel(e); return; }
                                if (e.key === 'Enter') { e.preventDefault(); openFile(); }
                            };
                            _refreshSelMark();
                            listEl.appendChild(item);
                        });
                    }

                    if (!filtSessions.length && !filtFiles.length) {
                        const msg = document.createElement('div');
                        msg.style.cssText = 'color:var(--muted);font-size:12px;padding:6px 2px';
                        msg.textContent = inSearch ? 'No matches' : 'No arrays loaded and no supported files found';
                        listEl.appendChild(msg);
                    }
                    _updateHint();
                }

                async function _loadSelectedFiles() {
                    // Load any files that were selected but not yet loaded (sid === null)
                    const items = [..._selected.entries()];
                    for (const [key, item] of items) {
                        if (item.sid) continue;
                        try {
                            const r = await proxyFetch('/load', {
                                method: 'POST', headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ filepath: item.filepath, name: item.name }),
                            });
                            const data = await r.json();
                            if (data.error === 'insufficient_memory') {
                                await _showRamBlockDialog(
                                    document.getElementById('uni-picker-box'),
                                    data.filename, data.estimated_bytes, data.available_bytes
                                );
                                _selected.delete(key);
                                return false;
                            }
                            if (data.error) { showToast(`load error: ${data.error}`); _selected.delete(key); return false; }
                            item.sid = data.sid;
                            item.name = data.name || item.name;
                        } catch { showToast('load failed'); _selected.delete(key); return false; }
                    }
                    return true;
                }

                async function _commitCompare() {
                    const items = [..._selected.values()];
                    if (items.length < 2) return;
                    if (!await _loadSelectedFiles()) return;
                    const sids = items.map(i => i.sid).filter(Boolean);
                    const names = items.map(i => i.name);
                    finish({ action: 'compare', sids, names });
                }

                // ── Search wiring ──────────────────────────────────────────
                searchEl.oninput = () => {
                    if (_searchTimer) clearTimeout(_searchTimer);
                    _searchTimer = setTimeout(() => {
                        _searchTimer = null;
                        const q = searchEl.value.trim().toLowerCase();
                        const filtSessions = q ? sessions.filter(s => (s.name || '').toLowerCase().includes(q)) : sessions;
                        const filtFiles    = q ? fileEntries.filter(f => f.name.toLowerCase().includes(q)) : fileEntries;
                        populate(filtSessions, filtFiles);
                        // Filter sidebar cards too
                        sidebarEl.querySelectorAll('.sidebar-card').forEach(card => {
                            const name = card.querySelector('.sidebar-card-name')?.textContent?.toLowerCase() || '';
                            card.style.display = (!q || name.includes(q)) ? '' : 'none';
                        });
                    }, 100);
                };

                overlay.classList.add('visible');
                overlay.style.setProperty('--picker-accent', 'var(--active-dim)');
                searchEl.value = '';
                searchEl.focus();

                // Populate sidebar with instance previews
                sidebarEl.innerHTML = '';
                if (sessions.length >= 1) {
                    pickerBox.classList.remove('no-sidebar');
                    const hdr = document.createElement('div');
                    hdr.className = 'sidebar-header';
                    hdr.textContent = 'Open Instances';
