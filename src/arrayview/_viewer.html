        function applyFlips(imageData, w, h) {
            if (!flip_x && !flip_y) return imageData;
            const src = imageData.data;
            const out = new Uint8ClampedArray(src.length);
            for (let row = 0; row < h; row++) {
                const srcRow = flip_y ? (h - 1 - row) : row;
                for (let col = 0; col < w; col++) {
                    const srcCol = flip_x ? (w - 1 - col) : col;
                    const si = (srcRow * w + srcCol) * 4;
                    const di = (row * w + col) * 4;
                    out[di] = src[si]; out[di+1] = src[si+1];
                    out[di+2] = src[si+2]; out[di+3] = src[si+3];
                }
            }
            return new ImageData(out, w, h);
        }

        // ── 3-D vector math helpers (used for oblique MPR) ──────────────────────
        function cross3(a, b) {
            return [a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]];
        }
        function dot3(a, b) { return a[0]*b[0]+a[1]*b[1]+a[2]*b[2]; }
        function norm3(a) { return Math.sqrt(dot3(a, a)); }
        function normalize3(a) { const n=norm3(a); return n>1e-12 ? a.map(x=>x/n) : [1,0,0]; }
        /** Rodrigues rotation: rotate v about axis by theta (radians). */
        function rodrigues(v, axis, theta) {
            const k = normalize3(axis), ct = Math.cos(theta), st = Math.sin(theta);
            const vk = dot3(v, k), vc = cross3(k, v);
            return v.map((vi, i) => vi*ct + vc[i]*st + k[i]*vk*(1-ct));
        }

        function _drawArrow(ctx, x1, y1, x2, y2) {
            const dx = x2 - x1, dy = y2 - y1;
            const len = Math.sqrt(dx * dx + dy * dy);
            if (len < 0.5) return;
            ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
            const headLen = Math.min(len * 0.35, 4);
            const angle = Math.atan2(dy, dx);
            ctx.beginPath();
            ctx.moveTo(x2, y2);
            ctx.lineTo(x2 - headLen * Math.cos(angle - Math.PI / 6), y2 - headLen * Math.sin(angle - Math.PI / 6));
            ctx.lineTo(x2 - headLen * Math.cos(angle + Math.PI / 6), y2 - headLen * Math.sin(angle + Math.PI / 6));
            ctx.closePath(); ctx.fill();
        }

        let _vfieldCache = null; // { key, data } — avoids re-fetch when only length changes
        const _mvVfieldCache = new Map();   // viewIndex → {key, data}
        const _mvVfieldAborts = new Map();  // viewIndex → AbortController

        /** Shared arrow-rendering helper used by both single-view and multi-view. */
        function _renderVfieldArrows(targetCanvas, refCanvas, data, flipX, flipY) {
            const dispW = parseInt(refCanvas.style.width)  || refCanvas.width;
            const dispH = parseInt(refCanvas.style.height) || refCanvas.height;
            targetCanvas.style.width  = refCanvas.style.width;
            targetCanvas.style.height = refCanvas.style.height;
            const imgW = refCanvas.width, imgH = refCanvas.height;
            const sx = dispW / imgW, sy = dispH / imgH;
            if (targetCanvas.width !== dispW || targetCanvas.height !== dispH) {
                targetCanvas.width  = dispW;
                targetCanvas.height = dispH;
            }
            const ctx2 = targetCanvas.getContext('2d');
            ctx2.clearRect(0, 0, dispW, dispH);
            ctx2.strokeStyle = 'rgba(80, 200, 90, 0.88)';
            ctx2.fillStyle   = 'rgba(80, 200, 90, 0.88)';
            ctx2.lineWidth = 1.2;
            ctx2.lineCap = 'round';
            const arrowScale = data.scale * (1.4142 ** vfLengthLevel);
            for (const [ix, iy, vx, vy] of data.arrows) {
                const ax = (flipX ? (imgW - 1 - ix) : ix) * sx;
                const ay = (flipY ? (imgH - 1 - iy) : iy) * sy;
                const avx = (flipX ? -vx : vx) * sx;
                const avy = (flipY ? -vy : vy) * sy;
                _drawArrow(ctx2, ax + 0.5, ay + 0.5, ax + 0.5 + avx * arrowScale, ay + 0.5 + avy * arrowScale);
            }
            targetCanvas.style.display = '';
        }

        /** Unpack optional vectorfield trailer from a WS binary frame. */
        function _unpackVfieldTrailer(buf, width, height) {
            const rgbaEnd = 20 + width * height * 4;
            if (buf.byteLength <= rgbaEnd) return null;
            const hdr = new Uint32Array(buf, rgbaEnd, 2);
            const nArrows = hdr[0];
            const stride  = hdr[1];
            const scaleArr = new Float32Array(buf, rgbaEnd + 8, 1);
            const scale = scaleArr[0];
            const arrowData = new Float32Array(buf, rgbaEnd + 12, nArrows * 4);
            const arrows = [];
            for (let i = 0; i < nArrows; i++) {
                const off = i * 4;
                arrows.push([arrowData[off], arrowData[off+1], arrowData[off+2], arrowData[off+3]]);
            }
            return { arrows, scale, stride };
        }

        function _vfieldRender(data) {
            _renderVfieldArrows(vfieldCanvas, canvas, data, flip_x, flip_y);
        }
        async function drawVectorOverlay() {
            if (!hasVectorfield || !vfieldVisible || compareActive || multiViewActive || qmriActive) {
                vfieldCanvas.style.display = 'none';
                return;
            }
            const cacheKey = `${sid},${dim_x},${dim_y},${indices.join(',')},${vfieldT},${vfDensityLevel}`;
            if (_vfieldCache && _vfieldCache.key === cacheKey) {
                // Cached — re-render without fetch (handles length/flip changes)
                _vfieldRender(_vfieldCache.data);
                return;
            }
            // Cancel any in-flight request so only the latest slice wins
            if (_vfieldAbort) _vfieldAbort.abort();
            _vfieldAbort = new AbortController();
            const signal = _vfieldAbort.signal;
            const params = new URLSearchParams({ dim_x, dim_y, indices: indices.join(','), t_index: vfieldT, density_offset: vfDensityLevel });
            try {
                const res = await proxyFetch(`/vectorfield/${sid}?${params}`, { signal });
                if (!res.ok || signal.aborted) return;
                const data = await res.json();
                if (signal.aborted) return;
                _vfieldCache = { key: cacheKey, data };
                _vfieldRender(data);
            } catch (e) {
                if (e.name !== 'AbortError') { /* ignore */ }
            }
        }

        /** Fetch and render vector field overlay for a single multi-view pane. */
        async function mvDrawVectorOverlay(v, viewIndex) {
            const ovCanvas = _getMvVfieldCanvas(v.canvas);
            if (!hasVectorfield || !vfieldVisible) {
                if (ovCanvas) ovCanvas.style.display = 'none';
                return;
            }
            // Build fetch URL — oblique or axis-aligned
            let fetchUrl, cacheKey;
            if (obliqueVecs) {
                const vi = obliqueVecs[viewIndex];
                // Replicate center computation from mvRenderOblique
                const diff = mvDims.map(d => indices[d] - (shape[d] - 1) / 2);
                const depthOff = dot3(diff, vi.n);
                const center3d = [...indices];
                mvDims.forEach((d, k) => { center3d[d] = (shape[d] - 1) / 2 + depthOff * vi.n[k]; });
                const params = new URLSearchParams({
                    center: center3d.join(','),
                    basis_h: vi.bh.join(','),
                    basis_v: vi.bv.join(','),
                    mv_dims: mvDims.join(','),
                    size_w: String(shape[v.dimX]),
                    size_h: String(shape[v.dimY]),
                    density_offset: String(vfDensityLevel),
                    t_index: String(vfieldT),
                });
                fetchUrl = `/oblique_vectorfield/${sid}?${params}`;
                cacheKey = `oblique,${sid},${viewIndex},${center3d.join(',')},${vi.bh.join(',')},${vi.bv.join(',')},${vfieldT},${vfDensityLevel}`;
            } else {
                const relevantIdx = indices.filter((_, i) => i !== v.dimX && i !== v.dimY).join(',');
                const params = new URLSearchParams({
                    dim_x: String(v.dimX), dim_y: String(v.dimY),
                    indices: indices.join(','), t_index: String(vfieldT),
                    density_offset: String(vfDensityLevel)
                });
                fetchUrl = `/vectorfield/${sid}?${params}`;
                cacheKey = `${sid},${v.dimX},${v.dimY},${relevantIdx},${vfieldT},${vfDensityLevel}`;
            }
            const cached = _mvVfieldCache.get(viewIndex);
            if (cached && cached.key === cacheKey) {
                _renderVfieldArrows(ovCanvas, v.canvas, cached.data, obliqueVecs ? false : (flipDims[v.dimX] || false), obliqueVecs ? false : (flipDims[v.dimY] || false));
                return;
            }
            // Abort previous in-flight request for this pane
            _mvVfieldAborts.get(viewIndex)?.abort();
            const ac = new AbortController();
            _mvVfieldAborts.set(viewIndex, ac);
            try {
                const res = await proxyFetch(`/vectorfield/${sid}?${params}`, { signal: ac.signal });
                if (!res.ok || ac.signal.aborted) return;
                const data = await res.json();
                if (ac.signal.aborted) return;
                _mvVfieldCache.set(viewIndex, { key: cacheKey, data });
                _renderVfieldArrows(ovCanvas, v.canvas, data, obliqueVecs ? false : (flipDims[v.dimX] || false), obliqueVecs ? false : (flipDims[v.dimY] || false));
            } catch (e) {
                if (e.name !== 'AbortError') { /* ignore */ }
            }
        }

        /** Redraw vector field overlays on all multi-view panes. */
        function mvDrawAllVectorOverlays() {
            if (!multiViewActive || !hasVectorfield || !vfieldVisible) return;
            mvViews.forEach((v, i) => mvDrawVectorOverlay(v, i));
        }

        function applyMvFlips(v, imageData, w, h) {
            const fx = flipDims[v.dimX] || false;
            const fy = flipDims[v.dimY] || false;
            if (!fx && !fy) return imageData;
            const src = imageData.data;
            const out = new Uint8ClampedArray(src.length);
            for (let row = 0; row < h; row++) {
                const srcRow = fy ? (h - 1 - row) : row;
                for (let col = 0; col < w; col++) {
                    const srcCol = fx ? (w - 1 - col) : col;
                    const si = (srcRow * w + srcCol) * 4;
                    const di = (row * w + col) * 4;
                    out[di] = src[si]; out[di+1] = src[si+1];
                    out[di+2] = src[si+2]; out[di+3] = src[si+3];
                }
            }
            return new ImageData(out, w, h);
        }

        let _wsRetryTimer = null;
        let _wsEverConnected = false;

        /* ── JS: WebSocket and Data Transport ────────────────────── */

        function initWebSocket() {
            if (httpTransport) {
                reportParent('transport-http', { sid });
                wsReady = true;
                setStatus('');
                sink.focus();
                updateView();
                return;
            }
            if (_wsRetryTimer) { clearTimeout(_wsRetryTimer); _wsRetryTimer = null; }
            ws = createTransport(sid, null, null, null, null);

            ws.onopen = () => {
                reportParent('ws-open', { host: location.host });
                _wsEverConnected = true;
                wsReady = true;
                setStatus('');
                sink.focus();
                updateView();
            };

            ws.onmessage = (event) => {
                const buf = event.data;
                const headerU32 = new Uint32Array(buf, 0, 3);
                const seq    = headerU32[0];
                const width  = headerU32[1];
                const height = headerU32[2];
                // Phase 3: cancel delayed spinner — frame arrived in time
                if (wsSlowTimer) { clearTimeout(wsSlowTimer); wsSlowTimer = null; }
                if (wsWatchdogTimer) { clearTimeout(wsWatchdogTimer); wsWatchdogTimer = null; }
                if (compareActive) {
                    isRendering = false;
                    if (pendingRequest) {
                        pendingRequest = false;
                        updateView();
                    }
                    return;
                }

                try {
                    if (seq === wsSentSeq) {
                        const headerF32 = new Float32Array(buf, 12, 2);
                        const serverVmin = headerF32[0];
                        const serverVmax = headerF32[1];
                        if (manualVmin === null) {
                            manualVmin = serverVmin;
                            manualVmax = serverVmax;
                            currentVmin = serverVmin;
                            currentVmax = serverVmax;
                        }

                        const rgba = new Uint8ClampedArray(buf.slice(20, 20 + width * height * 4));
                        const newImageData = new ImageData(rgba, width, height);
                        crossFadeIn(newImageData, width, height);
                        // Show canvas-wrap BEFORE scaleCanvas so fixWrapperAlignment
                        // sees the real childrenH and computes the correct paddingTop.
                        if (document.getElementById('loading-overlay').style.display !== 'none') {
                            // Show canvas-wrap immediately (still invisible due to av-loading opacity:0)
                            document.getElementById('canvas-wrap').style.display = '';
                            if (_isWelcomeScreen) document.getElementById('welcome-hint').classList.add('visible');
                            // Fade out overlay, fade in wrapper contents
                            const ol = document.getElementById('loading-overlay');
                            ol.style.opacity = '0';
                            document.body.classList.remove('av-loading');
                            ol.addEventListener('transitionend', () => { ol.style.display = 'none'; }, { once: true });
                        }
                        scaleCanvas(width, height);
                        if (hasVectorfield && vfieldVisible && !compareActive && !multiViewActive && !qmriActive) {
                            const vfTrailer = _unpackVfieldTrailer(buf, width, height);
                            if (vfTrailer) {
                                const cacheKey = `${sid},${dim_x},${dim_y},${indices.join(',')},${vfieldT},${vfDensityLevel}`;
                                _vfieldCache = { key: cacheKey, data: vfTrailer };
                                _vfieldRender(vfTrailer);
                            } else {
                                drawVectorOverlay();
                            }
                        } else {
                            drawVectorOverlay();
                        }
                        updateMiniMap();
                        if (!_reportedFirstFrame) {
                            _reportedFirstFrame = true;
                            reportParent('frame-rendered', {
                                mode: 'ws',
                                width,
                                height,
                            });
                        }
                    }
                } catch (e) {
                    console.error('[arrayview] onmessage error:', e);
                }

                isRendering = false;
                if (pendingRequest) {
                    pendingRequest = false;
                    updateView();
                } else if (isPlaying) {
                    playNext();
                }
            };

            ws.onclose = () => {
                reportParent('ws-close', { sid });
                wsReady = false;
                // Reset render-state so we don't get stuck when the socket
                // closes while a render is in-flight (isRendering would
                // otherwise stay true and block all future requests).
                isRendering = false;
                pendingRequest = false;
                // Silently retry: server may be restarting or the connection dropped.
                // Back off: 300 ms if we connected before, 500 ms on first-time failure.
                const delay = _wsEverConnected ? 300 : 500;
                _wsRetryTimer = setTimeout(initWebSocket, delay);
            };
            ws.onerror = () => {
                reportParent('ws-error', { sid });
                ws.close();  // onclose fires next and handles retry
            };
        }

        async function decodeBlobToImageData(blob) {
            const bitmap = await createImageBitmap(blob);
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = bitmap.width;
            tempCanvas.height = bitmap.height;
            const tempCtx = tempCanvas.getContext('2d', { willReadFrequently: true });
            tempCtx.drawImage(bitmap, 0, 0);
            return {
                imageData: tempCtx.getImageData(0, 0, bitmap.width, bitmap.height),
                width: bitmap.width,
                height: bitmap.height,
            };
        }

        async function fetchSliceFrame(params, targetSid = sid) {
            const res = await proxyFetch(`/slice/${targetSid}?${params.toString()}`);
            if (!res.ok) {
                throw new Error(`Render failed (${res.status})`);
            }

            const vmin = Number(res.headers.get('X-ArrayView-Vmin'));
            const vmax = Number(res.headers.get('X-ArrayView-Vmax'));
            const blob = await res.blob();
            const decoded = await decodeBlobToImageData(blob);
            return {
                ...decoded,
                vmin,
                vmax,
            };
        }

        async function updateViewHttp() {
            if (isRendering) {
                pendingRequest = true;
                return;
            }

            isRendering = true;
            try {
                reportParent('http-render-start', {
                    sid,
                    dim_x,
                    dim_y,
                    slice_dim: current_slice_dim,
                });
                const params = new URLSearchParams({
                    dim_x: String(dim_x),
                    dim_y: String(dim_y),
                    dim_z: String(dim_z),
                    indices: indices.join(','),
                    colormap: currentColormap(),
                    dr: '0',
                    complex_mode: String(complexMode),
                    log_scale: String(logScale),
                    slice_dim: String(current_slice_dim),
                });
                if (manualVmin !== null && manualVmax !== null) {
                    params.set('vmin_override', String(manualVmin));
                    params.set('vmax_override', String(manualVmax));
                }
                { const _visSid = _getVisibleOverlaySids(); if (_visSid) params.set('overlay_sid', _visSid); if (_visSid && overlay_colors) { const _visCol = _getVisibleOverlayColors(); if (_visCol) params.set('overlay_colors', _visCol); } }
                if (overlay_sid) params.set('overlay_alpha', String(overlayAlpha));
                if (projectionMode > 0) {
                    params.set('projection_mode', String(projectionMode));
                    params.set('projection_dim', String(projectionDim));
                }

                const frame = await fetchSliceFrame(params);
                const vmin = frame.vmin;
                const vmax = frame.vmax;
                if (Number.isFinite(vmin) && Number.isFinite(vmax)) {
                    currentVmin = vmin;
                    currentVmax = vmax;
                    if (manualVmin === null) {
                        manualVmin = vmin;
                        manualVmax = vmax;
                    }
                }

                lastImageData = frame.imageData;
                lastImgW = frame.width;
                lastImgH = frame.height;
                crossFadeIn(frame.imageData, frame.width, frame.height);
                document.getElementById('loading-overlay').style.display = 'none';
                document.getElementById('canvas-wrap').style.display = '';
                scaleCanvas(frame.width, frame.height);
                drawVectorOverlay();
                drawSlimColorbar(cbMarkerFrac);
                updateMiniMap();
                if (!_reportedFirstFrame) {
                    _reportedFirstFrame = true;
                    reportParent('frame-rendered', {
                        mode: 'http',
                            width: frame.width,
                            height: frame.height,
                    });
                }
            } catch (e) {
                const statusMatch = String(e.message || e).match(/\((\d+)\)/);
                if (statusMatch) {
                    reportParent('http-render-http-error', { status: Number(statusMatch[1]) });
                }
                reportParent('http-render-error', { message: e.message || String(e) });
                setStatus(`HTTP render failed: ${e.message || e}`);
            } finally {
                isRendering = false;
                if (pendingRequest) {
                    pendingRequest = false;
                    updateView();
                }
            }
        }

        async function compareRender() {
            if (!compareSid) return;
            if (compareRendering) {
                comparePending = true;
                return;
            }
            compareRendering = true;
            try {
                const params = new URLSearchParams({
                    dim_x: String(dim_x),
                    dim_y: String(dim_y),
                    dim_z: String(dim_z),
                    indices: indices.join(','),
                    colormap: currentColormap(),
                    dr: '0',
                    complex_mode: String(complexMode),
                    log_scale: String(logScale),
                    slice_dim: String(current_slice_dim),
                });
                if (projectionMode > 0) {
                    params.set('projection_mode', String(projectionMode));
                    params.set('projection_dim', String(projectionDim));
                }
                const renderSids = registrationMode ? [sid, compareSid] : getCompareRenderSids();
                const requests = renderSids.map((sidVal, i) => {
                    const reqParams = new URLSearchParams(params.toString());
                    // Shared global range for fair comparison (per-pane overrides respected for manual adjustments)
                    const pVmin = cmpManualVmin[i] ?? manualVmin;
                    const pVmax = cmpManualVmax[i] ?? manualVmax;
                    if (pVmin !== null && pVmax !== null) {
                        reqParams.set('vmin_override', String(pVmin));
                        reqParams.set('vmax_override', String(pVmax));
                    }
                    if (sidVal === sid && overlay_sid) {
                        const _visSid = _getVisibleOverlaySids();
                        if (_visSid) { reqParams.set('overlay_sid', _visSid); if (overlay_colors) { const _visCol = _getVisibleOverlayColors(); if (_visCol) reqParams.set('overlay_colors', _visCol); } }
                        reqParams.set('overlay_alpha', String(overlayAlpha));
                    }
                    return fetchSliceFrame(reqParams, sidVal);
                });
                compareFrames = await Promise.all(requests);
                // Auto-sync to shared range: if no manual range set and frames have
                // different ranges, re-render with the union range for fair comparison.
                if (manualVmin === null && renderSids.length >= 2) {
                    const allPaneNull = renderSids.every((_, i) => cmpManualVmin[i] === null);
                    if (allPaneNull) {
                        const uVmin = Math.min(...compareFrames.map(f => f.vmin));
                        const uVmax = Math.max(...compareFrames.map(f => f.vmax));
                        const alreadySync = compareFrames.every(f =>
                            Math.abs(f.vmin - uVmin) < 1e-10 && Math.abs(f.vmax - uVmax) < 1e-10);
                        if (!alreadySync) {
                            manualVmin = uVmin;
                            manualVmax = uVmax;
                            compareRendering = false;
                            await compareRender();
                            return;
                        }
                    }
                }
                compareDisplaySids = renderSids;
                currentVmin = compareFrames[0].vmin;
                currentVmax = compareFrames[0].vmax;
                applyCompareLayout();
                drawCompareFramesFromCache();
                hideLoadingOverlay();
                if (diffMode > 0) fetchAndDrawDiff();
            } catch (e) {
                setStatus(`Compare render failed: ${e.message || e}`);
            } finally {
                compareRendering = false;
                if (comparePending) {
                    comparePending = false;
                    compareRender();
                    return;
                }
                if (compareActive && isPlaying) {
                    playNext();
                }
            }
        }

        async function fetchAndDrawDiff() {
            if (!diffMode || !compareActive || compareDisplaySids.length < 2) return;
            const [sid_a, sid_b] = compareDisplaySids;
            const params = new URLSearchParams({
                dim_x: String(dim_x),
                dim_y: String(dim_y),
                dim_z: String(dim_z),
                indices: indices.join(','),
                dr: '0',
                complex_mode: String(complexMode),
                log_scale: String(logScale),
                diff_mode: String(diffMode),
            });
            if (_diffCenterColormap) params.set('diff_colormap', _diffCenterColormap);
            if (_diffManualVmin !== null) params.set('vmin_override', String(_diffManualVmin));
            if (_diffManualVmax !== null) params.set('vmax_override', String(_diffManualVmax));
            try {
                const resp = await proxyFetch(`/diff/${sid_a}/${sid_b}?${params}`);
                if (!resp.ok) return;
                const hdrVmin = parseFloat(resp.headers.get('X-ArrayView-Vmin'));
                const hdrVmax = parseFloat(resp.headers.get('X-ArrayView-Vmax'));
                const usedCmap = resp.headers.get('X-ArrayView-Colormap') || '';
                const blob = await resp.blob();
                const bmp = await createImageBitmap(blob);
                const diffCanvas = document.getElementById('compare-diff-canvas');
                diffCanvas.width = bmp.width;
                diffCanvas.height = bmp.height;
                diffCanvas.getContext('2d').drawImage(bmp, 0, 0);
                // Size the diff canvas to match the first compare canvas
                const refCanvas = compareCanvases[0];
                if (refCanvas && refCanvas.style.width) {
                    diffCanvas.style.width = refCanvas.style.width;
                    diffCanvas.style.height = refCanvas.style.height;
                }
                const titleEl = document.getElementById('compare-diff-title');
                if (titleEl) titleEl.innerHTML = _centerModeIndicatorHTML(diffMode);
                _lastDiffVmin = isNaN(hdrVmin) ? 0 : hdrVmin;
                _lastDiffVmax = isNaN(hdrVmax) ? 1 : hdrVmax;
                // Cache gradient stops for the colormap used by the server
                if (usedCmap && COLORMAP_GRADIENT_STOPS[usedCmap]) {
                    _diffCenterColormapStops = COLORMAP_GRADIENT_STOPS[usedCmap];
                } else if (usedCmap) {
                    // Fetch stops from server for unknown colormaps
                    try {
                        const cmResp = await proxyFetch(`/colormap/${encodeURIComponent(usedCmap)}`);
                        if (cmResp.ok) {
                            const cmData = await cmResp.json();
                            COLORMAP_GRADIENT_STOPS[usedCmap] = cmData.gradient_stops;
                            _diffCenterColormapStops = cmData.gradient_stops;
                        }
                    } catch (_) {}
                }
                drawDiffPaneCb(_lastDiffVmin, _lastDiffVmax);
            } catch (e) { /* silently ignore transient errors */ }
        }

        function triggerPreload() {
            if (multiViewActive) return;
            if (shape.length < 3) return;
            preloadActiveDim = current_slice_dim;
            proxyFetch(`/preload/${sid}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    dim_x, dim_y, dim_z,
                    indices: [...indices],
                    colormap: currentColormap(),
                    dr: 0,
                    complex_mode: complexMode,
                    log_scale: logScale,
                    slice_dim: current_slice_dim,
                })
            });
            if (preloadPolling) clearInterval(preloadPolling);
            preloadPolling = setInterval(pollPreloadStatus, 500);
        }

        function pollPreloadStatus() {
            proxyFetch(`/preload_status/${sid}`).then(r => r.json()).then(data => {
                if (data.skipped) {
                    _showPreloadToast('Array too large for full preload (>500 MB).');
                    clearInterval(preloadPolling); preloadPolling = null;
                } else if (data.total > 0 && data.done >= data.total) {
                    _showPreloadToast(null);
                    clearInterval(preloadPolling); preloadPolling = null;
                } else if (data.total > 0) {
                    const pct = Math.round(data.done / data.total * 100);
                    _showPreloadToast(`Preloading dim ${preloadActiveDim}: ${data.done}/${data.total} (${pct}%)`);
                }
            }).catch(() => {
                _showPreloadToast(null);
                clearInterval(preloadPolling); preloadPolling = null;
            });
        }

        function hideLoadingOverlay() {
            document.body.classList.remove('av-loading');

            ol.style.opacity = '';
            ol.style.display = 'none';
            document.getElementById('empty-hint').classList.remove('visible');
        }

        function drawPlasmaDemo() {
            // Plasma colormap LUT (sampled from matplotlib's plasma, 32 stops → interpolated)
            const PLASMA = [
                [13,8,135],[84,2,163],[139,10,165],[185,50,137],[219,92,104],
                [244,136,73],[254,188,43],[240,249,33],
            ];
            function plasmaColor(t) {
                const n = PLASMA.length - 1;
                const i = Math.min(n - 1, Math.floor(t * n));
                const f = t * n - i;
                const [r0,g0,b0] = PLASMA[i], [r1,g1,b1] = PLASMA[i+1];
                return [r0 + f*(r1-r0), g0 + f*(g1-g0), b0 + f*(b1-b0)];
            }
            const W = 320, H = 200;
            canvas.width = W; canvas.height = H;
            const imgData = ctx.createImageData(W, H);
            for (let y = 0; y < H; y++) {
                for (let x = 0; x < W; x++) {
                    const u = x / W, v = y / H;
                    const val = 0.5 + 0.5 * Math.sin(u * 6.28 + 1.2) * Math.cos(v * 6.28 - 0.7)
                              + 0.25 * Math.sin((u + v) * 9.4);
                    const t = Math.max(0, Math.min(1, val));
                    const [r,g,b] = plasmaColor(t);
                    const idx = (y * W + x) * 4;
                    imgData.data[idx] = r; imgData.data[idx+1] = g;
                    imgData.data[idx+2] = b; imgData.data[idx+3] = 255;
                }
            }
            ctx.putImageData(imgData, 0, 0);
            document.body.classList.add('welcome-mode');
            scaleCanvas(W, H);
            document.getElementById('canvas-wrap').style.display = '';
            document.getElementById('welcome-hint').classList.add('visible');
            document.getElementById('info').textContent = '';
        }

        // --watch mode: poll /data_version/{sid} every 1.5 s and re-render on bump.
        let _watchDataVersion = -1;
        let _watchPollTimer = null;
        function _startWatchPoller() {
            if (!sid || _watchPollTimer !== null) return;
            const _doPoll = async () => {
                try {
                    const r = await proxyFetch(`/data_version/${sid}`);
                    if (!r.ok) return;
                    const { version } = await r.json();
                    if (_watchDataVersion === -1) { _watchDataVersion = version; return; }
                    if (version !== _watchDataVersion) {
                        _watchDataVersion = version;
                        // Clear caches and re-render
                        await proxyFetch(`/clearcache/${sid}`);
                        updateView();
                        triggerPreload();
                        renderInfo();
                    }
                } catch (_e) { /* network errors are transient */ }
                _watchPollTimer = setTimeout(_doPoll, 1500);
            };
            _watchPollTimer = setTimeout(_doPoll, 1500);
        }

        /* ── JS: Initialization and Metadata Fetch ────────────────── */

        async function init() {
            // ── Loading screen: show pulsing logo while fetching data ──
            const _loadingOverlay = document.getElementById('loading-overlay');
            if (sid) {
                document.body.classList.add('av-loading');
                const loadLogo = document.getElementById('av-logo-svg').cloneNode(true);
                loadLogo.removeAttribute('id');
                loadLogo.classList.add('av-load-logo', 'av-logo-loading');
                _loadingOverlay.appendChild(loadLogo);
            }

            if (!sid) { hideLoadingOverlay(); drawPlasmaDemo(); return; }
            reportParent('metadata-request', { sid });
            const res = await proxyFetch(`/metadata/${sid}`);
            if (!res.ok) {
                reportParent('metadata-http-error', { status: res.status, sid });
                const msg = res.status === 404 ? 'Session not found or expired.' : `Server error ${res.status} — check Python console for details.`;
                document.getElementById('loading-overlay').innerHTML = `<div style="color:#c55;font-size:18px;font-family:monospace">${msg}</div>`;
                return;
            }
            const data = await res.json();
            reportParent('metadata-loaded', {
                sid,
                shape: data.shape,
                is_complex: data.is_complex || false,
            });
            shape = data.shape;
            isComplex = data.is_complex || false;
            hasVectorfield = data.has_vectorfield || false;
            vfieldNTimes = data.vfield_n_times || 0;
            vfieldT = 0;
            if (!hasVectorfield) vfieldVisible = true;
            rgbMode = data.is_rgb || false;
            spatialMeta = data.spatial_meta || null;
            rasResampleActive = !!data.ras_resample_active;
            if (rgbMode) cbVisible = false;
            if (data.name) {
                _sessionName = data.name;
                document.getElementById('array-name-text').textContent = data.name;
                const loadNameEl = document.createElement('div');
                loadNameEl.className = 'av-load-name';
                loadNameEl.textContent = data.name;
                _loadingOverlay.appendChild(loadNameEl);
            }
            _isWelcomeScreen = data.name === 'welcome';
            if (_isWelcomeScreen) {
                document.body.classList.add('welcome-mode');
            }
            indices = shape.map(s => Math.floor(s / 2));
            // Sane spatial dim defaults: last two dims if they are significantly larger
            // (e.g. (3,4,120,120) → dim_x=2, dim_y=3), otherwise fallback to first two.
            dim_x = 0; dim_y = 1;
            if (shape.length >= 3) {
                const sorted = shape.map((s, i) => [s, i]).sort((a, b) => b[0] - a[0]);
                const top2 = [sorted[0][1], sorted[1][1]].sort((a, b) => a - b);
                if (top2[0] === shape.length - 2 && top2[1] === shape.length - 1) {
                    dim_x = shape.length - 2; dim_y = shape.length - 1;
                }
                // else keep dim_x=0, dim_y=1 (first two are largest or ambiguous)
            }
            // Allow URL override: ?dim_x=N&dim_y=M (set by CLI --dims)
            { const _ux = parseInt(urlParams.get('dim_x')), _uy = parseInt(urlParams.get('dim_y'));
              if (Number.isInteger(_ux) && Number.isInteger(_uy) && _ux >= 0 && _uy >= 0 &&
                  _ux < shape.length && _uy < shape.length && _ux !== _uy) {
                  dim_x = _ux; dim_y = _uy;
              } }
            // Pick current_slice_dim as first dim that is not dim_x or dim_y
            current_slice_dim = 0;
            for (let _i = 0; _i < shape.length; _i++) {
                if (_i !== dim_x && _i !== dim_y) { current_slice_dim = _i; break; }
            }
            activeDim = current_slice_dim;
            // initialize per-dimension flip flags
            flipDims = {};
            for (let i = 0; i < shape.length; i++) flipDims[i] = false;
            // Phase 2: enter normal mode via modeManager (before restoreState so shims are live)
            const _bootSession = { sid: sid, ndim: shape.length, isComplex: isComplex, isRgb: rgbMode };
            await modeManager.enterMode(new NormalLayout(), [_bootSession]);
            restoreStateFromSessionStorage();
            if (stateParam) {
                const decodedUrlState = decodeStateParam(stateParam);
                if (decodedUrlState) applyStateSnapshot(decodedUrlState);
            }
            if (!compareSid && compareSidList.length) compareSid = compareSidList[0];
            initWebSocket();
            _startWatchPoller();  // no-op if server isn't in watch mode; cheap polling
            const restoredCompositeMode = restoreCompositeModeFromSnapshot();
            if (!restoredCompositeMode) triggerPreload();
            if (compareSid && !multiViewActive && !qmriActive) enterCompareModeBySid(compareSid);
        }

        function getModeLabel() {

        const MODE_LABEL = { mag: 'MAGNITUDE', phase: 'PHASE', real: 'REAL', imag: 'IMAG' };
        function renderEggs() {

        function positionEggs() {
            const el = document.getElementById('mode-eggs');
            if (!el || !el.innerHTML) return;
            // Don't reposition while eggs are hidden during histogram expand/collapse —
            // wrap height is animated and would give a wrong anchor.
            if (el.style.display === 'none') return;

            // Fullscreen normal mode: special inline positioning
            if (_fullscreenActive && !multiViewActive && !qmriActive && !compareQmriActive && !compareMvActive) {
                const vpEl = compareActive
                    ? document.getElementById('compare-view-wrap')
                    : document.getElementById('canvas-viewport');
                if (!vpEl) return;
                const vpRect = vpEl.getBoundingClientRect();
                const cbWrap = document.getElementById('slim-cb-wrap');
                const cbRect = cbWrap ? cbWrap.getBoundingClientRect() : null;
                el.style.flexDirection = 'row';
                el.style.alignItems    = 'center';
                el.style.left          = vpRect.left + vpRect.width / 2 + 'px';
                el.style.transform     = 'translateX(-50%)';
                el.style.top           = '';
                el.style.right         = '';
                el.style.bottom        = cbRect
                    ? (window.innerHeight - cbRect.top + 6) + 'px'
                    : (window.innerHeight - vpRect.bottom + 30) + 'px';
                return;
            }

            // Try mode-specific anchor
            const anchorBottom = ModeRegistry.getEggsAnchorBottom();
            if (anchorBottom !== null) {
                el.style.position      = '';
                el.style.bottom        = '';
                el.style.flexDirection  = '';
                el.style.alignItems    = '';
                el.style.right         = '';
                const eggsTop = Math.min(anchorBottom, window.innerHeight - 26);
                el.style.top       = eggsTop + 'px';
                el.style.left      = '50%';
                el.style.transform = 'translateX(-50%)';
                return;
            }

            // Normal (non-fullscreen) mode
            el.style.flexDirection = '';
            el.style.alignItems    = '';
            el.style.right         = '';
            let eggsTop;
            const wrap = document.getElementById('slim-cb-wrap');
            if (wrap && wrap.style.display !== 'none') {
                eggsTop = wrap.getBoundingClientRect().bottom + 12;
            } else {
                eggsTop = canvas.getBoundingClientRect().bottom + 36;
            }
            eggsTop = Math.min(eggsTop, window.innerHeight - 26);
            el.style.top       = eggsTop + 'px';
            el.style.bottom    = '';
            el.style.left      = '50%';
            el.style.transform = 'translateX(-50%)';
            _validateUIState();
        }

        function _positionIsland() {
            const el = document.getElementById('dynamic-island');

                el.style.top = _islandDragPos.y + 'px';
                el.style.transform = 'none';
            } else {
                const cvRect = canvas.getBoundingClientRect();
                // Horizontally: center between left of viewport (0) and left of canvas
                const centerX = cvRect.left / 2;
                el.style.left = Math.max(8, centerX - el.offsetWidth / 2) + 'px';

        function renderIsland() {
            const el = document.getElementById('dynamic-island');

            const active = rectRoiMode ? 'roi' : _segMode ? 'seg' : null;
            if (!active) {

            const isRoi = active === 'roi';

        function _renderRoiRows() {
            const fmt = v => {
                const a = Math.abs(v);
                if (a === 0) return '0';
                if (a >= 1e4 || (a < 1e-2 && a > 0)) return v.toExponential(3);
                return parseFloat(v.toPrecision(4)).toString();
            };
            let html = '';
            for (let i = 0; i < _rois.length; i++) {
                const r = _rois[i];
                const c = _roiColors[i % _roiColors.length];

                html += `<div class="island-row${selected}">`;
                html += `<div class="island-swatch" style="background:${c.stroke}"></div>`;
                html += `<span class="island-name">ROI ${i + 1}</span>`;

                    html += `<span class="island-stats">${fmt(s.mean)} \u00b1 ${fmt(s.std)}</span>`;

                html += `<span class="island-delete" data-roi="${i}" onclick="_islandDeleteRoi(${i})" title="Delete ROI ${i + 1}">\u00d7</span>`;
                html += `</div>`;

        let _segLabelNames = {};  // {labelNumber: 'user name'} — persisted per session

        function _renderSegRows() {
            let html = '';
            if (!_segLabels || !_segLabels.length) return html;
            for (let i = 0; i < _segLabels.length; i++) {
                const l = _segLabels[i];
                const userSet = _segLabelNames[l.label] !== undefined;
                const name = userSet ? _segLabelNames[l.label] : l.name;
                const nameClass = userSet ? 'editable' : 'editable default-name';

                html += `<div class="island-row${selected}">`;
                html += `<div class="island-swatch" style="background:${l.color}"></div>`;
                html += `<span class="island-name ${nameClass}" data-label="${l.label}" onclick="_islandEditSegName(this)" title="Click to rename">${name}</span>`;
                html += `<span class="island-delete" onclick="_islandDeleteSeg(${l.label})" title="Delete segment">\u00d7</span>`;
                html += `</div>`;

        function _islandEditSegName(spanEl) {
            const label = parseInt(spanEl.dataset.label);
            const current = spanEl.textContent;
            const input = document.createElement('input');
            input.type = 'text';
            input.value = current;
            input.style.cssText = 'background:transparent;border:none;border-bottom:1px solid rgba(255,255,255,0.3);color:#ccc;font-size:10px;font-family:var(--mono);width:100%;outline:none;padding:0;';
            spanEl.replaceWith(input);
            input.focus();
            input.select();
            const commit = () => {
                const val = input.value.trim();
                if (val) _segLabelNames[label] = val;
                renderIsland();
            };
            input.addEventListener('blur', commit);
            input.addEventListener('keydown', e => {
                if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
                if (e.key === 'Escape') { input.blur(); }
                e.stopPropagation();  // prevent viewer shortcuts while editing
            });
            input.addEventListener('keypress', e => e.stopPropagation());
            input.addEventListener('keyup', e => e.stopPropagation());

        window._islandEditSegName = _islandEditSegName;

        /* Build a slash with a bottom-to-top gradient fill indicating scroll progress.
           fillColor = bright color for the filled portion, mutedColor for unfilled. */
        function slashFill(pct, fillColor, mutedColor) {
            if (pct <= 0) return `<span class="dim-slash" style="background:linear-gradient(to top,${mutedColor} 0%,${mutedColor} 100%);">/</span>`;
            return `<span class="dim-slash" style="background:linear-gradient(to top,${fillColor} ${pct}%,${mutedColor} ${pct}%);">/</span>`;
        }
        function dimSlash(pct, active, playing, isVfieldT) {
            const style = getComputedStyle(document.documentElement);
            const muted = style.getPropertyValue('--muted').trim();
            const border = style.getPropertyValue('--border').trim();
            let fill;
            if (isVfieldT) fill = style.getPropertyValue('--vfield-t-dim').trim();
            else if (playing) fill = style.getPropertyValue('--playing-dim').trim();
            else if (active) fill = style.getPropertyValue('--active-dim').trim();
            else fill = muted;
            const unfilled = (active || playing || isVfieldT) ? muted : border;
            return slashFill(pct, fill, unfilled);
        }
        /* ── JS: Info Bar and Pixel Display ───────────────────────── */

        function renderInfo() {
            let idxStr = indices.map((v, i) => {
                const active = (i === activeDim);
                const playing = (playingDim >= 0 && i === playingDim);
                const dimCls = playing ? 'playing-dim' : 'active-dim';
                const d = `data-dim="${i}"`;
                if ((qmriActive && i === qmriDim) || (compareQmriActive && i === compareQmriDim)) {
                    return (active || playing) ? `<span class="${dimCls} q-dim dim-label" ${d}>q</span>`
                                  : `<span class="q-dim dim-label" ${d}>q</span>`;
                }
                if (projectionMode > 0 && i === projectionDim) {
                    const pColor = '#a78bfa';  // match mode-badge-proj egg color
                    const cls = (active || playing) ? `${dimCls} dim-label` : 'dim-label';
                    return `<span class="${cls}" ${d} style="color:${pColor}">p<span class="dim-size">/${shape[i]}</span></span>`;
                }
                if (multiViewActive || compareMvActive) {
                    const activeDims = multiViewActive ? mvDims : compareMvDims;
                    const isSpatial = activeDims.includes(i);
                    if (isSpatial) {
                        const pos = activeDims.indexOf(i);
                        const labels = ['x','y','z'];
                        const label = labels[pos] || 'x';
                        const sizeId = label === 'x' ? ' id="dim-x-size"' : label === 'y' ? ' id="dim-y-size"' : label === 'z' ? ' id="dim-z-size"' : '';
                        const prefix = flipDims[i] ? '-' : '';
                        const cls = (active || playing) ? `${dimCls} dim-label` : 'spatial-dim dim-label';
                        return `<span class="${cls}" ${d}>${prefix}${label}<span class="dim-size"${sizeId}>/${shape[i]}</span></span>`;
                    }
                    const pct = Math.round(indices[i] / Math.max(1, shape[i] - 1) * 100);
                    const padded = String(v+1).padStart(String(shape[i]).length, '\u2007');
                    const slash = shape[i] > 1 ? dimSlash(pct, active, playing, false) : '<span class="dim-size">/</span>';
                    const inner = `<span class="dim-idx">${padded}</span>${slash}<span class="dim-size">${shape[i]}</span>`;
                    if (active || playing) return `<span class="${dimCls} dim-label" ${d}>${inner}</span>`;
                    return `<span class="dim-label" ${d}>${inner}</span>`;
                }
                if (i === dim_x) {
                    const inner = (flip_x ? '<span class="muted">-</span>' : '') + 'x' + `<span class="dim-size" id="dim-x-size">/${shape[i]}</span>`;
                    return (active || playing) ? `<span class="${dimCls} dim-label" ${d}>${inner}</span>`
                                  : `<span class="spatial-dim dim-label" ${d}>${inner}</span>`;
                }
                if (i === dim_y) {
                    const inner = (flip_y ? '<span class="muted">-</span>' : '') + 'y' + `<span class="dim-size" id="dim-y-size">/${shape[i]}</span>`;
                    return (active || playing) ? `<span class="${dimCls} dim-label" ${d}>${inner}</span>`
                                  : `<span class="spatial-dim dim-label" ${d}>${inner}</span>`;
                }
                if (i === dim_z) {
                    const inner = `z<span class="dim-size" id="dim-z-size">/${shape[i]}</span>`;
                    return (active || playing) ? `<span class="${dimCls} dim-label" ${d}>${inner}</span>`
                                  : `<span class="spatial-dim dim-label" ${d}>${inner}</span>`;
                }
                const pct = Math.round(indices[i] / Math.max(1, shape[i] - 1) * 100);
                const padded = String(v+1).padStart(String(shape[i]).length, '\u2007');
                const slash = shape[i] > 1 ? dimSlash(pct, active, playing, false) : '<span class="dim-size">/</span>';
                const inner = `<span class="dim-idx">${padded}</span>${slash}<span class="dim-size">${shape[i]}</span>`;
                return (active || playing) ? `<span class="${dimCls} dim-label" ${d}>${inner}</span>`
                              : `<span class="dim-label" ${d}>${inner}</span>`;
            }).join('<span class="dim-sep"> · </span>');
            if (vfieldNTimes > 1) {
                const tActive = activeDim === VFIELD_T_DIM;
                const pct = Math.round(vfieldT / Math.max(1, vfieldNTimes - 1) * 100);
                const paddedT = String(vfieldT + 1).padStart(String(vfieldNTimes).length, '\u2007');
                const slash = dimSlash(pct, tActive, false, true);

        function hideAllPixelInfo() {

        function showPixelInfo(el, text, cx, cy) {
            if (!el || !_pixelInfoVisible) return;
            el.textContent = text;
            el.style.display = 'block';
            if (cx !== undefined && cy !== undefined) {
                const par = el.offsetParent;
                if (par) {
                    const pr = par.getBoundingClientRect();
                    const margin = 8;
                    const elW = el.offsetWidth || 120;
                    const elH = el.offsetHeight || 22;
                    let x = cx - pr.left + margin;
                    let y = cy - pr.top - elH - margin;
                    // Keep inside parent horizontally
                    if (x + elW > pr.width) x = cx - pr.left - elW - margin;
                    if (x < 0) x = margin;
                    if (y < 0) y = cy - pr.top + margin;
                    el.style.left = x + 'px';
                    el.style.top  = y + 'px';
                }
            }
        }

        let _pixelHoverThrottle = false;
        const _pixelFmt = v => {
            const av = Math.abs(v);
            if (av === 0) return '0';
            if (av >= 1e4 || (av < 1e-2 && av > 0)) return v.toExponential(3);
            return parseFloat(v.toPrecision(4)).toString();
        };
        function fetchPixelInfo(opts) {
            const rect = opts.canvas.getBoundingClientRect();
            const px = Math.floor((opts.event.clientX - rect.left) * opts.imgW / rect.width);
            const py = Math.floor((opts.event.clientY - rect.top) * opts.imgH / rect.height);
            if (px < 0 || px >= opts.imgW || py < 0 || py >= opts.imgH) return false;

            // Fast path: use cached raw slice for instant local lookup (never throttled)
            const ver = opts.indices.join(',') + ':' + opts.dimX + ':' + opts.dimY + ':' + complexMode + ':' + logScale;
            let _fpSlice = null, _fpW = 0, _fpH = 0;
            if (_lebesgueSlice && _lebesgueSliceW > 0 && _lebesgueSliceH > 0 && _lebesgueVersion === ver) {
                _fpSlice = _lebesgueSlice; _fpW = _lebesgueSliceW; _fpH = _lebesgueSliceH;
            } else {
                const hkey = (opts.sid || sid) + ':' + ver;
                const cached = _hoverSliceCache[hkey];
                if (cached && cached.w > 0 && cached.h > 0) { _fpSlice = cached.slice; _fpW = cached.w; _fpH = cached.h; }
            }
            if (_fpSlice) {
                const rawX = flip_x ? (_fpW - 1 - Math.floor(px * _fpW / opts.imgW)) : Math.floor(px * _fpW / opts.imgW);
                const rawY = flip_y ? (_fpH - 1 - Math.floor(py * _fpH / opts.imgH)) : Math.floor(py * _fpH / opts.imgH);
                if (rawX >= 0 && rawX < _fpW && rawY >= 0 && rawY < _fpH) {
                    const val = _fpSlice[rawY * _fpW + rawX];
                    if (Number.isFinite(val)) {
                        showPixelInfo(opts.displayEl, _pixelFmt(val), opts.event.clientX, opts.event.clientY);
                        if (opts.onResult) opts.onResult({ value: val }, rawX, rawY);
                        return true;
                    }
                }
            }

            // Slow path: server fetch (throttled — only gates the network call, not the fast path above)
            if (_pixelHoverThrottle) return false;
            _pixelHoverThrottle = true;
            setTimeout(() => { _pixelHoverThrottle = false; }, 50);

            const params = new URLSearchParams({
                dim_x: String(opts.dimX),
                dim_y: String(opts.dimY),
                indices: opts.indices.join(','),
                px: String(px),
                py: String(py),
                complex_mode: complexMode,
            });
            if (logScale) params.set('log_scale', '1');

            proxyFetch('/pixel/' + opts.sid + '?' + params)
                .then(r => r.ok ? r.json() : null)
                .then(d => {
                    if (!d) return;
                    showPixelInfo(opts.displayEl, _pixelFmt(d.value), opts.event.clientX, opts.event.clientY);
                    if (opts.onResult) opts.onResult(d, px, py);
                })
                .catch(() => {});

            return true;
        }

        // ── Param flash on the dimbar (#info) ──────────────────────────
        // Paints a left-to-right colored *edge* on the #info pill whose
        // width encodes the current value of a parameter (playback fps /
        // vfield density / vfield length) within its [min, max] range.
        // When viewing a single array in non-immersive mode, also swaps the
        // array name with a caption ("Playback FPS: 30", etc). Otherwise no
        // text is shown — the edge fill alone is the indicator. The fill +
        // any text swap fade out 1 second after the last press.
        const _DIMBAR_TINTS = {
            fps:     'rgba(245,150, 70, 0.85)',
            density: 'rgba( 90,170,240, 0.85)',
            length:  'rgba(140,220,140, 0.85)',
        };
        let _dimbarFlashTimer = null;
        let _dimbarRevertCleanupTimer = null;
        function _dimbarFillFlash(which, norm01) {
            const el = document.getElementById('info');
            if (!el) return;
            // Cancel any in-flight revert so a new press snaps cleanly.
            el.classList.remove('param-reverting');
            if (_dimbarRevertCleanupTimer) { clearTimeout(_dimbarRevertCleanupTimer); _dimbarRevertCleanupTimer = null; }

            const rect = el.getBoundingClientRect();
            const fillPx = Math.max(0, Math.min(1, norm01)) * rect.width;
            el.style.setProperty('--av-fill-px', fillPx.toFixed(1) + 'px');
            el.style.setProperty('--av-fill-tint', _DIMBAR_TINTS[which] || 'transparent');

            if (_dimbarFlashTimer) clearTimeout(_dimbarFlashTimer);
            _dimbarFlashTimer = setTimeout(() => {
                // Slow fade back to rest: the edge fades in place
                // (tint → transparent), no crawl. --av-fill-px is silently
                // reset to 0 after the fade so the next flash starts from
                // the left.
                el.classList.add('param-reverting');
                el.style.setProperty('--av-fill-tint', 'transparent');
                _dimbarRevertCleanupTimer = setTimeout(() => {
                    el.classList.add('param-reset-silent');
                    el.style.setProperty('--av-fill-px', '0px');
                    void el.offsetWidth;                 // force reflow
                    el.classList.remove('param-reset-silent');
                    el.classList.remove('param-reverting');
                    _dimbarRevertCleanupTimer = null;
                }, 1500);
                _dimbarFlashTimer = null;
            }, 1000);
        }

        function _getVisibleOverlaySids() {

        function showInlinePrompt(message, defaultValue = '') {
            return new Promise(resolve => {
                const overlay = document.getElementById('inline-prompt');
                const msgEl   = document.getElementById('inline-prompt-msg');
                const inputEl = document.getElementById('inline-prompt-input');
                const okBtn   = document.getElementById('inline-prompt-ok');
                const cancelBtn = document.getElementById('inline-prompt-cancel');
                msgEl.textContent = message;
                inputEl.value = defaultValue;
                overlay.classList.add('visible');
                inputEl.focus();
                inputEl.select();
                function cleanup() {
                    overlay.classList.remove('visible');
                    okBtn.onclick = null;
                    cancelBtn.onclick = null;
                    inputEl.onkeydown = null;
                    document.getElementById('keyboard-sink').focus();
                }
                function confirm() { const v = inputEl.value; cleanup(); resolve(v); }
                function cancel()  { cleanup(); resolve(null); }
                okBtn.onclick = confirm;
                cancelBtn.onclick = cancel;
                inputEl.onkeydown = e => {
                    if (e.key === 'Enter')  { e.preventDefault(); confirm(); }
                    if (e.key === 'Escape') { e.preventDefault(); cancel(); }
                };
            });

        function collectStateSnapshot() {
            return {
                colormap_idx,
                indices: [...indices],
                logScale,
                projectionMode,
                projectionDim,
                complexMode,
                complexModeEverUsed,
                flip_x,
                flip_y,
                flipDims: {...flipDims},
                userZoom,
                _zoomSensitivity,
                customColormap,
                themeIdx,
                _pixelInfoVisible,
                dim_x,
                dim_y,
                dim_z,
                current_slice_dim,
                activeDim,
                compareSid,
                compareSidList: [...compareSidList],
                compareName,
                registrationMode,
                compareCenterMode,
                registrationAlpha,
                overlayAlpha,
                viewMode: currentViewMode(),
                mvDims: multiViewActive ? [...mvDims] : null,
                qmriDim: qmriActive ? qmriDim : (compareQmriActive ? compareQmriDim : null),
                manualVmin,
                manualVmax,
                vfieldVisible,
