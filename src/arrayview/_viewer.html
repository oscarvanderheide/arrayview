        }

        // ── Histogram-in-colorbar (morph) ────────────────────────────────────
        const CB_COLLAPSED_H = 18;  // flat colorbar height in CSS px
        const CB_LABEL_H     = 0;   // no label zone — dmin/dmax shown as DOM elements
        let _cbExpandedH  = 18;  // histogram fits within colorbar height (no vertical expansion)
        const _cbAnimDuration = 350; // animation duration in ms (shared with ColorBar class)
        // Legacy animation globals removed (Task 4) — primaryCb owns all animation state
        let _kdeSmooth = null;      // smoothed histogram values (Float64Array, NPTS entries)
        const _KDE_NPTS = 300;      // resolution of the smooth curve

        // Compute expanded height so the histogram island fills the space
        // previously occupied by colorbar island + gap + eggs
        let _cbExpandedHLocked = false; // once computed, lock the height
        function _computeCbExpandedH() {
            if (_cbExpandedHLocked) return; // already locked — don't recompute
            _cbExpandedH = CB_DEFAULT_EXPANDED_H;
            _cbExpandedHLocked = true;
        }

        function _buildKDE() {
            if (!_histData || !_histData.counts || !_histData.counts.length) { _kdeSmooth = null; return; }
            const { counts } = _histData;
            const nBins = counts.length;
            // Auto log-scale for dominant peaks
            const sorted = [...counts].sort((a, b) => a - b);
            const medianCount = sorted[Math.floor(sorted.length / 2)] || 1;
            const maxCount = Math.max(...counts, 1);
            const useLog = maxCount > 20 * medianCount;
            const vals = useLog ? counts.map(c => Math.log1p(c)) : [...counts];
            const vMax = Math.max(...vals, 1);
            // Gaussian kernel smoothing
            const out = new Float64Array(_KDE_NPTS);
            const sigma = _KDE_NPTS / nBins * 1.2; // kernel width in output units
            for (let i = 0; i < nBins; i++) {
                const center = (i + 0.5) / nBins * _KDE_NPTS;
                const h = vals[i] / vMax;
                const r = Math.ceil(sigma * 3);
                for (let j = Math.max(0, Math.floor(center - r)); j < Math.min(_KDE_NPTS, Math.ceil(center + r)); j++) {
                    const d = (j - center) / sigma;
                    out[j] += h * Math.exp(-0.5 * d * d);
                }
            }
            // Normalize to [0, 1]
            let oMax = 0;
            for (let j = 0; j < _KDE_NPTS; j++) if (out[j] > oMax) oMax = out[j];
            if (oMax > 0) for (let j = 0; j < _KDE_NPTS; j++) out[j] /= oMax;
            _kdeSmooth = out;
        }

        function _kdeAt(t) {
            if (!_kdeSmooth) return 0;
            const idx = Math.max(0, Math.min(_KDE_NPTS - 1, Math.floor(t * _KDE_NPTS)));
            const idx2 = Math.min(idx + 1, _KDE_NPTS - 1);
            const f = t * _KDE_NPTS - idx;
            return _kdeSmooth[idx] + (_kdeSmooth[idx2] - _kdeSmooth[idx]) * f;
        }

        // ── ColorBar class ────────────────────────────────────────────────────
        const CB_DEFAULT_EXPANDED_H = 18;
        const CB_KDE_NPTS = 300;
        const CB_HIT_RADIUS = 7;

        /**
         * Reusable colorbar widget with morph renderer (flat bar → histogram shape).
         *
         * @param {Object} opts
         * @param {HTMLElement} opts.container — parent element to append the island into
         * @param {'horizontal'|'vertical'} [opts.orientation='horizontal']
         * @param {string} [opts.id] — unique prefix for element IDs
         * @param {boolean} [opts.interactive=true] — enable wheel/drag/hover
         * @param {function} opts.getStops — returns current colormap gradient stops array
         * @param {function} opts.getRange — returns {vmin, vmax} for current data range
         * @param {function} opts.getWindow — returns {vmin, vmax} for current display window
         * @param {function} opts.setWindow — called with (vmin, vmax) when user drags
         * @param {function} [opts.fetchHistogram] — async, returns {counts, edges, vmin, vmax}
         * @param {function} [opts.onWindowChange] — called after any vmin/vmax change
         * @param {Object} [opts.adoptDOM] — reuse existing DOM elements instead of creating new ones
         *     { wrap, canvas, vminLabel, vmaxLabel, triZone, triVmin, triVmax, colWrap, tooltip }
         */
        class ColorBar {
            constructor(opts) {
                this.opts = opts;
                this.orientation = opts.orientation || 'horizontal';
                this.interactive = opts.interactive !== false;
                this.id = opts.id || ('cb-' + Math.random().toString(36).slice(2, 8));

                // Animation state
                this._expanded = false;
                this._manualExpand = false; // true when expanded via dblclick (no auto-dismiss)
                this._animT = 0;
                this._animTarget = 0;
                this._animFrom = 0;
                this._animStart = 0;
                this._animating = false;
                this._expandedH = CB_DEFAULT_EXPANDED_H;

                // Window fractions (animated)
                this._winVminF = 0;
                this._winVmaxF = 1;
                this._winVminTarget = 0;
                this._winVmaxTarget = 1;
                this._winTransStart = 0;        // performance.now() when transition began
                this._winTransDur = 300;        // transition duration in ms
                this._winVminFrom = 0;          // start value for vmin transition
                this._winVmaxFrom = 1;          // start value for vmax transition

                // Label value animation (number ticker)
                this._labelVmin = null;         // current displayed vmin
                this._labelVmax = null;         // current displayed vmax
                this._labelVminTarget = null;   // target vmin
                this._labelVmaxTarget = null;   // target vmax
                this._labelVminFrom = null;     // start value
                this._labelVmaxFrom = null;
                this._labelTransStart = 0;
                this._labelTransDur = 300;

                // Hover / drag state
                this._hoverFrac = -1;
                this._mouseOver = false;
                this._hoverTimer = null;
                this._dragActive = false;
                this._dragTarget = null;
                this._dragX = null;
                this._hitVminX = null;
                this._hitVmaxX = null;

                // Auto-dismiss
                this._autoDismissTimer = null;
                this._autoDismissPending = false;

                // Colormap preview active flag
                this._cmapActive = false;

                // Histogram / KDE
                this._histData = null;
                this._histVersion = null;
                this._histFetching = false;
                this._kdeSmooth = null;

                // Sync
                this._syncWith = null;
                this._syncing = false;

                // Quantile cycling
                this._quantileIdx = 0;

                // Lebesgue mode callback
                this._onBinHover = opts.onBinHover || null;

                // Build or adopt DOM
                if (opts.adoptDOM) {
                    const d = opts.adoptDOM;
                    this.wrap       = d.wrap;
                    this.canvas     = d.canvas;
                    this.vminLabel  = d.vminLabel;
                    this.vmaxLabel  = d.vmaxLabel;
                    this.triZone    = d.triZone;
                    this.triVmin    = d.triVmin;
                    this.triVmax    = d.triVmax;
                    this.colWrap    = d.colWrap;
                    this.tooltip    = d.tooltip;
                } else {
                    this._buildDOM(opts.container);
                }

                if (this.interactive) this._attachEvents();
            }

            /** Create and append island DOM to container. */
            _buildDOM(container) {
                const isVert = this.orientation === 'vertical';

                // Outer wrap / island
                const wrap = document.createElement('div');
                wrap.className = 'cb-island cb-wrap';
                wrap.dataset.cbId = this.id;
                this.wrap = wrap;

                // vmin / vmax labels
                const vminLabel = document.createElement('span');
                vminLabel.className = 'slim-cb-val';
                this.vminLabel = vminLabel;

                const vmaxLabel = document.createElement('span');
                vmaxLabel.className = 'slim-cb-val';
                this.vmaxLabel = vmaxLabel;

                // Column wrap (canvas + tri-zone)
                const colWrap = document.createElement('div');
                colWrap.className = 'cb-col';
                this.colWrap = colWrap;

                // Canvas
                const canvas = document.createElement('canvas');
                canvas.className = 'cb-canvas';
                this.canvas = canvas;
                colWrap.appendChild(canvas);

                // Triangle zone
                const triZone = document.createElement('div');
                triZone.className = 'cb-tri-zone';
                this.triZone = triZone;

                const triVmin = document.createElement('div');
                triVmin.className = 'slim-cb-tri cb-tri-vmin';
                this.triVmin = triVmin;

                const triVmax = document.createElement('div');
                triVmax.className = 'slim-cb-tri cb-tri-vmax';
                this.triVmax = triVmax;

                triZone.appendChild(triVmin);
                triZone.appendChild(triVmax);
                colWrap.appendChild(triZone);

                // Tooltip
                const tooltip = document.createElement('div');
                tooltip.className = 'cb-tooltip';
                tooltip.style.display = 'none';
                this.tooltip = tooltip;

                // Assemble: vertical puts vmaxLabel at top, vminLabel at bottom
                if (isVert) {
                    wrap.appendChild(vmaxLabel);
                    wrap.appendChild(colWrap);
                    wrap.appendChild(vminLabel);
                } else {
                    wrap.appendChild(vminLabel);
                    wrap.appendChild(colWrap);
                    wrap.appendChild(vmaxLabel);
                }
                wrap.appendChild(tooltip);

                if (container) container.appendChild(wrap);
            }

            /** Build smoothed KDE from this._histData into this._kdeSmooth. */
            _buildKDE() {
                if (!this._histData || !this._histData.counts || !this._histData.counts.length) {
                    this._kdeSmooth = null;
                    return;
                }
                const { counts } = this._histData;
                const nBins = counts.length;
                const sorted = [...counts].sort((a, b) => a - b);
                const medianCount = sorted[Math.floor(sorted.length / 2)] || 1;
                const maxCount = Math.max(...counts, 1);
                const useLog = maxCount > 20 * medianCount;
                const vals = useLog ? counts.map(c => Math.log1p(c)) : [...counts];
                const vMax = Math.max(...vals, 1);
                const out = new Float64Array(CB_KDE_NPTS);
                const sigma = CB_KDE_NPTS / nBins * 1.2;
                for (let i = 0; i < nBins; i++) {
                    const center = (i + 0.5) / nBins * CB_KDE_NPTS;
                    const h = vals[i] / vMax;
                    const r = Math.ceil(sigma * 3);
                    for (let j = Math.max(0, Math.floor(center - r)); j < Math.min(CB_KDE_NPTS, Math.ceil(center + r)); j++) {
                        const d = (j - center) / sigma;
                        out[j] += h * Math.exp(-0.5 * d * d);
                    }
                }
                let oMax = 0;
                for (let j = 0; j < CB_KDE_NPTS; j++) if (out[j] > oMax) oMax = out[j];
                if (oMax > 0) for (let j = 0; j < CB_KDE_NPTS; j++) out[j] /= oMax;
                this._kdeSmooth = out;
            }

            /** Interpolate KDE value at fraction t (0..1). */
            _kdeAt(t) {
                if (!this._kdeSmooth) return 0;
                const idx = Math.max(0, Math.min(CB_KDE_NPTS - 1, Math.floor(t * CB_KDE_NPTS)));
                const idx2 = Math.min(idx + 1, CB_KDE_NPTS - 1);
                const f = t * CB_KDE_NPTS - idx;
                return this._kdeSmooth[idx] + (this._kdeSmooth[idx2] - this._kdeSmooth[idx]) * f;
            }

            /** Vertical colorbar renderer for mosaic mode. */
            _drawVertical() {
                const cvs = this.canvas;
                if (!cvs) return;
                const stops = this.opts.getStops();
                if (!stops || !stops.length) return;
                const dpr = window.devicePixelRatio || 1;
                const aT = this._animT;

                // For vertical: width expands from 8px (collapsed) to 30px (expanded)
                const collapsedW = 8;
                const expandedW = 30;
                const cssW = collapsedW + (expandedW - collapsedW) * aT;
                const cssH = cvs.clientHeight || parseInt(cvs.style.height) || 200;

                cvs.width = Math.round(cssW * dpr);
                cvs.height = Math.round(cssH * dpr);
                cvs.style.width = cssW + 'px';
                // Don't override height — it's set by the mosaic layout

                const ctx = cvs.getContext('2d');
                ctx.clearRect(0, 0, cvs.width, cvs.height);
                ctx.save();
                ctx.scale(dpr, dpr);

                // Compute animated window fractions (same logic as horizontal draw)
                let vminFrac = 0, vmaxFrac = 1;
                if (this._histData) {
                    const { vmin: dmin, vmax: dmax } = this._histData;
                    const range = dmax - dmin || 1;
                    const win = this.opts.getWindow();
                    vminFrac = (win.vmin - dmin) / range;
                    vmaxFrac = (win.vmax - dmin) / range;
                }
                if (this._dragActive) {
                    this._winVminF = vminFrac;
                    this._winVmaxF = vmaxFrac;
                    this._winVminTarget = vminFrac;
                    this._winVmaxTarget = vmaxFrac;
                } else {
                    if (vminFrac !== this._winVminTarget || vmaxFrac !== this._winVmaxTarget) {
                        this._winVminFrom = this._winVminF;
                        this._winVmaxFrom = this._winVmaxF;
                        this._winVminTarget = vminFrac;
                        this._winVmaxTarget = vmaxFrac;
                        this._winTransStart = performance.now();
                    }
                    const elapsed = performance.now() - this._winTransStart;
                    const rawT = Math.min(1, elapsed / this._winTransDur);
                    const t = 1 - Math.pow(1 - rawT, 3);
                    this._winVminF = this._winVminFrom + (this._winVminTarget - this._winVminFrom) * t;
                    this._winVmaxF = this._winVmaxFrom + (this._winVmaxTarget - this._winVmaxFrom) * t;
                }
                const effVmin = this._winVminF * aT;
                const effVmax = 1 - (1 - this._winVmaxF) * aT;

                // Build colormap LUT
                const cmSz = 256;
                const cmLut = new Uint8Array(cmSz * 3);
                const ns = stops.length;
                for (let i = 0; i < cmSz; i++) {
                    const t = i / (cmSz - 1);
                    const fi = t * (ns - 1);
                    const lo = Math.floor(fi), hi = Math.min(lo + 1, ns - 1), f = fi - lo;
                    cmLut[i * 3]     = Math.round(stops[lo][0] * (1 - f) + stops[hi][0] * f);
                    cmLut[i * 3 + 1] = Math.round(stops[lo][1] * (1 - f) + stops[hi][1] * f);
                    cmLut[i * 3 + 2] = Math.round(stops[lo][2] * (1 - f) + stops[hi][2] * f);
                }
                const cmAt = (frac) => {
                    const idx = Math.max(0, Math.min(cmSz - 1, Math.round(frac * (cmSz - 1)))) * 3;
                    return [cmLut[idx], cmLut[idx + 1], cmLut[idx + 2]];
                };

                const hasKDE = this._kdeSmooth && aT > 0;
                const isDark = !document.documentElement.classList.contains('light')
                            && !document.documentElement.classList.contains('solarized');

                // For each row (py from top to bottom)
                for (let py = 0; py < cssH; py++) {
                    const t = 1 - py / cssH;  // top=1 (vmax), bottom=0 (vmin)
                    const inRange = t >= effVmin && t <= effVmax;

                    let r, g, b;
                    if (inRange) {
                        [r, g, b] = cmAt(t);
                    } else {
                        const [cr, cg, cb_] = cmAt(t);
                        r = Math.round(cr + (60 - cr) * aT);
                        g = Math.round(cg + (60 - cg) * aT);
                        b = Math.round(cb_ + (60 - cb_) * aT);
                    }

                    let rowW;
                    if (hasKDE) {
                        const kdeW = Math.max(2, this._kdeAt(t) * (expandedW - 2));
                        rowW = collapsedW + (kdeW - collapsedW) * aT;
                    } else {
                        rowW = cssW;
                    }

                    const alpha = inRange ? 1 : (1 - 0.65 * aT);
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = `rgb(${r},${g},${b})`;
                    ctx.fillRect(0, py, rowW, 1);
                }
                ctx.globalAlpha = 1;

                // Draw horizontal indicator lines at vmin/vmax positions
                if (aT > 0.1) {
                    ctx.globalAlpha = aT;
                    const isFullRange = vminFrac <= 0.005 && vmaxFrac >= 0.995;
                    if (!isFullRange) [effVmin, effVmax].forEach(f => {
                        const y = Math.max(2, Math.min(cssH - 2, Math.round((1 - f) * cssH)));
                        const coreColor = isDark ? 'rgba(255,255,100,0.9)' : 'rgba(180,130,0,0.9)';
                        const outlineColor = isDark ? 'rgba(0,0,0,0.5)' : 'rgba(255,255,255,0.5)';
                        ctx.fillStyle = outlineColor;
                        ctx.fillRect(0, y - 2, cssW, 4);
                        ctx.fillStyle = coreColor;
                        ctx.fillRect(0, y - 1, cssW, 2);
                    });
                    ctx.globalAlpha = 1;
                }

                ctx.restore();
            }

            /**
             * Core morph renderer — draws the colorbar/histogram as one shape.
             * Adapted from the global _cbMorphDraw function.
             */
            draw() {
                const cvs = this.canvas;
                if (!cvs) return;
                if (this._cmapActive) return; // colormap preview showing — don't overdraw

                const isVert = this.orientation === 'vertical';
                if (isVert) {
                    this._drawVertical();
                    return;
                }

                const stops = this.opts.getStops();
                if (!stops || !stops.length) return;

                const dpr = window.devicePixelRatio || 1;
                const cssW = cvs.clientWidth || 200;
                const aT = this._animT;
                const cssH = CB_COLLAPSED_H + (this._expandedH - CB_COLLAPSED_H) * aT;
                cvs.width = Math.round(cssW * dpr);
                cvs.height = Math.round(cssH * dpr);
                cvs.style.height = cssH + 'px';
                // Grow the column wrapper so the island background encompasses the histogram
                if (this.colWrap) this.colWrap.style.height = cssH + 'px';

                const ctx = cvs.getContext('2d');
                ctx.clearRect(0, 0, cvs.width, cvs.height);
                ctx.save();
                ctx.scale(dpr, dpr);

                // Compute target window fractions in data range
                let vminFrac = 0, vmaxFrac = 1;
                if (this._histData) {
                    const { vmin: dmin, vmax: dmax } = this._histData;
                    const range = dmax - dmin || 1;
                    const win = this.opts.getWindow();
                    vminFrac = (win.vmin - dmin) / range;
                    vmaxFrac = (win.vmax - dmin) / range;
                }

                // Lerp animated window fractions toward target (snap during drag)
                if (this._dragActive) {
                    this._winVminF = vminFrac;
                    this._winVmaxF = vmaxFrac;
                    this._winVminTarget = vminFrac;
                    this._winVmaxTarget = vmaxFrac;
                } else {
                    // Detect target change → start new transition from current position
                    if (vminFrac !== this._winVminTarget || vmaxFrac !== this._winVmaxTarget) {
                        this._winVminFrom = this._winVminF;
                        this._winVmaxFrom = this._winVmaxF;
                        this._winVminTarget = vminFrac;
                        this._winVmaxTarget = vmaxFrac;
                        this._winTransStart = performance.now();
                    }
                    const elapsed = performance.now() - this._winTransStart;
                    const rawT = Math.min(1, elapsed / this._winTransDur);
                    const t = 1 - Math.pow(1 - rawT, 3);  // ease-out cubic
                    this._winVminF = this._winVminFrom + (this._winVminTarget - this._winVminFrom) * t;
                    this._winVmaxF = this._winVmaxFrom + (this._winVmaxTarget - this._winVmaxFrom) * t;
                }

                // Animated window edges: full-range when collapsed, window when expanded
                const effVmin = this._winVminF * aT;
                const effVmax = 1 - (1 - this._winVmaxF) * aT;
                const effW = effVmax - effVmin;

                // Build colormap LUT (256 entries)
                const cmSz = 256;
                const cmLut = new Uint8Array(cmSz * 3);
                const ns = stops.length;
                for (let i = 0; i < cmSz; i++) {
                    const t = i / (cmSz - 1);
                    const fi = t * (ns - 1);
                    const lo = Math.floor(fi), hi = Math.min(lo + 1, ns - 1), f = fi - lo;
                    cmLut[i * 3]     = Math.round(stops[lo][0] * (1 - f) + stops[hi][0] * f);
                    cmLut[i * 3 + 1] = Math.round(stops[lo][1] * (1 - f) + stops[hi][1] * f);
                    cmLut[i * 3 + 2] = Math.round(stops[lo][2] * (1 - f) + stops[hi][2] * f);
                }
                const cmAt = (frac) => {
                    const idx = Math.max(0, Math.min(cmSz - 1, Math.round(frac * (cmSz - 1)))) * 3;
                    return [cmLut[idx], cmLut[idx + 1], cmLut[idx + 2]];
                };

                const hasKDE = this._kdeSmooth && aT > 0;
                const labelH = CB_LABEL_H * aT;
                const histTop = labelH;
                const histH = cssH - histTop;

                for (let px = 0; px < cssW; px++) {
                    const t = px / cssW;
                    const inRange = t >= effVmin && t <= effVmax;
                    const cmapT = effW > 0.001 ? (t - effVmin) / effW : 0.5;

                    let r, g, b;
                    if (inRange) {
                        [r, g, b] = cmAt(cmapT);
                    } else {
                        const [cr, cg, cb_] = cmAt(t);
                        r = Math.round(cr + (60 - cr) * aT);
                        g = Math.round(cg + (60 - cg) * aT);
                        b = Math.round(cb_ + (60 - cb_) * aT);
                    }

                    let colH;
                    if (hasKDE) {
                        const kdeH = Math.max(2, this._kdeAt(t) * (this._expandedH - CB_LABEL_H));
                        colH = CB_COLLAPSED_H + (kdeH - CB_COLLAPSED_H) * aT;
                    } else {
                        colH = histH;
                    }

                    const y = cssH - colH;
                    const alpha = inRange ? 1 : (1 - 0.65 * aT);
                    ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
                    ctx.fillRect(px, y, 1, colH);
                }


                // Solid handle lines + value labels in the label zone
                if (aT > 0.1) {
                    ctx.globalAlpha = aT;

                    // Solid handle lines at vmin/vmax. Only skip when BOTH endpoints
                    // are at the data extremes (full range) — otherwise each line must
                    // remain visible even when pressed right against dmin or dmax.
                    const isFullRange = vminFrac <= 0.005 && vmaxFrac >= 0.995;
                    if (!isFullRange) [effVmin, effVmax].forEach(f => {
                        const x = Math.max(2, Math.min(cssW - 2, Math.round(f * cssW)));

                        const lineH = cssH - labelH;
                        const lineTop = labelH;

                        // Sample colormap at this position to determine line visibility
                        const cmIdx = Math.max(0, Math.min(cmSz - 1, Math.round(f * (cmSz - 1)))) * 3;
                        const bgR = cmLut[cmIdx], bgG = cmLut[cmIdx + 1], bgB = cmLut[cmIdx + 2];
                        const bgLum = (0.299 * bgR + 0.587 * bgG + 0.114 * bgB) / 255;

                        // Yellow line color: check if background is too close to yellow
                        const isYellowish = bgR > 180 && bgG > 180 && bgB < 150;

                        // Draw: 1px dark outline + 2px yellow core line, or dark line if yellowish bg
                        const coreColor = isYellowish
                            ? (isDark ? 'rgba(100,180,255,0.9)' : 'rgba(0,80,180,0.9)')
                            : (isDark ? 'rgba(255,255,100,0.9)' : 'rgba(180,130,0,0.9)');
                        const outlineColor = isDark ? 'rgba(0,0,0,0.5)' : 'rgba(255,255,255,0.5)';

                        // Outline (4px wide)
                        ctx.fillStyle = outlineColor;
                        ctx.fillRect(x - 2, lineTop, 4, lineH);
                        // Core line (2px wide)
                        ctx.fillStyle = coreColor;
                        ctx.fillRect(x - 1, lineTop, 2, lineH);
                    });

                    if (labelH > 4 && this._histData) {
                        const { vmin: dmin, vmax: dmax } = this._histData;
                        const win = this.opts.getWindow();
                        const wVmin = win.vmin;
                        const wVmax = win.vmax;
                        const dimColor   = isDark ? 'rgba(255,255,255,0.35)' : 'rgba(0,0,0,0.3)';
                        const brightColor = isDark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.7)';
                        const hoverColor  = isDark ? 'rgba(255,255,255,0.9)' : 'rgba(0,0,0,0.9)';
                        ctx.font = '9px monospace';
                        const charW = ctx.measureText('0').width;
                        const labelY = labelH - 3;
                        const labels = [];
                        labels.push({ x: 1, text: _cbFmtPlain(dmin), align: 'start', color: dimColor, prio: 0 });
                        labels.push({ x: cssW - 1, text: _cbFmtPlain(dmax), align: 'end', color: dimColor, prio: 0 });
                        if (effVmin > 0.01 && effVmin < 0.99) {
                            const vx = Math.round(effVmin * cssW);
                            labels.push({ x: vx, text: _cbFmtPlain(wVmin), align: 'center', color: brightColor, prio: 1 });
                        }
                        if (effVmax > 0.01 && effVmax < 0.99) {
                            const vx = Math.round(effVmax * cssW);
                            labels.push({ x: vx, text: _cbFmtPlain(wVmax), align: 'center', color: brightColor, prio: 1 });
                        }
                        if (this._hoverFrac >= 0 && this._hoverFrac <= 1) {
                            const hoverVal = dmin + this._hoverFrac * (dmax - dmin);
                            const hx = Math.round(this._hoverFrac * cssW);
                            labels.push({ x: hx, text: _cbFmtPlain(hoverVal), align: 'center', color: hoverColor, prio: 2 });
                        }
                        labels.sort((a, b) => b.prio - a.prio);
                        const drawn = [];
                        for (const lbl of labels) {
                            const tw = lbl.text.length * charW;
                            let left, right;
                            if (lbl.align === 'start') { left = lbl.x; right = lbl.x + tw; }
                            else if (lbl.align === 'end') { left = lbl.x - tw; right = lbl.x; }
                            else { left = lbl.x - tw / 2; right = lbl.x + tw / 2; }
                            const overlaps = drawn.some(d => left < d.right + 4 && right > d.left - 4);
                            if (overlaps) continue;
                            ctx.fillStyle = lbl.color;
                            ctx.textAlign = lbl.align;
                            ctx.fillText(lbl.text, lbl.x, labelY);
                            drawn.push({ left, right });
                        }
                        ctx.textAlign = 'start';
                    }
                    ctx.globalAlpha = 1;
                }

                ctx.restore();

                // Update triangle positions
                if (this.triVmin && this.triVmax) {
                    this.triVmin.style.left = (effVmin * 100) + '%';
                    this.triVmax.style.left = (effVmax * 100) + '%';
                }

                // Update hit-test positions
                this._hitVminX = Math.round(effVmin * cssW);
                this._hitVmaxX = Math.round(effVmax * cssW);
            }

            /** Show the colorbar island. */
            show() {
                if (this.wrap) this.wrap.style.display = '';
            }

            /** Hide the colorbar island. */
            hide() {
                if (this.wrap) this.wrap.style.display = 'none';
            }

            /** Remove the island from the DOM and clean up timers. */
            destroy() {
                if (this._hoverTimer) clearTimeout(this._hoverTimer);
                if (this._autoDismissTimer) clearTimeout(this._autoDismissTimer);
                this._detachEvents();
                if (this.wrap && this.wrap.parentNode) this.wrap.parentNode.removeChild(this.wrap);
                this.wrap = null;
                this.canvas = null;
            }

            /** Update vmin/vmax flanking labels from opts.getRange(). */
            updateLabels() {
                const win = this.opts.getWindow();
                const range = this.opts.getRange();
                const vmin = win.vmin ?? range.vmin, vmax = win.vmax ?? range.vmax;

                // If targets changed, start a ticker animation from current displayed value
                if (vmin !== this._labelVminTarget || vmax !== this._labelVmaxTarget) {
                    this._labelVminFrom = this._labelVmin ?? vmin;
                    this._labelVmaxFrom = this._labelVmax ?? vmax;
                    this._labelVminTarget = vmin;
                    this._labelVmaxTarget = vmax;
                    this._labelTransStart = performance.now();
                }

                // Interpolate current label values
                const elapsed = performance.now() - this._labelTransStart;
                const rawT = Math.min(1, elapsed / this._labelTransDur);
                const t = 1 - Math.pow(1 - rawT, 3);  // ease-out cubic
                this._labelVmin = this._labelVminFrom != null
                    ? this._labelVminFrom + (this._labelVminTarget - this._labelVminFrom) * t : vmin;
                this._labelVmax = this._labelVmaxFrom != null
                    ? this._labelVmaxFrom + (this._labelVmaxTarget - this._labelVmaxFrom) * t : vmax;

                if (this.vminLabel) {
                    this.vminLabel.innerHTML = _cbFmt(this._labelVmin);
                    this.vminLabel.style.display = '';
                }
                if (this.vmaxLabel) {
                    this.vmaxLabel.innerHTML = _cbFmt(this._labelVmax);
                    this.vmaxLabel.style.display = '';
                }
            }

            /** Initiate expand (true) or collapse (false) animation. */
            startAnim(expand) {
                this._animFrom = this._animT;
                this._animTarget = expand ? 1 : 0;
                this._animStart = performance.now();
                this.ensureAnimating();
            }

            /** Ensure the animation loop is running (for window fraction transitions). */
            ensureAnimating() {
                if (!this._animating) {
                    this._animating = true;
                    this._animStep();
                }
            }

            /** Single animation frame — time-based ease-out cubic, matching global morph. */
            _animStep() {
                const elapsed = performance.now() - this._animStart;
                const rawT = Math.min(1, elapsed / _cbAnimDuration);
                // Ease-out (fast start, gentle finish) for both expand and collapse
                const easedT = 1 - Math.pow(1 - rawT, 3);
                this._animT = this._animFrom + (this._animTarget - this._animFrom) * easedT;
                if (this.wrap) this.wrap.classList.toggle('cb-expanded', this._animT > 0.05);
                this.draw();
                this.updateLabels();
                if (this.opts.onAnimFrame) this.opts.onAnimFrame(this);
                const morphDone = rawT >= 1;
                const winDone = Math.abs(this._winVminF - this._winVminTarget) < 0.002
                             && Math.abs(this._winVmaxF - this._winVmaxTarget) < 0.002;
                const labelDone = this._labelVminTarget == null ||
                    (Math.abs((this._labelVmin ?? 0) - this._labelVminTarget) < Math.abs(this._labelVminTarget) * 0.001 + 1e-10
                  && Math.abs((this._labelVmax ?? 0) - this._labelVmaxTarget) < Math.abs(this._labelVmaxTarget) * 0.001 + 1e-10);
                if (morphDone && winDone && labelDone) {
                    this._animating = false;
                    return;
                }
                requestAnimationFrame(() => this._animStep());
            }

            /** Public API: expand the colorbar to show histogram. */
            async expand() {
                if (this._expanded) return;
                this._expanded = true;
                if (this.triZone) this.triZone.classList.add('expanded');
                this.updateLabels();
                if (this.opts.fetchHistogram) {
                    this._histFetching = true;
                    this._histData = await this.opts.fetchHistogram();
                    this._histFetching = false;
                }
                this._buildKDE();
                this.startAnim(true);
                if (this.opts.onExpand) this.opts.onExpand();
                if (this._syncWith && !this._syncing) {
                    this._syncWith._syncing = true;
                    await this._syncWith.expand();
                    this._syncWith._syncing = false;
                }
            }

            /** Public API: collapse the colorbar. */
            collapse() {
                if (!this._expanded || this._dragActive) return;
                this._expanded = false;
                this._manualExpand = false;
                this._hitVminX = null;
                this._hitVmaxX = null;
                if (this.tooltip) this.tooltip.style.display = 'none';
                if (this.triZone) this.triZone.classList.remove('expanded');
                this.startAnim(false);
                this.updateLabels();
                if (this.opts.onCollapse) this.opts.onCollapse();
                if (this._syncWith && !this._syncing) {
                    this._syncWith._syncing = true;
                    this._syncWith.collapse();
                    this._syncWith._syncing = false;
                }
            }

            /** Whether the colorbar is currently expanded. */
            get expanded() {
                return this._expanded;
            }

            /** Re-fetch histogram when data is stale. */
            async refreshHistogram() {
                if (!this._expanded || this._histFetching || !this.opts.fetchHistogram) return;
                this._histFetching = true;
                this._histData = await this.opts.fetchHistogram();
                this._histFetching = false;
                this._buildKDE();
                this.draw();
            }

            /** Auto-collapse after a delay (ms). */
            startAutoDismiss(ms = 3000) {
                this.cancelAutoDismiss();
                this._autoDismissTimer = setTimeout(() => {
                    this._autoDismissTimer = null;
                    if (this._mouseOver) {
                        this._autoDismissPending = true;
                        return;
                    }
                    if (this._expanded && !this._dragActive) this.collapse();
                }, ms);
            }

            /** Clear auto-dismiss timer and pending flag. */
            cancelAutoDismiss() {
                if (this._autoDismissTimer) {
                    clearTimeout(this._autoDismissTimer);
                    this._autoDismissTimer = null;
                }
                this._autoDismissPending = false;
            }

            /** Cycle through quantile presets; returns {vmin, vmax, label} or null. */
            cycleQuantile() {
                if (!this._expanded || !this._histData) return null;
                const presets = ColorBar.QUANTILE_PRESETS;
                this._quantileIdx = (this._quantileIdx + 1) % presets.length;
                const preset = presets[this._quantileIdx];
                const label = preset.label;
                if (preset.lo === 0 && preset.hi === 1) {
                    if (this._syncWith) this._syncWith._quantileIdx = this._quantileIdx;
                    // Use histogram's true data range instead of null (which falls back to per-slice 1-99%)
                    return { vmin: this._histData.vmin, vmax: this._histData.vmax, label };
                }
                const { counts, edges } = this._histData;
                const total = counts.reduce((s, c) => s + c, 0) || 1;
                let cum = 0;
                let qLo = edges[0];
                for (let i = 0; i < counts.length; i++) {
                    cum += counts[i];
                    if (cum / total >= preset.lo) { qLo = edges[i + 1]; break; }
                }
                cum = 0;
                let qHi = edges[edges.length - 1];
                for (let i = counts.length - 1; i >= 0; i--) {
                    cum += counts[i];
                    if (cum / total >= (1 - preset.hi)) { qHi = edges[i]; break; }
                }
                if (this._syncWith) this._syncWith._quantileIdx = this._quantileIdx;
                return { vmin: qLo, vmax: qHi, label };
            }

            /** Attach all event handlers. Called once from constructor if interactive. */
            _attachEvents() {
                // Wheel zoom on canvas
                this.canvas.addEventListener('wheel', (e) => {
                    e.preventDefault();
                    const win = this.opts.getWindow();
                    if (win.vmin == null) return;
                    const factor = e.deltaY > 0 ? 1.1 : 1 / 1.1;
                    const center = (win.vmin + win.vmax) / 2;
                    const half = (win.vmax - win.vmin) / 2;
                    const newHalf = half * factor;
                    const newVmin = center - newHalf;
                    const newVmax = center + newHalf;
                    this.opts.setWindow(newVmin, newVmax);
                    this.draw();
                    if (this.opts.onWindowChange) this.opts.onWindowChange();
                    this._syncInteraction('wheel', { vmin: newVmin, vmax: newVmax });
                }, { passive: false });

                // Mousedown on canvas
                this.canvas.addEventListener('mousedown', (e) => {
                    if (e.button !== 0) return;
                    if (this._expanded && this._histData) {
                        const rect = this.canvas.getBoundingClientRect();
                        const x = e.clientX - rect.left;
                        const target = this._hitTest(x);
                        if (target) {
                            this._startClimDrag(target, e);
                            return;
                        }
                    }
                    this._dragX = e.clientX;
                });

                // Dblclick toggles histogram expand/collapse
                this.canvas.addEventListener('dblclick', (e) => {
                    if (this._expanded) {
                        this._manualExpand = false;
                        this.collapse();
                        this.cancelAutoDismiss();
                    } else {
                        this._manualExpand = true;
                        this.expand();
                        // No auto-dismiss — user explicitly toggled via dblclick
                        this.cancelAutoDismiss();
                    }
                });

                // Dblclick on vmin/vmax labels for inline editing
                const _editLabel = (labelEl, which) => {
                    _showCbValPopup(labelEl, which,
                        () => { const w = this.opts.getWindow(); return which === 'vmin' ? w.vmin : w.vmax; },
                        (v) => {
                            const w = this.opts.getWindow();
                            if (which === 'vmin') this.opts.setWindow(v, w.vmax);
                            else this.opts.setWindow(w.vmin, v);
                            this.draw();
                            if (this.opts.onWindowChange) this.opts.onWindowChange();
                        }
                    );
                };
                if (this.vminLabel) {
                    this.vminLabel.addEventListener('dblclick', (e) => {
                        e.stopPropagation();
                        _editLabel(this.vminLabel, 'vmin');
                    });
                }
                if (this.vmaxLabel) {
                    this.vmaxLabel.addEventListener('dblclick', (e) => {
                        e.stopPropagation();
                        _editLabel(this.vmaxLabel, 'vmax');
                    });
                }

                // Mousedown on tri handles
                if (this.triVmin) {
                    this.triVmin.addEventListener('mousedown', (e) => {
                        if (this._expanded && this._histData) this._startClimDrag('vmin', e);
                    });
                }
                if (this.triVmax) {
                    this.triVmax.addEventListener('mousedown', (e) => {
                        if (this._expanded && this._histData) this._startClimDrag('vmax', e);
                    });
                }

                // Mouseenter/leave on wrap
                this.wrap.addEventListener('mouseenter', () => {
                    this._mouseOver = true;
                });
                this.wrap.addEventListener('mouseleave', () => {
                    this._mouseOver = false;
                    if (this._hoverFrac >= 0) {
                        this._hoverFrac = -1;
                        this.draw();
                        if (this.tooltip) this.tooltip.style.display = 'none';
                        if (this._onBinHover) this._onBinHover(-1, -1);
                    }
                    if (this._autoDismissPending && !this._dragActive) {
                        this._autoDismissPending = false;
                        this.collapse();
                    } else if (this._expanded && !this._dragActive && !this._autoDismissTimer && !this._manualExpand) {
                        if (this._hoverTimer) clearTimeout(this._hoverTimer);
                        this._hoverTimer = setTimeout(() => {
                            this._hoverTimer = null;
                            this.collapse();
                        }, 200);
                    }
                });

                // Global mousemove and mouseup
                this._onMouseMove = (e) => this._handleMouseMove(e);
                this._onMouseUp   = (e) => this._handleMouseUp(e);
                window.addEventListener('mousemove', this._onMouseMove);
                window.addEventListener('mouseup',   this._onMouseUp);
            }

            /** Remove global window listeners. Called by destroy(). */
            _detachEvents() {
                if (this._onMouseMove) {
                    window.removeEventListener('mousemove', this._onMouseMove);
                    this._onMouseMove = null;
                }
                if (this._onMouseUp) {
                    window.removeEventListener('mouseup', this._onMouseUp);
                    this._onMouseUp = null;
                }
            }

            /** Returns 'vmin', 'vmax', or null based on hit-test of x pixel. */
            _hitTest(x) {
                if (this._hitVminX != null && Math.abs(x - this._hitVminX) <= CB_HIT_RADIUS) return 'vmin';
                if (this._hitVmaxX != null && Math.abs(x - this._hitVmaxX) <= CB_HIT_RADIUS) return 'vmax';
                return null;
            }

            /** Begin a clim threshold drag. */
            _startClimDrag(target, e) {
                e.preventDefault();
                e.stopPropagation();
                this._dragTarget = target;
                this._dragActive = true;
                document.body.style.cursor = 'ew-resize';
            }

            /** Handle global mousemove — drives both threshold drag and pan. */
            _handleMouseMove(e) {
                if (!this.canvas) return;
                const rect = this.canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const cssW = rect.width || this.canvas.clientWidth || 200;

                if (this._dragTarget) {
                    // Clim threshold drag
                    const frac = Math.max(0, Math.min(1, x / cssW));
                    const hd = this._histData;
                    if (!hd) return;
                    const val = hd.vmin + frac * (hd.vmax - hd.vmin);
                    const win = this.opts.getWindow();
                    const curVmin = win.vmin != null ? win.vmin : hd.vmin;
                    const curVmax = win.vmax != null ? win.vmax : hd.vmax;
                    let newVmin = curVmin, newVmax = curVmax;
                    if (this._dragTarget === 'vmin') {
                        newVmin = Math.min(val, curVmax - 1e-10);
                        newVmax = curVmax;
                    } else {
                        newVmin = curVmin;
                        newVmax = Math.max(val, curVmin + 1e-10);
                    }
                    this.opts.setWindow(newVmin, newVmax);
                    this.draw();
                    if (this.opts.onWindowChange) this.opts.onWindowChange();
                    this._syncInteraction('drag', { vmin: newVmin, vmax: newVmax });
                } else if (this._dragX != null) {
                    // Pan drag
                    const dx = e.clientX - this._dragX;
                    this._dragX = e.clientX;
                    const win = this.opts.getWindow();
                    if (win.vmin == null) return;
                    const range = win.vmax - win.vmin;
                    const shift = -(dx / cssW) * range;
                    const newVmin = win.vmin + shift;
                    const newVmax = win.vmax + shift;
                    this.opts.setWindow(newVmin, newVmax);
                    this.draw();
                    if (this.opts.onWindowChange) this.opts.onWindowChange();
                    this._syncInteraction('pan', { vmin: newVmin, vmax: newVmax });
                } else if (this._mouseOver && this._expanded) {
                    // Hover — update hoverFrac and cursor
                    const frac = Math.max(0, Math.min(1, x / cssW));
                    const inCanvas = x >= 0 && x <= cssW;
                    if (inCanvas) {
                        this._hoverFrac = frac;
                        const hit = this._hitTest(x);
                        this.canvas.style.cursor = hit ? 'ew-resize' : 'crosshair';
                        this.draw();
                        // Show floating tooltip with value (styled like cv-pixel-info)
                        if (this.tooltip && this._histData) {
                            const { vmin: dmin, vmax: dmax } = this._histData;
                            const hoverVal = dmin + frac * (dmax - dmin);
                            this.tooltip.textContent = _cbFmtPlain(hoverVal);
                            this.tooltip.style.display = 'block';
                            // Position relative to the canvas within the wrap
                            const cvsRect = this.canvas.getBoundingClientRect();
                            const wrapRect = this.tooltip.parentElement.getBoundingClientRect();
                            const absX = cvsRect.left + frac * cvsRect.width - wrapRect.left;
                            this.tooltip.style.left = absX + 'px';
                            this.tooltip.style.transform = 'translateX(-50%)';
                            this.tooltip.style.top = '-18px';
                        }
                        if (this._onBinHover && this._histData && this._hoverFrac >= 0) {
                            const nBins = this._histData.counts?.length || 64;
                            const binIdx = Math.min(nBins - 1, Math.max(0, Math.floor(this._hoverFrac * nBins)));
                            this._onBinHover(binIdx, this._hoverFrac);
                        }
                    } else if (this._hoverFrac >= 0) {
                        this._hoverFrac = -1;
                        this.canvas.style.cursor = '';
                        this.draw();
                        if (this.tooltip) this.tooltip.style.display = 'none';
                        if (this._onBinHover) this._onBinHover(-1, -1);
                    }
                } else if (this._hoverFrac >= 0) {
                    this._hoverFrac = -1;
                    this.draw();
                    if (this._onBinHover) this._onBinHover(-1, -1);
                }

        // ─ 1. DisplayState ─────────────────────────────────────────────────

        function makeDisplayState(overrides) {
            overrides = overrides || {};

                vmin: null,
                vmax: null,
                quantileIdx: -1,
                windowLocked: false,

                // Colormap

                customCmapName: null,
                customGradientStops: null,

                // Display modifiers
                logScale: false,

                flipAxes: {},

                obliqueVecs: null,

                // Overlay (server-composited)
                overlaySids: [],
                overlayAlpha: 0.45,
                overlayVisible: true,

                // Hover / UI
                pixelInfoVisible: true,
            }, overrides);

            return JSON.stringify(s);
        }

        function deserializeDisplayState(str) {
            return Object.assign(makeDisplayState(), JSON.parse(str));
        }

            return Object.assign({}, base, patch);

                        cmapIdx: ds.cmapIdx,
                        vmin: ds.vmin,

                        projectionDim: ds.projectionDim,

        async function _fetchVolumeHistogram(opts = {}) {

                parts.push(`${i}:${indices[i]}`);
            }
            return `${dx}:${dy}:${sd}:${parts.join(',')}:${complexMode}`;
        }

        /**
         * In unlocked mode, clear manualVmin/manualVmax so the next render
         * uses the server's per-slice 1-99% range (effectively recomputing
         * vmin/vmax from whatever data is currently visible). Called from
         * navigation paths so every j/k/h/l press in unlocked mode picks up
         * the new slice's range.
         */
        function _maybeAutoRecomputeRange() {
            if (rangeLocked) return;
            manualVmin = null;
            manualVmax = null;
            cmpManualVmin.fill(null);
            cmpManualVmax.fill(null);
            if (multiViewActive) {
                mvViews.forEach(v => { v.lockedVmin = null; v.lockedVmax = null; });
            }
            if (qmriActive) {
                qmriViews.forEach(v => { v.lockedVmin = null; v.lockedVmax = null; });
            }
            if (compareMvActive) {
                compareMvViews.forEach(v => { v.lockedVmin = null; v.lockedVmax = null; });
            }
            if (compareQmriActive) {
                compareQmriViews.forEach(v => { v.lockedVmin = null; v.lockedVmax = null; });
            }
        }

        /** Briefly pulse the dimbar labels that were sampled for the volume histogram. */
        function _pulseHistDims() {
            const info = document.getElementById('info');
            if (!info) return;

                scopeDims = [...mvDims];

                scopeDims = [dim_x, dim_y];
                if (sd >= 0 && sd !== dim_x && sd !== dim_y) scopeDims.push(sd);

            scopeDims.forEach(d => {

            setTimeout(() => {

        const _QUANTILE_PRESETS = [
            { label: 'full range', lo: 0,    hi: 1    },
            { label: '1\u201399%', lo: 0.01, hi: 0.99 },
            { label: '5\u201395%', lo: 0.05, hi: 0.95 },
            { label: '10\u201390%', lo: 0.10, hi: 0.90 },
        ];

        /**
         * Cycle to the next quantile preset and apply it to _histData,
         * setting manualVmin/manualVmax (and per-pane/per-view equivalents).
         * Returns the applied preset, or null if no histogram data is available.
         */
        function _cycleQuantilePreset() {
            if (!_histData || !_histData.counts) return null;
            if (window._dQuantileIdx == null) window._dQuantileIdx = 0;
            window._dQuantileIdx = (window._dQuantileIdx + 1) % _QUANTILE_PRESETS.length;
            const preset = _QUANTILE_PRESETS[window._dQuantileIdx];
            if (preset.lo === 0 && preset.hi === 1) {
                manualVmin = _histData.vmin;
                manualVmax = _histData.vmax;
            } else {
                const { counts, edges, vmin: dmin, vmax: dmax } = _histData;
                const total = counts.reduce((a, b) => a + b, 0);
                let cumLo = 0, cumHi = 0;
                let qLo = dmin, qHi = dmax;
                for (let i = 0; i < counts.length; i++) {
                    cumLo += counts[i];
                    if (cumLo / total >= preset.lo) { qLo = edges[i]; break; }
                }
                for (let i = counts.length - 1; i >= 0; i--) {
                    cumHi += counts[i];
                    if (cumHi / total >= (1 - preset.hi)) { qHi = edges[i + 1]; break; }
                }
                manualVmin = qLo;
                manualVmax = qHi;
            }
            cmpManualVmin.fill(null); cmpManualVmax.fill(null);
            if (multiViewActive) mvViews.forEach(v => { v.lockedVmin = manualVmin; v.lockedVmax = manualVmax; });
            return preset;
        }

        /**
         * (Re)start the 3-second auto-dismiss timer for the expanded histogram.
         * If the mouse is still hovering when the timer fires, defer until mouseleave.
         */
        function _restartHistAutoDismiss() {
            if (_histAutoDismissTimer) clearTimeout(_histAutoDismissTimer);
            _histAutoDismissTimer = setTimeout(() => {
                _histAutoDismissTimer = null;
                if (!primaryCb._mouseOver && primaryCb._expanded) {

                        drawSlimColorbar(cbMarkerFrac);

                    _histAutoDismissPending = true;

            }, 3000);

        /** Fetch histogram for all compare sessions and merge bins element-wise. */
        async function _fetchHistogramCompare() {
            if (_histFetching) return;
            _histFetching = true;
            const allSids = getCompareRenderSids();
            const fetchDimX = dim_x;
            const fetchDimY = dim_y;
            const params = new URLSearchParams({
                dim_x: fetchDimX,
                dim_y: fetchDimY,
                indices: indices.join(','),
                complex_mode: complexMode,
                bins: 64,
            });
            try {
                const histPromises = allSids.map(s =>
                    proxyFetch(`/histogram/${s}?${params}`).then(r => r.ok ? r.json() : null)
                );
                const allHists = await Promise.all(histPromises);
                const valid = allHists.filter(Boolean);
                if (!valid.length) { _histFetching = false; return; }
                // Start from first valid result, then sum counts from the rest
                const merged = JSON.parse(JSON.stringify(valid[0]));
                for (let i = 1; i < valid.length; i++) {
                    const h = valid[i];
                    for (let j = 0; j < merged.counts.length && j < h.counts.length; j++) {
                        merged.counts[j] += h.counts[j];
                    }
                    // Expand vmin/vmax to union range
                    if (h.vmin < merged.vmin) merged.vmin = h.vmin;
                    if (h.vmax > merged.vmax) merged.vmax = h.vmax;
                }
                _histData = merged;
                _histDataVersion = indices.join(',') + ':' + fetchDimX + ':' + fetchDimY + ':compare';
            } catch (_) { _histData = null; }
            _histFetching = false;
            return _histData;
        }

        async function _fetchDiffHistogram() {
            if (!diffMode || !compareActive || compareDisplaySids.length < 2) return null;
            const [sid_a, sid_b] = compareDisplaySids;
            const params = new URLSearchParams({
                dim_x: String(dim_x),
                dim_y: String(dim_y),
                dim_z: String(dim_z),
                indices: indices.join(','),
                complex_mode: String(complexMode),
                log_scale: String(logScale),
                diff_mode: String(diffMode),
                bins: '64',
            });
            try {
                const resp = await proxyFetch(`/diff-histogram/${sid_a}/${sid_b}?${params}`);

        // ── Lebesgue integral mode ──────────────────────────────────────────
        const lebesgueCanvas = document.getElementById('lebesgue-canvas');
        const lebesgueCtx = lebesgueCanvas ? lebesgueCanvas.getContext('2d') : null;
        // Per-session Lebesgue slice cache for compare mode
        // { [sid]: { slice: Float32Array, w: int, h: int, version: string } }
        const _lebesguePerSession = {};
        // Per-view hover slice cache keyed by "sid:indices:dimX:dimY:complex:log"
        const _hoverSliceCache = {};

        async function _fetchHoverSlice(fetchSid, fetchDimX, fetchDimY, fetchIndices) {
            const key = fetchSid + ':' + fetchIndices.join(',') + ':' + fetchDimX + ':' + fetchDimY + ':' + complexMode + ':' + logScale;
            if (_hoverSliceCache[key]) return _hoverSliceCache[key];
            const params = new URLSearchParams({
                dim_x: fetchDimX, dim_y: fetchDimY,
                indices: fetchIndices.join(','),
                complex_mode: complexMode,
                log_scale: logScale,
            });
            try {
                const resp = await proxyFetch(`/lebesgue/${fetchSid}?${params}`);
                if (!resp.ok) return null;
                const w = parseInt(resp.headers.get('X-ArrayView-Width')) || 0;
                const h = parseInt(resp.headers.get('X-ArrayView-Height')) || 0;
                const buf = await resp.arrayBuffer();
                const entry = { slice: new Float32Array(buf), w, h };
                _hoverSliceCache[key] = entry;
                return entry;
            } catch (_) { return null; }
        }

        function _prefetchHoverSlices() {
            if (qmriActive) {
                qmriViews.forEach(v => {
                    const qi = [...indices]; qi[qmriDim] = v.qmriIdx;
                    _fetchHoverSlice(sid, dim_x, dim_y, qi);
                });
            } else if (multiViewActive) {
                mvViews.forEach(v => _fetchHoverSlice(sid, v.dimX, v.dimY, indices));
            } else if (compareQmriActive) {
                compareQmriViews.forEach(v => {
                    const qi = [...indices]; qi[compareQmriDim] = v.qmriIdx;
                    _fetchHoverSlice(v.sid, dim_x, dim_y, qi);
                });
            } else if (compareMvActive) {
                compareMvViews.forEach(v => _fetchHoverSlice(v.sid, v.dimX, v.dimY, indices));
            } else if (compareActive) {
                compareDisplaySids.forEach(s => { if (s) _fetchHoverSlice(s, dim_x, dim_y, indices); });
            } else if (dim_z >= 0) {
                // Mosaic: pre-fetch each z-tile slice
                const n = shape[dim_z];
                for (let z = 0; z < n; z++) {
                    const ti = [...indices]; ti[dim_z] = z;
                    _fetchHoverSlice(sid, dim_x, dim_y, ti);
                }
            }
        }

        /** Debounced prefetch — safe to call on every wheel / key event. */
        function _debouncedHoverPrefetch() {
            if (!_pixelInfoVisible && !lebesgueMode) return;
            clearTimeout(_hoverPrefetchTimer);
            _hoverPrefetchTimer = setTimeout(() => {
                _fetchLebesgueSlice();
                if (_pixelInfoVisible) _prefetchHoverSlices();
            }, 80);

        async function _fetchLebesgueSliceForSid(fetchSid, fetchDimX, fetchDimY) {
            const params = new URLSearchParams({
                dim_x: fetchDimX, dim_y: fetchDimY,
                indices: indices.join(','),
                complex_mode: complexMode,
                log_scale: logScale,
            });
            const ver = indices.join(',') + ':' + fetchDimX + ':' + fetchDimY + ':' + complexMode + ':' + logScale;
            const cached = _lebesguePerSession[fetchSid];
            if (cached && cached.version === ver) return cached;
            try {
                const resp = await proxyFetch(`/lebesgue/${fetchSid}?${params}`);
                if (!resp.ok) return null;
                const w = parseInt(resp.headers.get('X-ArrayView-Width')) || 0;
                const h = parseInt(resp.headers.get('X-ArrayView-Height')) || 0;
                const buf = await resp.arrayBuffer();
                const entry = { slice: new Float32Array(buf), w, h, version: ver };
                _lebesguePerSession[fetchSid] = entry;
                return entry;
            } catch (_) { return null; }
        }

        async function _fetchLebesgueSlice() {
            if (!sid || !indices.length) return;
            // Abort any in-flight fetch so rapid slice changes always fetch the latest
            if (_lebesgueFetchCtrl) _lebesgueFetchCtrl.abort();
            const ctrl = new AbortController();
            _lebesgueFetchCtrl = ctrl;
            try {
                if (compareActive) {
                    const sids = getCompareRenderSids();
                    await Promise.all(sids.map(s => _fetchLebesgueSliceForSid(s, dim_x, dim_y)));
                    if (ctrl.signal.aborted) return;
                    const first = _lebesguePerSession[sids[0]];
                    if (first) {
                        _lebesgueSlice = first.slice;
                        _lebesgueSliceW = first.w;
                        _lebesgueSliceH = first.h;
                        _lebesgueVersion = first.version;
                    }
                } else {
                    const entry = await _fetchLebesgueSliceForSid(sid, dim_x, dim_y);
                    if (ctrl.signal.aborted) return;
                    if (entry) {
                        _lebesgueSlice = entry.slice;
                        _lebesgueSliceW = entry.w;
                        _lebesgueSliceH = entry.h;
                        _lebesgueVersion = entry.version;
                    } else {
                        _lebesgueSlice = null;
                    }
                }
            } catch (_) { /* aborted or network error */ }
            if (_lebesgueFetchCtrl === ctrl) _lebesgueFetchCtrl = null;
        }

        function _clearLebesgueOverlay() {
            if (lebesgueCanvas) {
                lebesgueCanvas.style.display = 'none';
                if (lebesgueCtx) lebesgueCtx.clearRect(0, 0, lebesgueCanvas.width, lebesgueCanvas.height);
            }
            // Clear per-pane overlays (compare / multiview)
            document.querySelectorAll('.lebesgue-overlay').forEach(el => {
                el.style.display = 'none';

        /** Highlight a single histogram bin region on the morph with a bright column. */
        function _highlightHistBin(binIdx) {
            if (!_histData || !_histData.counts || !_histData.counts.length) return;
            const nBins = _histData.counts.length;
            if (binIdx < 0 || binIdx >= nBins) return;
            const sCtx = slimCbCanvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;
            const cssW = slimCbCanvas.clientWidth || slimCbCanvas.width / dpr;
            const cssH = CB_COLLAPSED_H + (_cbExpandedH - CB_COLLAPSED_H) * primaryCb._animT;
            const binW = cssW / nBins;
            const binCenter = (binIdx + 0.5) / nBins;
            const colH = _kdeSmooth ? Math.max(2, _kdeAt(binCenter) * _cbExpandedH) : cssH;
            const x = binIdx * binW;
            const y = cssH - colH;
            sCtx.restore();
        }

        /** Draw Lebesgue highlight on a single overlay canvas using the given slice data. */
        function _drawLebesgueOnCanvas(overlayCv, targetCv, sliceData, sliceW, sliceH, binLow, binHigh) {
            const octx = overlayCv.getContext('2d');
            if (!octx) return;
            const cw = targetCv.width, ch = targetCv.height;
            if (overlayCv.width !== cw || overlayCv.height !== ch) {
                overlayCv.width = cw; overlayCv.height = ch;
            }
            overlayCv.style.width = targetCv.style.width;
            overlayCv.style.height = targetCv.style.height;
            const sx = cw / sliceW, sy = ch / sliceH;
            const fx = flip_x, fy = flip_y;
            octx.clearRect(0, 0, cw, ch);
            octx.fillStyle = 'rgba(0,0,0,0.55)';
            octx.fillRect(0, 0, cw, ch);
            octx.globalCompositeOperation = 'destination-out';
            octx.fillStyle = 'rgba(0,0,0,1)';
            octx.beginPath();
            for (let py = 0; py < sliceH; py++) {
                for (let px = 0; px < sliceW; px++) {
                    const val = sliceData[py * sliceW + px];
                    if (val >= binLow && val < binHigh) {
                        const dx = fx ? (sliceW - 1 - px) : px;
                        const dy = fy ? (sliceH - 1 - py) : py;
                        const x0 = Math.floor(dx * sx);
                        const y0 = Math.floor(dy * sy);
                        const x1 = Math.min(cw, Math.ceil((dx + 1) * sx));
                        const y1 = Math.min(ch, Math.ceil((dy + 1) * sy));
                        octx.rect(x0, y0, x1 - x0, y1 - y0);
                    }
                }
            }
            octx.fill();
            octx.globalCompositeOperation = 'source-over';
            overlayCv.style.display = '';
        }

        /** Get or create a Lebesgue overlay canvas for a given target canvas. */
        function _getLebesgueOverlay(targetCv) {
            const parent = targetCv.parentElement;
            if (!parent) return null;
            let overlay = parent.querySelector('.lebesgue-overlay');
            if (!overlay) {
                overlay = document.createElement('canvas');
                overlay.className = 'lebesgue-overlay';
                overlay.style.cssText = 'position:absolute;top:0;left:0;pointer-events:none;display:none;background:transparent;';
                parent.appendChild(overlay);
            }
            return overlay;
        }

        /** Get or create a vector field overlay canvas for a multi-view pane. */
        function _getMvVfieldCanvas(targetCv) {
            const parent = targetCv.parentElement;
            if (!parent) return null;
            let ov = parent.querySelector('.mv-vfield-overlay');
            if (!ov) {
                ov = document.createElement('canvas');
                ov.className = 'mv-vfield-overlay';
                ov.style.cssText = 'position:absolute;top:0;left:0;pointer-events:none;display:none;background:transparent;';
                parent.appendChild(ov);
            }
            return ov;
        }

        function _drawLebesgueHighlight(binLow, binHigh) {
            if (compareActive) {
                // Highlight on all compare panes
                const sids = getCompareRenderSids();
                sids.forEach((s, i) => {
                    const cv = compareCanvases[i];
                    if (!cv) return;
                    const entry = _lebesguePerSession[s];
                    if (!entry) return;
                    const overlay = _getLebesgueOverlay(cv);
                    if (overlay) _drawLebesgueOnCanvas(overlay, cv, entry.slice, entry.w, entry.h, binLow, binHigh);
                });
            } else if (multiViewActive) {
                // Highlight on all multiview panes (same session/slice)
                if (!_lebesgueSlice || !_lebesgueSliceW) return;
                mvViews.forEach(v => {
                    if (!v.canvas) return;
                    const overlay = _getLebesgueOverlay(v.canvas);
                    if (overlay) _drawLebesgueOnCanvas(overlay, v.canvas, _lebesgueSlice, _lebesgueSliceW, _lebesgueSliceH, binLow, binHigh);
                });
            } else {
                // Normal single-view mode — use the existing #lebesgue-canvas
                if (!lebesgueCanvas || !lebesgueCtx || !_lebesgueSlice || !_lebesgueSliceW || !_lebesgueSliceH) return;
                _drawLebesgueOnCanvas(lebesgueCanvas, canvas, _lebesgueSlice, _lebesgueSliceW, _lebesgueSliceH, binLow, binHigh);
            }
        }

        /** Shared popup editor for vmin/vmax labels across all colorbar types.
         *  @param {Element} anchorEl — the label element to anchor the popup to
         *  @param {string} which — 'vmin' or 'vmax'
         *  @param {function} getValue — () => current value
         *  @param {function} onCommit — (newValue) => apply the value
         */
        function _showCbValPopup(anchorEl, which, getValue, onCommit) {
            const curVal = getValue();
            if (curVal == null) return;
            // Remove any existing popup
            const existing = document.querySelector('.cb-val-popup-wrap');
            if (existing) existing.remove();
            // Build popup inside a wrapper (wrapper carries drop-shadow,
            // inner div carries background + clip-path for balloon shape)
            const wrap = document.createElement('div');
            wrap.className = 'cb-val-popup-wrap';
            const popup = document.createElement('div');
            popup.className = 'cb-val-popup';
            const label = document.createElement('span');
            label.className = 'cb-val-label';
            label.textContent = which;
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'slim-cb-val-input';
            input.value = parseFloat(curVal.toPrecision(6));
            popup.appendChild(label);
            popup.appendChild(input);
            wrap.appendChild(popup);
            document.body.appendChild(wrap);
            // Measure natural size, then apply balloon clip-path
            const popW = popup.offsetWidth;
            const popH = popup.offsetHeight;
            const r = 10; // border-radius
            const notchW = 8, notchH = 7; // notch (arrow) size
            // Balloon shape: rounded rect body + center notch at bottom
            // Total element height = popH + notchH
            const totalH = popH + notchH;
            popup.style.paddingBottom = (6 + notchH) + 'px'; // extra room for notch
            const cx = popW / 2; // notch center x
            // SVG path for clip-path: rounded rect + notch pointing down
            const path = `M ${r} 0`
                + ` H ${popW - r} Q ${popW} 0 ${popW} ${r}`
                + ` V ${popH - r} Q ${popW} ${popH} ${popW - r} ${popH}`
                + ` H ${cx + notchW}`
                + ` L ${cx} ${totalH}`
                + ` L ${cx - notchW} ${popH}`
                + ` H ${r} Q 0 ${popH} 0 ${popH - r}`
                + ` V ${r} Q 0 0 ${r} 0 Z`;
            popup.style.clipPath = `path('${path}')`;
            popup.style.webkitClipPath = `path('${path}')`;
            // Position: above the colorbar island, notch points down at value
            const island = anchorEl.closest('.cb-island') || anchorEl.closest('#slim-cb-wrap');
            const islandRect = island ? island.getBoundingClientRect() : anchorEl.getBoundingClientRect();
            const labelRect = anchorEl.getBoundingClientRect();
            let left = labelRect.left + labelRect.width / 2 - popW / 2;
            let top = Math.max(4, islandRect.top - totalH - 2);
            left = Math.max(4, Math.min(left, window.innerWidth - popW - 4));
            wrap.style.left = left + 'px';
            wrap.style.top = top + 'px';
            input.focus();
            input.select();
            let _done = false;
            function _cleanup() {
                if (_done) return;
                _done = true;
                wrap.remove();
            }
            function _commit() {
                const v = parseFloat(input.value);
                if (!isNaN(v)) onCommit(v);
                _cleanup();
            }
            function _cancel() { _cleanup(); }
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') { e.preventDefault(); _commit(); }
                else if (e.key === 'Escape') { e.preventDefault(); _cancel(); }
                e.stopPropagation();
            });
            input.addEventListener('blur', _commit);
        }

        function _redrawActiveColorbar() {

            else drawSlimColorbar(cbMarkerFrac);

        /* ── JS: Utility Functions and Vector Field ────────────────── */

        function showDataInfo(rows) {
            document.getElementById('info-table').innerHTML =
                rows.map(([k, v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join('');
            document.getElementById('info-overlay').classList.add('visible');
